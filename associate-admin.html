<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Associate Admin — MR. HANSEN FIRM</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #0d0d0d;
        color: #e5e5e5;
        font-family: Arial, sans-serif;
    }

    .admin-header {
        background: #111;
        padding: 20px;
        text-align: center;
        font-size: 22px;
        border-bottom: 1px solid #333;
    }

    .admin-actions {
        padding: 20px;
        max-width: 600px;
        margin: auto;
    }

    .admin-btn {
        width: 100%;
        background: #1a1a1a;
        border: 1px solid #333;
        padding: 15px;
        margin-bottom: 15px;
        color: #e5e5e5;
        font-size: 18px;
        cursor: pointer;
        text-align: left;
        border-radius: 6px;
        transition: 0.2s;
    }

    .admin-btn:hover {
        background: #222;
        border-color: #555;
    }

    .modal-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.7);
        z-index: 9999;
        justify-content: center;
        align-items: center;
        padding: 10px;
    }

    .modal-panel {
        background: #111;
        border: 1px solid #444;
        padding: 16px;
        width: 100%;
        max-width: 92vw;
        max-height: 90vh;
        overflow-y: auto;
        border-radius: 8px;
        box-sizing: border-box;
        margin-left: auto;
        margin-right: 6vw; /* LEFT SHIFT */
    }

    .close-btn {
        background: #222;
        border: 1px solid #444;
        padding: 8px 12px;
        cursor: pointer;
        border-radius: 4px;
        color: #ccc;
    }

    .close-btn:hover {
        background: #333;
    }
</style>
</head>

<body>

<div class="admin-header">ASSOCIATE ADMIN PORTAL</div>

<div class="admin-actions">
    <button class="admin-btn" onclick="openPanel('myCasesPanel')">My Cases</button>
    <button class="admin-btn" onclick="openPanel('profilePanel')">My Profile</button>
    <button class="admin-btn" onclick="openPanel('messagesPanel')">Messages</button>
    <button class="admin-btn" onclick="openPanel('settingsPanel')">Settings</button>
</div>

<!-- MODAL -->
<div id="modalOverlay" class="modal-overlay">
    <div id="modalPanel" class="modal-panel">
        <div style="display:flex; justify-content:flex-end; margin-bottom:10px;">
            <button class="close-btn" onclick="closePanel()">Close</button>
        </div>
        <div id="modalContent"></div>
    </div>
</div>

<script>
function openPanel(panelName) {
    const overlay = document.getElementById("modalOverlay");
    const content = document.getElementById("modalContent");

    overlay.style.display = "flex";
    content.innerHTML = window[panelName] || "<p style='color:#f88;'>Panel not available.</p>";

    if (panelName === "myCasesPanel") setTimeout(() => renderMyCases(), 10);
}

function closePanel() {
    document.getElementById("modalOverlay").style.display = "none";
}
</script>

<!-- ===================== MY CASES ===================== -->

<script>
window.myCasesPanel = `
    <h2 style="margin-top:0; color:#9cf;">My Cases</h2>

    <p style="color:#ccc; margin-bottom:15px;">
        These are the cases assigned to you.
    </p>

    <div id="myCaseList" style="margin-top:10px;">
        <p style="color:#777;">Loading cases...</p>
    </div>
`;

let myCases = [
    {
        id: "2026-001",
        client: "John Doe",
        status: "completed",
        clientText: "Over the past month, I’ve noticed irregular access...",
        associateNotes: "Initial review of access logs confirms...",
        internalNotes: "Potential internal breach..."
    },
    {
        id: "2026-003",
        client: "Sarah L.",
        status: "review",
        clientText: "Sensitive HR files were accessed...",
        associateNotes: "Preliminary review shows unauthorized access...",
        internalNotes: "Possible policy violation..."
    }
];

function renderMyCases() {
    const container = document.getElementById("myCaseList");
    if (!container) return;

    if (!myCases.length) {
        container.innerHTML = `<p style="color:#777;">No cases assigned.</p>`;
        return;
    }

    container.innerHTML = myCases.map(c => `
        <div style="background:#1a1a1a; border:1px solid #333; padding:15px; margin-bottom:12px; border-radius:6px;">
            <div style="font-size:18px; color:#9cf;">Case #${c.id}</div>
            <div style="color:#ccc; margin-top:5px;">
                <strong>Client:</strong> ${c.client}<br>
                <strong>Status:</strong> ${c.status.toUpperCase()}
            </div>

            <button onclick="openMyCaseDetails('${c.id}')" 
                style="margin-top:12px; background:#222; border:1px solid #444; padding:10px 14px; color:#ccc; border-radius:4px;">
                View Case
            </button>
        </div>
    `).join("");
}

function openMyCaseDetails(caseId) {
    const c = myCases.find(x => x.id === caseId);
    if (!c) return;

    document.getElementById("modalContent").innerHTML = `
        <h2 style="margin-top:0; color:#9cf;">Case #${c.id}</h2>

        <h3 style="color:#9cf;">Client’s Statement</h3>
        <p style="color:#ccc;">${c.clientText}</p>

        <h3 style="color:#9cf;">Your Notes</h3>
        <p style="color:#ccc;">${c.associateNotes}</p>

        <h3 style="color:#9cf;">Internal Notes</h3>
        <p style="color:#ccc;">${c.internalNotes}</p>
    `;
}
</script>

<!-- ===================== PROFILE ===================== -->

<script>
window.profilePanel = `
    <h2 style="margin-top:0; color:#9cf;">My Profile</h2>

    <p style="color:#ccc;">
        <strong>Name:</strong> Raven Hale<br>
        <strong>Email:</strong> raven@example.com<br>
        <strong>Username:</strong> ravenhale<br>
        <strong>Specialty:</strong> Internal Breach & Insider Threats<br>
        <strong>Instagram:</strong> @ravenintel
    </p>

    <p style="color:#ccc; white-space:pre-wrap;">
        Senior intelligence associate focused on internal access anomalies and credential misuse.
    </p>
`;
</script>

<!-- ===================== MESSAGES ===================== -->

<script>
window.messagesPanel = `
    <h2 style="margin-top:0; color:#9cf;">Messages</h2>

    <p style="color:#ccc;">No messages at this time.</p>
`;
</script>

<!-- ===================== SETTINGS ===================== -->

<script>
window.settingsPanel = `
    <h2 style="margin-top:0; color:#9cf;">Settings</h2>

    <p style="color:#ccc;">Settings panel placeholder.</p>
`;
</script>

<div style="text-align:center; margin:40px 0;">
    <a href="index.html" style="color:#77c0ff; text-decoration:none; font-family:Consolas, monospace;">

    </a>
</div>

</body>
</html>
