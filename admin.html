<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - Hansen Intelligence</title>
  <style>
    body {
      font-family: "Courier New", monospace;
      background: #000;
      color: #00ff88;
      padding: 20px;
    }
    h1 { text-shadow: 0 0 15px #00ff88; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: #0a0a0a;
    }
    th, td {
      padding: 12px;
      border: 1px solid #00ff88;
      text-align: left;
    }
    th {
      background: #111;
    }
    .status-pending { color: #ffaa00; }
    .status-paid { color: #00ff88; }
    .btn {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>ADMIN DASHBOARD</h1>
  <p><strong>Mr. Hansen Firm - Intelligence Division</strong></p>

  <h2>Recent Cases</h2>
  <table id="casesTable">
    <thead>
      <tr>
        <th>Date</th>
        <th>Client</th>
        <th>Email</th>
        <th>Associate</th>
        <th>Tier</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    const BASE_URL = "https://script.google.com/macros/s/AKfycbxdfivR3V3XwbfvpFZdKJ4xhIjVLMbid2V55c_JA55kN_t9uwHOQpGAd79MRbu1YVKW/exec";

    async function loadCases() {
      try {
        const res = await fetch(BASE_URL + "?action=cases"); // We'll update backend later
        const cases = await res.json();

        const tbody = document.querySelector("#casesTable tbody");
        tbody.innerHTML = "";

        cases.forEach(c => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${new Date(c.timestamp).toLocaleDateString()}</td>
            <td>${c.clientName}</td>
            <td>${c.clientEmail}</td>
            <td>${c.associateName || 'Unassigned'}</td>
            <td>${c.tier}</td>
            <td><span class="status-paid">PAID</span></td>
          `;
          tbody.appendChild(row);
        });

      } catch (err) {
        console.error(err);
        document.querySelector("#casesTable tbody").innerHTML = `
          <tr><td colspan="6" style="text-align:center; color:#ff3366;">Failed to load cases</td></tr>`;
      }
    }

    window.onload = loadCases;
  </script>
</body>
</html>
