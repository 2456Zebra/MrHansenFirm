<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - Hansen Intelligence</title>
  <style>
    body {
      font-family: "Courier New", monospace;
      background: #000;
      color: #00ff88;
      padding: 20px;
      margin: 0;
    }
    h1 { 
      text-shadow: 0 0 15px #00ff88; 
      margin-bottom: 5px;
    }
    .header {
      margin-bottom: 30px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: #0a0a0a;
    }
    th, td {
      padding: 14px;
      border: 1px solid #00ff88;
      text-align: left;
    }
    th {
      background: #111;
      font-weight: bold;
    }
    .status-paid { color: #00ff88; font-weight: bold; }
    .status-pending { color: #ffaa00; }
    .no-data {
      text-align: center;
      padding: 40px;
      color: #666;
      font-style: italic;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>ADMIN DASHBOARD</h1>
    <p><strong>Mr. Hansen Firm - Intelligence Division</strong></p>
  </div>

  <h2>Recent Cases</h2>
  <table id="casesTable">
    <thead>
      <tr>
        <th>Date</th>
        <th>Client Name</th>
        <th>Email</th>
        <th>Associate</th>
        <th>Tier</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    // ====================== PASSWORD PROTECTION ======================
    const enteredPassword = prompt("Enter Admin Password:");
    
    if (enteredPassword !== "admin2025") {   // ← CHANGE THIS PASSWORD!
      document.body.innerHTML = `
        <h1 style="color:#ff3366; text-align:center; margin-top:100px;">
          ACCESS DENIED
        </h1>`;
      throw new Error("Access denied");
    }

    // ====================== MAIN DASHBOARD ======================
    const BASE_URL = "https://script.google.com/macros/s/AKfycbxdfivR3V3XwbfvpFZdKJ4xhIjVLMbid2V55c_JA55kN_t9uwHOQpGAd79MRbu1YVKW/exec";

    async function loadCases() {
      try {
        const res = await fetch(BASE_URL);
        const data = await res.json();   // For now we'll show associates, we'll improve later

        const tbody = document.querySelector("#casesTable tbody");
        tbody.innerHTML = "";

        if (!data || data.length === 0) {
          tbody.innerHTML = `<tr><td colspan="6" class="no-data">No cases yet.</td></tr>`;
          return;
        }

        // Temporary: Show associates as placeholder until we add cases endpoint
        data.forEach(item => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>—</td>
            <td>—</td>
            <td>—</td>
            <td>${item.name || 'N/A'}</td>
            <td>—</td>
            <td><span class="status-paid">ACTIVE</span></td>
          `;
          tbody.appendChild(row);
        });

      } catch (err) {
        console.error(err);
        document.querySelector("#casesTable tbody").innerHTML = `
          <tr><td colspan="6" class="no-data" style="color:#ff3366;">
            Failed to load data
          </td></tr>`;
      }
    }

    window.onload = loadCases;
  </script>
</body>
</html>
