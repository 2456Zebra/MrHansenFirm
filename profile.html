<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Associate Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    background: #000;
    color: #00ff88;
    font-family: "Courier New", monospace;
    padding: 30px;
    max-width: 1000px;
    margin: auto;
  }

  /* Back button */
  .back-link {
    color: #00ff88;
    text-decoration: none;
    font-size: 14px;
    margin-bottom: 20px;
    display: inline-block;
    opacity: 0.8;
  }
  .back-link:hover {
    opacity: 1;
    text-decoration: underline;
  }

  /* Boot sequence */
  #bootSequence {
    font-size: 14px;
    color: #66ffbb;
    margin-bottom: 25px;
    white-space: pre-line;
    opacity: 0;
    animation: fadeInBoot 1.5s forwards;
  }

  @keyframes fadeInBoot {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* Layout container */
  .profile-wrapper {
    display: flex;
    gap: 30px;
    align-items: flex-start;
    opacity: 0;
    animation: fadeInProfile 1.5s forwards 2.5s;
  }

  @keyframes fadeInProfile {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Mobile layout */
  @media (max-width: 700px) {
    .profile-wrapper {
      flex-direction: column;
    }
  }

  /* Photo */
  .photo {
    width: 320px;
    height: 420px;
    object-fit: cover;
    border-radius: 12px;
    box-shadow: 0 0 15px #00ff88;
  }

  @media (max-width: 700px) {
    .photo {
      width: 100%;
      height: auto;
    }
  }

  /* Right side details */
  .details {
    flex: 1;
  }

  .name {
    font-size: 1.9rem;
    font-weight: bold;
    margin-bottom: 12px;
    text-shadow: 0 0 12px #00ff88;
  }

  /* Two-column technical layout */
  .field {
    display: flex;
    margin-bottom: 12px;
    opacity: 0;
    overflow: hidden;
    border-right: 2px solid #00ff88;
    animation: typing 2s steps(40, end) forwards;
    max-width: 600px;
  }

  .field-label {
    width: 220px;
    font-weight: bold;
    color: #66ffbb;
    white-space: nowrap;
  }

  .field-value {
    flex: 1;
    color: #baffd9;
    white-space: normal;
  }

  /* Typewriter animation */
  @keyframes typing {
    from { width: 0; opacity: 1; }
    to   { width: 100%; opacity: 1; }
  }

  /* Community Rating icons */
  .rating-icons {
    display: flex;
    gap: 4px;
    margin-top: 4px;
  }

  .rating-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
  }

  .dot-filled {
    background: #00ff88;
    box-shadow: 0 0 6px #00ff88;
  }

  .dot-empty {
    background: #003322;
  }

  /* HIR emphasized */
  .hir-block {
    margin-top: 20px;
    opacity: 0;
    animation: fadeInHIR 1.5s forwards 10.5s;
  }

  @keyframes fadeInHIR {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hir-label {
    font-size: 1rem;
    color: #66ffbb;
    margin-bottom: 6px;
  }

  .hir-value {
    font-size: 2.6rem;
    font-weight: bold;
    color: #00ff88;
    text-shadow: 0 0 22px #00ff88;
    animation: pulseHIR 1.1s infinite alternate;
  }

  @keyframes pulseHIR {
    from { text-shadow: 0 0 14px #00ff88; opacity: 0.8; transform: scale(1); }
    to   { text-shadow: 0 0 32px #00ffaa; opacity: 1; transform: scale(1.06); }
  }

  .hir-outof {
    font-size: 0.9rem;
    color: #66ffbb;
    margin-top: 4px;
  }

  /* Buttons smaller */
  .btn-row {
    margin-top: 25px;
    display: flex;
    gap: 12px;
    opacity: 0;
    animation: fadeInButtons 1.5s forwards 12s;
  }

  @keyframes fadeInButtons {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .insta-btn, .case-btn {
    padding: 10px 16px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: bold;
    font-size: 0.9rem;
    display: inline-block;
    width: auto;
  }

  .insta-btn {
    background: #ff2ea6;
    color: #fff;
    box-shadow: 0 0 10px #ff2ea6;
  }

  .insta-btn:hover {
    background: #ff5fbd;
    box-shadow: 0 0 14px #ff5fbd;
  }

  .case-btn {
    background: #00ff88;
    color: #000;
    box-shadow: 0 0 10px #00ff88;
  }

  .case-btn:hover {
    background: #00ffaa;
    box-shadow: 0 0 14px #00ffaa;
  }

  /* HIR explanation */
  .hir-explainer {
    margin-top: 15px;
    font-size: 0.9rem;
    color: #66ffbb;
    opacity: 0;
    animation: fadeInExplainer 1.5s forwards 12.5s;
    max-width: 600px;
  }

  @keyframes fadeInExplainer {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>
</head>

<body>

<a href="/associates.html" class="back-link">← Back to Associates</a>

<div id="bootSequence"></div>

<div id="profileContainer"></div>

<script>
function getQueryParam(key) {
  const url = new URL(window.location.href);
  return url.searchParams.get(key);
}

function playBootSequence() {
  const boot = [
    "> INITIALIZING SECURE PROFILE VIEWER...",
    "> ESTABLISHING ENCRYPTED LINK...",
    "> AUTHENTICATING USER ACCESS LEVEL: APPROVED",
    "> DECRYPTING ASSOCIATE DOSSIER...",
    "> LOADING INTELLIGENCE METRICS...",
    "> RENDERING PROFILE..."
  ];

  let i = 0;
  const el = document.getElementById("bootSequence");

  const interval = setInterval(() => {
    if (i < boot.length) {
      el.innerHTML += boot[i] + "\n";
      i++;
    } else {
      clearInterval(interval);
    }
  }, 600);
}

async function loadProfile() {
  playBootSequence();

  const id = (getQueryParam("id") || "").trim();

  const res = await fetch(
    "https://script.google.com/macros/s/AKfycbwMPK8PCo5IgaeObx3Q8vD4dzqz3EQyLQyrS7Bru6Kx1K_DI6uaxIOfFrOx4OCGzDz0/exec",
    {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action: "getAssociates" })
    }
  );

  const data = await res.json();
  const associate = data.associates.find(a =>
    (a.associateId || "").trim() === id
  );

  const photoUrl = associate.photoUrl;

  /* Build community rating dots */
  const rating = Number(associate.avgCommunityRating || 0);
  let dots = "";
  for (let i = 1; i <= 10; i++) {
    dots += `<div class="rating-dot ${i <= rating ? "dot-filled" : "dot-empty"}"></div>`;
  }

  document.getElementById("profileContainer").innerHTML = `
    <div class="profile-wrapper">

      <img src="${photoUrl}" class="photo"
        onerror="this.src='https://via.placeholder.com/400x300/111111/00ff88?text=Photo+Unavailable'" />

      <div class="details">

        <div class="name">${associate.name}</div>

        <div class="field" style="animation-delay:2.5s">
          <div class="field-label">Specialty:</div>
          <div class="field-value">${associate.specialty || "—"}</div>
        </div>

        <div class="field" style="animation-delay:4.5s">
          <div class="field-label">Bio:</div>
          <div class="field-value">${associate.bio || "—"}</div>
        </div>

        <div class="field" style="animation-delay:6.5s">
          <div class="field-label">Cases Completed:</div>
          <div class="field-value">${associate.casesCompleted || 0}</div>
        </div>

        <div class="field" style="animation-delay:8.5s">
          <div class="field-label">Community Rating:</div>
          <div class="field-value">
            ${rating}
            <div class="rating-icons">${dots}</div>
          </div>
        </div>

        <!-- HIR BLOCK -->
        <div class="hir-block">
          <div class="hir-label">Hansen Intelligence Rating (HIR):</div>
          <div class="hir-value">${associate.HIR || "—"}</div>
          <div class="hir-outof">out of 100</div>
        </div>

        <div class="hir-explainer">
          The Hansen Intelligence Rating (HIR) is the core competitive metric of the MR. Hansen Firm.
          It reflects performance, precision, client impact, community trust, and overall intelligence output.
          Associates rise and fall by this number.
        </div>

        <div class="btn-row">
          <a class="insta-btn"
             href="https://instagram.com/${associate.instagram}"
             target="_blank"
             rel="noopener noreferrer">
             Instagram
          </a>

          <a class="case-btn" href="/case.html?id=${associate.associateId.trim()}">
            Assign Case
          </a>
        </div>

      </div>
    </div>
  `;
}

loadProfile();
</script>

</body>
</html>
