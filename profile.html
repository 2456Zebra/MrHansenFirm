<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Associate Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    background: #000;
    color: #00ff88;
    font-family: "Courier New", monospace;
    padding: 30px;
    max-width: 1000px;
    margin: auto;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,255,136,0.03) 0px,
      rgba(0,255,136,0.03) 2px,
      transparent 2px,
      transparent 4px
    );
    z-index: 999;
  }

  .back-link {
    color: #00ff88;
    text-decoration: none;
    font-size: 14px;
    margin-bottom: 20px;
    display: inline-block;
    opacity: 0.8;
  }
  .back-link:hover {
    opacity: 1;
    text-decoration: underline;
  }

  #bootSequence {
    font-size: 14px;
    color: #66ffbb;
    margin-bottom: 25px;
    white-space: pre-line;
    opacity: 1;
    transition: opacity 1.5s ease;
  }

  .profile-wrapper {
    display: flex;
    gap: 30px;
    align-items: flex-start;
    opacity: 0;
    animation: fadeInProfile 1.5s forwards 2.5s;
  }

  @keyframes fadeInProfile {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 700px) {
    .profile-wrapper {
      flex-direction: column;
    }
  }

  .photo {
    width: 320px;
    height: 420px;
    object-fit: cover;
    border-radius: 12px;
    box-shadow: 0 0 15px #00ff88;
  }

  @media (max-width: 700px) {
    .photo {
      width: 100%;
      height: auto;
    }
  }

  .details {
    flex: 1;
  }

  .name {
    font-size: 1.9rem;
    font-weight: bold;
    margin-bottom: 12px;
    text-shadow: 0 0 12px #00ff88;
  }

  .field {
    display: flex;
    margin-bottom: 12px;
    opacity: 0;
    overflow: hidden;
    border-right: 2px solid #00ff88;
    animation: typing 2s steps(40, end) forwards;
    width: 100%;
    min-width: 0;
  }

  .field-label {
    font-weight: bold;
    color: #66ffbb;
    white-space: nowrap;
    min-width: 120px;
    max-width: 40%;
  }

  .field-value {
    flex: 1;
    color: #baffd9;
    white-space: normal;
    min-width: 0;
  }

  @keyframes typing {
    from { width: 0; opacity: 1; }
    to   { width: 100%; opacity: 1; }
  }

  /* Rating icons */
  .rating-icons {
    display: flex;
    gap: 4px;
    margin-top: 4px;
    flex-wrap: wrap;
  }

  .flex-icon {
    width: 18px;
    height: 18px;
  }

  /* HIR */
  .hir-block {
    margin-top: 25px;
    opacity: 0;
    animation: fadeInHIR 1.5s forwards 11s;
  }

  @keyframes fadeInHIR {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hir-label {
    font-size: 1rem;
    color: #66ffbb;
    margin-bottom: 6px;
  }

  .hir-row {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .hir-value {
    font-size: 3rem;
    font-weight: bold;
    color: #00ff88;
    text-shadow: 0 0 32px #00ff88;
    animation: pulseHIR 1.2s infinite alternate;
  }

  @keyframes pulseHIR {
    from { text-shadow: 0 0 22px #00ff88; opacity: 0.85; }
    to   { text-shadow: 0 0 42px #00ffaa; opacity: 1; }
  }

  .hir-outof {
    font-size: 1rem;
    color: #66ffbb;
  }

  .comp-header {
    margin-top: 25px;
    font-size: 1rem;
    font-weight: bold;
    color: #00ffaa;
    text-shadow: 0 0 12px #00ffaa;
    opacity: 0;
    animation: fadeInComp 1.5s forwards 12s;
  }

  @keyframes fadeInComp {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .hir-explainer {
    margin-top: 10px;
    font-size: 0.9rem;
    color: #66ffbb;
    opacity: 0;
    animation: fadeInExplainer 1.5s forwards 12.5s;
    max-width: 600px;
  }

  @keyframes fadeInExplainer {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .btn-row {
    margin-top: 25px;
    display: flex;
    gap: 12px;
    opacity: 0;
    animation: fadeInButtons 1.5s forwards 13.5s;
    flex-wrap: wrap;
  }

  @keyframes fadeInButtons {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .insta-btn, .case-btn {
    padding: 10px 16px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: bold;
    font-size: 0.9rem;
    display: inline-block;
    width: auto;
  }

  .insta-btn {
    background: #ff2ea6;
    color: #fff;
    box-shadow: 0 0 10px #ff2ea6;
  }

  .insta-btn:hover {
    background: #ff5fbd;
    box-shadow: 0 0 14px #ff5fbd;
  }

  .case-btn {
    background: #00ff88;
    color: #000;
    box-shadow: 0 0 10px #00ff88;
  }

  .case-btn:hover {
    background: #00ffaa;
    box-shadow: 0 0 14px #00ffaa;
  }

  /* ⭐ MOBILE FIXES — ALL 8 ITEMS ⭐ */
  @media (max-width: 700px) {

    /* 1–3: Buffer spacing */
    .name { margin-bottom: 22px !important; }
    .field:nth-of-type(1) { margin-bottom: 22px !important; } /* Specialty */
    .field:nth-of-type(2) { margin-bottom: 22px !important; } /* Bio */

    /* 4–5: Fix vertical alignment of labels */
    .field-label {
      display: flex;
      align-items: flex-start;
    }

    /* 6: Flex arms on one line */
    .rating-icons {
      flex-wrap: nowrap !important;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    /* 7: Buffer above competition header */
    .comp-header {
      margin-top: 40px !important;
    }
  }
</style>
</head>

<body>

<a href="/associates.html" class="back-link">← Back to Associates</a>

<div id="bootSequence"></div>

<div id="profileContainer"></div>

<script>
function getQueryParam(key) {
  const url = new URL(window.location.href);
  return url.searchParams.get(key);
}

function playBootSequence() {
  const boot = [
    "> INITIALIZING SECURE PROFILE VIEWER...",
    "> ESTABLISHING ENCRYPTED LINK...",
    "> AUTHENTICATING USER ACCESS LEVEL: APPROVED",
    "> DECRYPTING ASSOCIATE DOSSIER...",
    "> LOADING INTELLIGENCE METRICS...",
    "> RENDERING PROFILE..."
  ];

  let i = 0;
  const el = document.getElementById("bootSequence");

  const interval = setInterval(() => {
    if (i < boot.length) {
      el.innerHTML += boot[i] + "\n";
      i++;
    } else {
      clearInterval(interval);

      setTimeout(() => {
        el.style.opacity = 0;
        setTimeout(() => el.remove(), 1500);
      }, 1500);
    }
  }, 600);
}

async function loadProfile() {
  playBootSequence();

  const id = (getQueryParam("id") || "").trim();

  const res = await fetch(
    "https://script.google.com/macros/s/AKfycbwMPK8PCo5IgaeObx3Q8vD4dzqz3EQyLQyrS7Bru6Kx1K_DI6uaxIOfFrOx4OCGzDz0/exec",
    {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action: "getAssociates" })
    }
  );

  const data = await res.json();
  const associate = data.associates.find(a =>
    (a.associateId || "").trim() === id
  );

  const photoUrl = associate.photoUrl;

  /* Build flex icons */
  const rating = Number(associate.avgCommunityRating || 0);
  let flexIcons = "";
  for (let i = 1; i <= 10; i++) {
    flexIcons += `
      <img 
        src="https://img.icons8.com/fluency-systems-filled/50/${i <= rating ? 'ffd700' : '777777'}/flex-biceps.png" 
        class="flex-icon"
      >
    `;
  }

  document.getElementById("profileContainer").innerHTML = `
    <div class="profile-wrapper">

      <img src="${photoUrl}" class="photo"
        onerror="this.src='https://via.placeholder.com/400x300/111111/00ff88?text=Photo+Unavailable'" />

      <div class="details">

        <div class="name">${associate.name}</div>

        <div class="field" style="animation-delay:2.5s">
          <div class="field-label">Specialty:</div>
          <div class="field-value">${associate.specialty || "—"}</div>
        </div>

        <div class="field" style="animation-delay:4.5s">
          <div class="field-label">Bio:</div>
          <div class="field-value">${associate.bio || "—"}</div>
        </div>

        <div class="field" style="animation-delay:6.5s">
          <div class="field-label">Cases Completed:</div>
          <div class="field-value">${associate.casesCompleted || 0}</div>
        </div>

        <div class="field" style="animation-delay:8.5s">
          <div class="field-label">Community Rating:</div>
          <div class="field-value">
            ${rating.toFixed(1).replace(".", "<span style='font-family:sans-serif;'>.</span>")}
            <div class="rating-icons">${flexIcons}</div>
          </div>
        </div>

        <div class="hir-block">
          <div class="hir-label">Hansen Intelligence Rating (HIR):</div>

          <div class="hir-row">
            <div class="hir-value">${associate.HIR || "—"}</div>
            <div class="hir-outof">out of 100</div>
          </div>
        </div>

        <div class="comp-header">ASSOCIATES COMPETITION</div>

        <div class="hir-explainer">
          This is a competition among associates. The Hansen Intelligence Rating (HIR) is the core competitive metric of the MR. Hansen Firm. It reflects performance, precision, client impact, community trust, and overall intelligence output. Associates rise and fall by this number. 
          <a href="/associates.html" style="color:#00ffaa; text-decoration:underline;">
            &lt; Associates Rankings Dashboard
          </a>.
        </div>

        <div class="btn-row">
          <a class="insta-btn"
             href="https://instagram.com/${associate.instagram}"
             target="_blank"
             rel="noopener noreferrer">
             Instagram
          </a>

          <a class="case-btn" href="/case.html?id=${associate.associateId.trim()}">
            Assign Case
          </a>
        </div>

      </div>
    </div>
  `;
}

loadProfile();
</script>

</body>
</html>
