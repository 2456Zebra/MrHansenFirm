<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Associate Profile</title>
  <style>
    body {
      font-family: "Courier New", monospace;
      background: #000;
      color: #00ff88;
      padding: 40px 20px;
      max-width: 1000px;
      margin: auto;
      line-height: 1.6;
    }
    .back-link {
      color: #00ff88;
      text-decoration: none;
      font-size: 18px;
      margin-bottom: 30px;
      display: inline-block;
    }
    .error { color: #ff3366; }
    .profile-container {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 50px;
      margin-top: 20px;
    }
    .photo {
      width: 100%;
      border-radius: 12px;
      border: 3px solid #00ff88;
      box-shadow: 0 0 30px #00ff88;
    }
    .info h1 {
      font-size: 42px;
      margin: 0 0 8px 0;
      text-shadow: 0 0 15px #00ff88;
    }
    .specialty {
      font-size: 24px;
      color: #00ffaa;
      margin-bottom: 25px;
    }
    .bio {
      font-size: 17px;
      background: #0a0a0a;
      padding: 30px;
      border-radius: 10px;
      border-left: 5px solid #00ff88;
    }
    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 16px 32px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 6px;
      text-decoration: none;
      transition: all 0.3s;
    }
    .insta-btn { background: #ff2ea6; color: #fff; }
    .case-btn { background: #00ff88; color: #000; }
    .btn:hover { transform: scale(1.05); }
  </style>
</head>
<body>
  <a href="/associates.html" class="back-link">← BACK TO ALL ASSOCIATES</a>

  <div id="loading">LOADING PROFILE...</div>
  <div id="errorMessage" class="error" style="display:none;"></div>

  <div id="profileContent" style="display: none;">
    <div class="profile-container">
      <div>
        <img id="profilePhoto" class="photo" alt="Associate Photo">
      </div>
      <div class="info">
        <h1 id="profileName"></h1>
        <div id="profileSpecialty" class="specialty"></div>
        <div id="profileBio" class="bio"></div>

        <div>
          <a id="instaBtn" class="btn insta-btn" target="_blank">VIEW INSTAGRAM</a>
          <a id="caseBtn" class="btn case-btn">SUBMIT CASE TO THIS ASSOCIATE</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const BASE_URL = "https://script.google.com/macros/s/AKfycbxucgPwkZdJgEiKhVUICxUKgsNfmQ4i3KZXTropomrFM15s2fwru5_LEjUEsLKRoW-n/exec";

    async function loadProfile() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');

      console.log("Profile ID from URL:", id);   // Debug

      if (!id) {
        showError("No profile ID in URL. Go back and click 'View Full Profile'.");
        return;
      }

      try {
        const res = await fetch(BASE_URL);
        console.log("Fetch status:", res.status);
        
        const associates = await res.json();
        console.log("All associates received:", associates);

        const associate = associates.find(a => a.id === id);

        if (!associate) {
          showError(`Associate with ID "${id}" not found.`);
          console.log("Available IDs:", associates.map(a => a.id));
          return;
        }

        // Success - Populate profile
        document.getElementById("profileName").textContent = associate.name;
        document.getElementById("profileSpecialty").textContent = associate.specialty;
        document.getElementById("profileBio").innerHTML = associate.bio.replace(/\n/g, '<br>');
        document.getElementById("profilePhoto").src = associate.photoUrl;
        document.getElementById("instaBtn").href = `https://instagram.com/${associate.instagram}`;
        document.getElementById("caseBtn").href = `/case-submission.html?associate=${encodeURIComponent(associate.name)}&id=${associate.id}`;

        document.getElementById("loading").style.display = "none";
        document.getElementById("profileContent").style.display = "block";

      } catch (err) {
        console.error("Load error:", err);
        showError("Failed to load profile. Check console for details.");
      }
    }

    function showError(msg) {
      document.getElementById("loading").style.display = "none";
      const errDiv = document.getElementById("errorMessage");
      errDiv.style.display = "block";
      errDiv.innerHTML = msg;
    }

    window.onload = loadProfile;
  </script>
</body>
</html>
