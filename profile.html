<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Associate Profile</title>
  <style>
    body {
      font-family: "Courier New", monospace;
      background: #000;
      color: #00ff88;
      padding: 40px 20px;
      max-width: 900px;
      margin: auto;
      line-height: 1.6;
    }
    .profile-container {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 40px;
      margin-top: 30px;
    }
    .photo {
      width: 100%;
      max-width: 380px;
      border-radius: 12px;
      border: 3px solid #00ff88;
      box-shadow: 0 0 25px #00ff88;
    }
    .info h1 {
      font-size: 42px;
      margin: 0 0 10px 0;
      text-shadow: 0 0 15px #00ff88;
    }
    .specialty {
      font-size: 22px;
      color: #00ffaa;
      margin-bottom: 20px;
    }
    .bio {
      font-size: 17px;
      color: #baffd9;
      background: #0a0a0a;
      padding: 25px;
      border-radius: 8px;
      border-left: 4px solid #00ff88;
    }
    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 16px 32px;
      background: #00ff88;
      color: #000;
      font-weight: bold;
      border-radius: 6px;
      text-decoration: none;
      box-shadow: 0 0 20px #00ff88;
      transition: all 0.3s;
    }
    .btn:hover {
      transform: scale(1.05);
      background: #00ffaa;
    }
    @media (max-width: 768px) {
      .profile-container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <h1><a href="/associates.html" style="color:#00ff88; text-decoration:none;">← BACK TO ASSOCIATES</a></h1>

  <div id="loading">LOADING PROFILE...</div>
  <div id="profileContent" style="display:none;">

    <div class="profile-container">
      <div>
        <img id="profilePhoto" class="photo" alt="Associate Photo">
      </div>
      <div class="info">
        <h1 id="profileName"></h1>
        <div id="profileSpecialty" class="specialty"></div>
        <div id="profileBio" class="bio"></div>

        <a id="instaLink" class="btn" target="_blank">VIEW INSTAGRAM</a>
        <a id="submitCaseBtn" class="btn" style="background:#ff2ea6; margin-left:15px;">SUBMIT CASE TO THIS ASSOCIATE</a>
      </div>
    </div>
  </div>

  <script>
    const BASE_URL = "https://script.google.com/macros/s/YOUR_LATEST_URL_HERE/exec";

    async function loadProfile() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');

      if (!id) {
        document.getElementById("loading").innerHTML = "Error: No profile ID";
        return;
      }

      try {
        const res = await fetch(BASE_URL);
        const associates = await res.json();

        const associate = associates.find(a => a.id === id);

        if (!associate) {
          document.getElementById("loading").innerHTML = "Associate not found.";
          return;
        }

        // Populate profile
        document.getElementById("profileName").textContent = associate.name;
        document.getElementById("profileSpecialty").textContent = associate.specialty;
        document.getElementById("profileBio").textContent = associate.bio;
        document.getElementById("profilePhoto").src = associate.photoUrl;
        document.getElementById("instaLink").href = `https://instagram.com/${associate.instagram}`;

        // Submit case button
        document.getElementById("submitCaseBtn").href = `/case-submission.html?associate=${encodeURIComponent(associate.name)}&id=${associate.id}`;

        document.getElementById("loading").style.display = "none";
        document.getElementById("profileContent").style.display = "block";

      } catch (err) {
        console.error(err);
        document.getElementById("loading").innerHTML = "Failed to load profile.";
      }
    }

    window.onload = loadProfile;
  </script>
</body>
</html>
