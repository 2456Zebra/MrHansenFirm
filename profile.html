<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Associate Profile</title>

  <style>
    body {
      font-family: "Courier New", monospace;
      background: #000;
      color: #00ff88;
      padding: 20px;
      max-width: 1000px;
      margin: auto;
      line-height: 1.6;
    }
    .back-link {
      color: #00ff88;
      text-decoration: none;
      font-size: 18px;
      margin-bottom: 30px;
      display: inline-block;
    }
    .error { color: #ff3366; }

    .profile-container {
      display: flex;
      flex-direction: column;
      gap: 30px;
      margin-top: 20px;
    }

    .photo-container { text-align: center; }

    .photo {
      width: 100%;
      max-width: 380px;
      border-radius: 12px;
      border: 3px solid #00ff88;
      box-shadow: 0 0 30px #00ff88;
    }

    .info h1 {
      font-size: 2.4rem;
      margin: 0 0 8px 0;
      text-shadow: 0 0 15px #00ff88;
    }

    .specialty {
      font-size: 1.5rem;
      color: #00ffaa;
      margin-bottom: 25px;
    }

    .bio {
      font-size: 17px;
      background: #0a0a0a;
      padding: 30px;
      border-radius: 10px;
      border-left: 5px solid #00ff88;
    }

    .btn {
      display: inline-block;
      margin: 10px 8px 10px 0;
      padding: 16px 32px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 6px;
      text-decoration: none;
      transition: all 0.3s;
    }

    .insta-btn { background: #ff2ea6; color: #fff; }
    .case-btn { background: #00ff88; color: #000; }
    .btn:hover { transform: scale(1.05); }

    @media (min-width: 768px) {
      .profile-container { flex-direction: row; gap: 50px; }
      .photo-container { flex-shrink: 0; width: 380px; }
      .info { flex: 1; }
      body { padding: 40px 20px; }
    }

    @media (max-width: 480px) {
      body { padding: 15px; }
      .info h1 { font-size: 2rem; }
      .specialty { font-size: 1.3rem; }
      .bio { padding: 20px; font-size: 16px; }
      .btn { display: block; margin: 12px 0; text-align: center; }
    }
  </style>
</head>

<body>
  <a href="/associates.html" class="back-link">← BACK TO ALL ASSOCIATES</a>

  <div id="loading">LOADING PROFILE...</div>
  <div id="errorMessage" class="error" style="display:none;"></div>

  <div id="profileContent" style="display:none;">
    <div class="profile-container">

      <div class="photo-container">
        <img id="profilePhoto" class="photo" alt="Associate Photo">
      </div>

      <div class="info">
        <h1 id="profileName"></h1>
        <div id="profileSpecialty" class="specialty"></div>
        <div id="profileBio" class="bio"></div>

        <div>
          <a id="instaBtn" class="btn insta-btn" target="_blank">VIEW INSTAGRAM</a>
          <a id="caseBtn" class="btn case-btn">SUBMIT CASE TO THIS ASSOCIATE</a>
        </div>
      </div>

    </div>
  </div>

  <script>
    const BASE_URL = "https://script.google.com/macros/s/AKfycbwMPK8PCo5IgaeObx3Q8vD4dzqz3EQyLQyrS7Bru6Kx1K_DI6uaxIOfFrOx4OCGzDz0/exec";

    async function loadProfile() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");

      if (!id) return showError("No profile ID in URL.");

      try {
        const res = await fetch(BASE_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({ action: "getAssociates" })
        });

        const data = await res.json();

        if (!data.success || !Array.isArray(data.associates))
          return showError("Invalid data from server.");

        const associate = data.associates.find(a => a.associateId.trim() === id.trim());

        if (!associate)
          return showError(`Associate with ID "${id}" not found.`);

        document.getElementById("profileName").textContent = associate.name;
        document.getElementById("profileSpecialty").textContent = associate.specialty || "No specialty listed";
        document.getElementById("profileBio").innerHTML = (associate.bio || "").replace(/\n/g, "<br>");
        document.getElementById("profilePhoto").src = associate.photoUrl || "";
        document.getElementById("instaBtn").href = `https://instagram.com/${associate.instagram}`;
        document.getElementById("caseBtn").href =
          `/case-submission.html?associate=${encodeURIComponent(associate.name)}&id=${associate.associateId}`;

        document.getElementById("loading").style.display = "none";
        document.getElementById("profileContent").style.display = "block";

      } catch (err) {
        console.error("Load error:", err);
        showError("Failed to load profile.");
      }
    }

    function showError(msg) {
      document.getElementById("loading").style.display = "none";
      const errDiv = document.getElementById("errorMessage");
      errDiv.style.display = "block";
      errDiv.innerHTML = msg;
    }

    window.onload = loadProfile;
  </script>

</body>
</html>
