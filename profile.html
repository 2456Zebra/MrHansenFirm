<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Associate Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    background: #000;
    color: #00ff88;
    font-family: "Courier New", monospace;
    padding: 30px;
    max-width: 1000px;
    margin: auto;
  }

  /* Back button */
  .back-link {
    color: #00ff88;
    text-decoration: none;
    font-size: 14px;
    margin-bottom: 20px;
    display: inline-block;
    opacity: 0.8;
  }
  .back-link:hover {
    opacity: 1;
    text-decoration: underline;
  }

  /* Layout container */
  .profile-wrapper {
    display: flex;
    gap: 30px;
    align-items: flex-start;
  }

  /* Mobile layout */
  @media (max-width: 700px) {
    .profile-wrapper {
      flex-direction: column;
    }
  }

  /* Photo restored to normal size */
  .photo {
    width: 320px;
    height: 420px;
    object-fit: cover;
    border-radius: 12px;
    box-shadow: 0 0 15px #00ff88;
  }

  @media (max-width: 700px) {
    .photo {
      width: 100%;
      height: auto;
    }
  }

  /* Right side details */
  .details {
    flex: 1;
  }

  .name {
    font-size: 1.9rem;
    font-weight: bold;
    margin-bottom: 12px;
    text-shadow: 0 0 12px #00ff88;
  }

  /* Two-column technical layout */
  .field {
    display: flex;
    margin-bottom: 12px;
    opacity: 0;
    animation: typeIn 0.6s forwards;
  }

  .field-label {
    width: 180px;
    font-weight: bold;
    color: #66ffbb;
  }

  .field-value {
    flex: 1;
    color: #baffd9;
  }

  /* HIR emphasized */
  .hir-value {
    font-size: 1.4rem;
    font-weight: bold;
    color: #00ff88;
    text-shadow: 0 0 12px #00ff88;
  }

  /* Typewriter entrance */
  @keyframes typeIn {
    from { opacity: 0; transform: translateX(-10px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* Buttons smaller */
  .btn-row {
    margin-top: 25px;
    display: flex;
    gap: 12px;
  }

  .insta-btn, .case-btn {
    padding: 10px 16px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: bold;
    font-size: 0.9rem;
    display: inline-block;
    width: auto;
  }

  .insta-btn {
    background: #ff2ea6;
    color: #fff;
    box-shadow: 0 0 10px #ff2ea6;
  }

  .insta-btn:hover {
    background: #ff5fbd;
    box-shadow: 0 0 14px #ff5fbd;
  }

  .case-btn {
    background: #00ff88;
    color: #000;
    box-shadow: 0 0 10px #00ff88;
  }

  .case-btn:hover {
    background: #00ffaa;
    box-shadow: 0 0 14px #00ffaa;
  }
</style>
</head>

<body>

<a href="/associates.html" class="back-link">← Back to Associates</a>

<div id="profileContainer">Loading profile...</div>

<script>
function getQueryParam(key) {
  const url = new URL(window.location.href);
  return url.searchParams.get(key);
}

async function loadProfile() {
  const id = (getQueryParam("id") || "").trim();

  if (!id) {
    document.getElementById("profileContainer").innerHTML = "Invalid profile.";
    return;
  }

  try {
    const res = await fetch(
      "https://script.google.com/macros/s/AKfycbwMPK8PCo5IgaeObx3Q8vD4dzqz3EQyLQyrS7Bru6Kx1K_DI6uaxIOfFrOx4OCGzDz0/exec",
      {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action: "getAssociates" })
      }
    );

    const data = await res.json();
    if (!data.success) {
      document.getElementById("profileContainer").innerHTML = "Error loading profile.";
      return;
    }

    const associate = data.associates.find(a =>
      (a.associateId || "").trim() === id
    );

    if (!associate) {
      document.getElementById("profileContainer").innerHTML = "Profile not found.";
      return;
    }

    const photoUrl = associate.photoUrl || "https://via.placeholder.com/400x300/111111/00ff88?text=No+Photo";

    document.getElementById("profileContainer").innerHTML = `
      <div class="profile-wrapper">

        <img src="${photoUrl}" class="photo"
          onerror="this.src='https://via.placeholder.com/400x300/111111/00ff88?text=Photo+Unavailable'" />

        <div class="details">

          <div class="name">${associate.name}</div>

          <div class="field" style="animation-delay:0.1s">
            <div class="field-label">Specialty:</div>
            <div class="field-value">${associate.specialty || "—"}</div>
          </div>

          <div class="field" style="animation-delay:0.2s">
            <div class="field-label">Bio:</div>
            <div class="field-value">${associate.bio || "—"}</div>
          </div>

          <div class="field" style="animation-delay:0.3s">
            <div class="field-label">Cases Completed:</div>
            <div class="field-value">${associate.casesCompleted || 0}</div>
          </div>

          <div class="field" style="animation-delay:0.4s">
            <div class="field-label">Community Rating:</div>
            <div class="field-value">${associate.avgCommunityRating || "—"}</div>
          </div>

          <div class="field" style="animation-delay:0.5s">
            <div class="field-label">Hansen Intelligence Rating (HIR):</div>
            <div class="field-value hir-value">${associate.HIR || "—"}</div>
          </div>

          <div class="btn-row" style="animation-delay:0.6s">
            <a class="insta-btn"
               href="https://instagram.com/${associate.instagram}"
               target="_blank"
               rel="noopener noreferrer">
               Instagram
            </a>

            <a class="case-btn" href="/case.html?id=${associate.associateId.trim()}">
              Assign Case
            </a>
          </div>

        </div>
      </div>
    `;
  } catch (err) {
    document.getElementById("profileContainer").innerHTML = "Error loading profile.";
  }
}

loadProfile();
</script>

</body>
</html>
