<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Associate Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  /* GLOBAL */
  html, body {
    width: 100%;
    max-width: 100%;
    overflow-x: hidden !important; /* ⭐ FIX: Prevent right-side overflow */
    background: #000;
    color: #00ff88;
    font-family: "Courier New", monospace;
    padding: 30px;
    margin: auto;
    position: relative;
    box-sizing: border-box;
  }

  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,255,136,0.03) 0px,
      rgba(0,255,136,0.03) 2px,
      transparent 2px,
      transparent 4px
    );
    z-index: 999;
  }

  .back-link {
    color: #00ff88;
    text-decoration: none;
    font-size: 14px;
    margin-bottom: 20px;
    display: inline-block;
    opacity: 0.8;
  }
  .back-link:hover {
    opacity: 1;
    text-decoration: underline;
  }

  #bootSequence {
    font-size: 14px;
    color: #66ffbb;
    margin-bottom: 25px;
    white-space: pre-line;
    opacity: 1;
    transition: opacity 1.5s ease;
  }

  .profile-wrapper {
    display: flex;
    gap: 30px;
    align-items: flex-start;
    opacity: 0;
    animation: fadeInProfile 1.5s forwards 2.5s;
    width: 100%;
    max-width: 100%;
  }

  @keyframes fadeInProfile {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 700px) {
    .profile-wrapper {
      flex-direction: column;
      width: 100%;
      max-width: 100%;
    }
  }

  .photo {
    width: 320px;
    height: 420px;
    object-fit: cover;
    border-radius: 12px;
    box-shadow: 0 0 15px #00ff88;
  }

  @media (max-width: 700px) {
    .photo {
      width: 100%;
      height: auto;
    }
  }

  .details {
    flex: 1;
    width: 100%;
    max-width: 100%;
  }

  .name {
    font-size: 1.9rem;
    font-weight: bold;
    margin-bottom: 22px; /* ⭐ FIX: Space below name */
    text-shadow: 0 0 12px #00ff88;
  }

  .field {
    display: flex;
    flex-direction: column; /* ⭐ FIX: Prevent overlap */
    margin-bottom: 22px; /* ⭐ FIX: Space between fields */
    opacity: 0;
    overflow: hidden;
    border-right: 2px solid #00ff88;
    animation: typing 2s steps(40, end) forwards;
    width: 100%;
    max-width: 100%;
  }

  .field-label {
    font-weight: bold;
    color: #66ffbb;
    white-space: nowrap;
    line-height: 1.3;
  }

  .field-value {
    color: #baffd9;
    margin-top: 6px; /* ⭐ FIX: Space below label */
    width: 100%;
    max-width: 100%;
  }

  @keyframes typing {
    from { width: 0; opacity: 1; }
    to   { width: 100%; opacity: 1; }
  }

  /* ⭐ FIX: Left-align flex arms, no wrap */
  .rating-icons {
    display: flex;
    flex-wrap: nowrap !important;
    justify-content: flex-start !important;
    align-items: center;
    gap: 4px;
    width: 100%;
    overflow-x: hidden;
  }

  .flex-icon {
    width: 18px;
    height: 18px;
  }

  /* HIR */
  .hir-block {
    margin-top: 25px;
    opacity: 0;
    animation: fadeInHIR 1.5s forwards 11s;
  }

  @keyframes fadeInHIR {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hir-label {
    font-size: 1rem;
    color: #66ffbb;
    margin-bottom: 6px;
  }

  .hir-row {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .hir-value {
    font-size: 3rem;
    font-weight: bold;
    color: #00ff88;
    text-shadow: 0 0 32px #00ff88;
    animation: pulseHIR 1.2s infinite alternate;
  }

  @keyframes pulseHIR {
    from { text-shadow: 0 0 22px #00ff88; opacity: 0.85; }
    to   { text-shadow: 0 0 42px #00ffaa; opacity: 1; }
  }

  .hir-outof {
    font-size: 1rem;
    color: #66ffbb;
  }

  .comp-header {
  opacity: 1 !important;
  animation: none !important;
  margin-top: 40px;
}

.hir-explainer {
  opacity: 1 !important;
  animation: none !important;
  margin-top: 10px;
}

.btn-row {
  opacity: 1 !important;
  animation: none !important;
  margin-top: 25px;
}


  .insta-btn, .case-btn {
    padding: 10px 16px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: bold;
    font-size: 0.9rem;
    display: inline-block;
    width: auto;
  }

  .insta-btn {
    background: #ff2ea6;
    color: #fff;
    box-shadow: 0 0 10px #ff2ea6;
  }

  .case-btn {
    background: #00ff88;
    color: #000;
    box-shadow: 0 0 10px #00ff88;
  }
</style>
</head>

<body>

<a href="/associates.html" class="back-link">← Back to Associates</a>

<div id="bootSequence"></div>

<div id="profileContainer"></div>

<script>
function getQueryParam(key) {
  const url = new URL(window.location.href);
  return url.searchParams.get(key);
}

function playBootSequence() {
  const boot = [
    "> INITIALIZING SECURE PROFILE VIEWER...",
    "> ESTABLISHING ENCRYPTED LINK...",
    "> AUTHENTICATING USER ACCESS LEVEL: APPROVED",
    "> DECRYPTING ASSOCIATE DOSSIER...",
    "> LOADING INTELLIGENCE METRICS...",
    "> RENDERING PROFILE..."
  ];

  let i = 0;
  const el = document.getElementById("bootSequence");

  const interval = setInterval(() => {
    if (i < boot.length) {
      el.innerHTML += boot[i] + "\n";
      i++;
    } else {
      clearInterval(interval);

      setTimeout(() => {
        el.style.opacity = 0;
        setTimeout(() => el.remove(), 1500);
      }, 1500);
    }
  }, 600);
}

async function loadProfile() {
  playBootSequence();

  const id = (getQueryParam("id") || "").trim();

  const res = await fetch(
    "https://script.google.com/macros/s/AKfycbwMPK8PCo5IgaeObx3Q8vD4dzqz3EQyLQyrS7Bru6Kx1K_DI6uaxIOfFrOx4OCGzDz0/exec",
    {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action: "getAssociates" })
    }
  );

  const data = await res.json();
  const associate = data.associates.find(a =>
    (a.associateId || "").trim() === id
  );

  const photoUrl = associate.photoUrl;

  /* Build flex icons */
  const rating = Number(associate.avgCommunityRating || 0);
  let flexIcons = "";
  for (let i = 1; i <= 10; i++) {
    flexIcons += `
      <img 
        src="https://img.icons8.com/fluency-systems-filled/50/${i <= rating ? 'ffd700' : '777777'}/flex-biceps.png" 
        class="flex-icon"
      >
    `;
  }

  document.getElementById("profileContainer").innerHTML = `
    <div class="profile-wrapper">

      <img src="${photoUrl}" class="photo"
        onerror="this.src='https://via.placeholder.com/400x300/111111/00ff88?text=Photo+Unavailable'" />

      <div class="details">

        <div class="name">${associate.name}</div>

        <div class="field" style="animation-delay:2.5s">
          <div class="field-label">Specialty:</div>
          <div class="field-value">${associate.specialty || "—"}</div>
        </div>

        <div class="field" style="animation-delay:4.5s">
          <div class="field-label">Bio:</div>
          <div class="field-value">${associate.bio || "—"}</div>
        </div>

        <div class="field" style="animation-delay:6.5s">
          <div class="field-label">Cases Completed:</div>
          <div class="field-value">${associate.casesCompleted || 0}</div>
        </div>

        <div class="field" style="animation-delay:8.5s">
          <div class="field-label">Community Rating:</div>
          <div class="field-value">
            ${rating.toFixed(1).replace(".", "<span style='font-family:sans-serif;'>.</span>")}
            <div class="rating-icons">${flexIcons}</div>
          </div>
        </div>

        <div class="hir-block">
          <div class="hir-label">Hansen Intelligence Rating (HIR):</div>

          <div class="hir-row">
            <div class="hir-value">${associate.HIR || "—"}</div>
            <div class="hir-outof">out of 100</div>
          </div>
        </div>

        <div class="comp-header">ASSOCIATES COMPETITION</div>

        <div class="hir-explainer">
          This is a competition among associates. The Hansen Intelligence Rating (HIR) is the core competitive metric of the MR. Hansen Firm. It reflects performance, precision, client impact, community trust, and overall intelligence output. 
          <a href="/dashboard.html" style="color:#00ffaa; text-decoration:underline; text-decoration-thickness:1px;">
            &lt; Associates Rankings Dashboard
          </a>
        </div>

        <div class="btn-row">
          <a class="insta-btn"
             href="https://instagram.com/${associate.instagram}"
             target="_blank"
             rel="noopener noreferrer">
             Instagram
          </a>

          <a class="case-btn" href="/case.html?id=${associate.associateId.trim()}">
            Assign Case
          </a>
        </div>

      </div>
    </div>
  `;
}

loadProfile();
</script>

</body>
</html>
