<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Associate Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    background: #000;
    color: #00ff88;
    font-family: "Courier New", monospace;
    padding: 30px;
    max-width: 900px;
    margin: auto;
  }

  .profile-container {
    background: #0a0a0a;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 0 20px #00ff88;
  }

  .photo {
    width: 100%;
    height: 340px;
    object-fit: cover;
    border-radius: 12px;
    margin-bottom: 20px;
    box-shadow: 0 0 15px #00ff88;
  }

  .name {
    font-size: 1.8rem;
    font-weight: bold;
    margin-bottom: 10px;
    text-shadow: 0 0 12px #00ff88;
  }

  .specialty {
    font-size: 1.2rem;
    margin-bottom: 14px;
    color: #00ffaa;
  }

  .bio {
    font-size: 1rem;
    margin-bottom: 22px;
    color: #baffd9;
    line-height: 1.55;
  }

  .stats {
    margin-top: 20px;
    margin-bottom: 25px;
    padding: 15px;
    background: #050505;
    border-radius: 10px;
    box-shadow: 0 0 12px #00ff88;
  }

  .stats div {
    margin: 6px 0;
    font-size: 1rem;
  }

  .insta-btn, .case-btn {
    display: block;
    width: 100%;
    text-align: center;
    padding: 12px 18px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: bold;
    margin-bottom: 14px;
    transition: 0.2s;
    font-size: 1rem;
  }

  .insta-btn {
    background: #ff2ea6;
    color: #fff;
    box-shadow: 0 0 12px #ff2ea6;
  }

  .insta-btn:hover {
    background: #ff5fbd;
    box-shadow: 0 0 18px #ff5fbd;
    transform: scale(1.03);
  }

  .case-btn {
    background: #00ff88;
    color: #000;
    box-shadow: 0 0 12px #00ff88;
  }

  .case-btn:hover {
    background: #00ffaa;
    box-shadow: 0 0 18px #00ffaa;
    transform: scale(1.03);
  }

  @media (max-width: 480px) {
    .insta-btn {
      font-size: 15px !important;
      padding: 10px 14px !important;
      margin-top: 12px !important;
    }

    .case-btn {
      margin-top: 12px !important;
    }

    .bio {
      margin-bottom: 26px !important;
    }
  }
</style>
</head>

<body>

<div class="profile-container" id="profileContainer">
  Loading profile...
</div>

<script>
function getQueryParam(key) {
  const url = new URL(window.location.href);
  return url.searchParams.get(key);
}

async function loadProfile() {
  const id = (getQueryParam("id") || "").trim();

  if (!id) {
    document.getElementById("profileContainer").innerHTML = "Invalid profile.";
    return;
  }

  try {
    const res = await fetch(
      "https://script.google.com/macros/s/AKfycbwMPK8PCo5IgaeObx3Q8vD4dzqz3EQyLQyrS7Bru6Kx1K_DI6uaxIOfFrOx4OCGzDz0/exec",
      {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action: "getAssociates" })
      }
    );

    const data = await res.json();
    if (!data.success) {
      document.getElementById("profileContainer").innerHTML = "Error loading profile.";
      return;
    }

    const associate = data.associates.find(a =>
      (a.associateId || "").trim() === id
    );

    if (!associate) {
      document.getElementById("profileContainer").innerHTML = "Profile not found.";
      return;
    }

    const photoUrl = associate.photoUrl || "https://via.placeholder.com/400x300/111111/00ff88?text=No+Photo";

    document.getElementById("profileContainer").innerHTML = `
      <img src="${photoUrl}" class="photo"
        onerror="this.src='https://via.placeholder.com/400x300/111111/00ff88?text=Photo+Unavailable'" />

      <div class="name">${associate.name}</div>
      <div class="specialty">${associate.specialty || "Intelligence Specialist"}</div>
      <div class="bio">${associate.bio || "No bio provided."}</div>

      <div class="stats">
        <div><strong>Cases Completed:</strong> ${associate.casesCompleted || 0}</div>
        <div><strong>Client Rating:</strong> ${associate.avgClientRating || "—"}</div>
        <div><strong>Community Rating:</strong> ${associate.avgCommunityRating || "—"}</div>
        <div><strong>HIR:</strong> ${associate.HIR || "—"}</div>
      </div>

      <a class="insta-btn"
         href="https://instagram.com/${associate.instagram}"
         target="_blank"
         rel="noopener noreferrer">
         Instagram
      </a>

      <a class="case-btn" href="/case.html?id=${associate.associateId.trim()}">
        Assign Case to This Associate
      </a>
    `;
  } catch (err) {
    document.getElementById("profileContainer").innerHTML = "Error loading profile.";
  }
}

loadProfile();
</script>

</body>
</html>
