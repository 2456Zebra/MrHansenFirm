<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firm Admin — MR. HANSEN FIRM</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #0d0d0d;
        color: #e5e5e5;
        font-family: Arial, sans-serif;
    }

    /* Header */
    .admin-header {
        background: #111;
        padding: 20px;
        text-align: center;
        font-size: 22px;
        border-bottom: 1px solid #333;
    }

    /* Action List */
    .admin-actions {
        padding: 20px;
        max-width: 600px;
        margin: auto;
    }

    .admin-btn {
        width: 100%;
        background: #1a1a1a;
        border: 1px solid #333;
        padding: 15px;
        margin-bottom: 15px;
        color: #e5e5e5;
        font-size: 18px;
        cursor: pointer;
        text-align: left;
        border-radius: 6px;
        transition: 0.2s;
    }

    .admin-btn:hover {
        background: #222;
        border-color: #555;
    }

    /* Modal Base */
    .modal-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.7);
        z-index: 9999;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .modal-panel {
        background: #111;
        border: 1px solid #444;
        padding: 20px;
        width: 100%;
        max-width: 600px;
        max-height: 90vh;
        overflow-y: auto;
        border-radius: 8px;
    }

    .close-btn {
        background: #222;
        border: 1px solid #444;
        padding: 8px 12px;
        float: right;
        cursor: pointer;
        border-radius: 4px;
        color: #ccc;
    }

    .close-btn:hover {
        background: #333;
    }
</style>
</head>

<body>

<div class="admin-header">
    FIRM ADMIN PORTAL
</div>

<div class="admin-actions">
    <button class="admin-btn" onclick="openPanel('casesPanel')">Case Management</button>
    <button class="admin-btn" onclick="openPanel('associatesPanel')">Associate Management</button>
    <button class="admin-btn" onclick="openPanel('clientsPanel')">Client Management</button>
    <button class="admin-btn" onclick="openPanel('publicPanel')">Public Case Approval</button>
    <button class="admin-btn" onclick="openPanel('settingsPanel')">System Settings</button>
</div>

<!-- Modal Overlay -->
<div id="modalOverlay" class="modal-overlay">
    <div id="modalPanel" class="modal-panel">
        <button class="close-btn" onclick="closePanel()">Close</button>
        <div id="modalContent"></div>
    </div>
</div>

<script>
function openPanel(panelName) {
    document.getElementById("modalOverlay").style.display = "flex";
    document.getElementById("modalContent").innerHTML = window[panelName];
}

function closePanel() {
    document.getElementById("modalOverlay").style.display = "none";
}
</script>

</body>
</html>
