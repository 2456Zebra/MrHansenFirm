<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firm Admin — MR. HANSEN FIRM</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #0d0d0d;
        color: #e5e5e5;
        font-family: Arial, sans-serif;
    }

    .admin-header {
        background: #111;
        padding: 20px;
        text-align: center;
        font-size: 22px;
        border-bottom: 1px solid #333;
    }

    .admin-actions {
        padding: 20px;
        max-width: 600px;
        margin: auto;
    }

    .admin-btn {
        width: 100%;
        background: #1a1a1a;
        border: 1px solid #333;
        padding: 15px;
        margin-bottom: 15px;
        color: #e5e5e5;
        font-size: 18px;
        cursor: pointer;
        text-align: left;
        border-radius: 6px;
        transition: 0.2s;
    }

    .admin-btn:hover {
        background: #222;
        border-color: #555;
    }

    .modal-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.7);
        z-index: 9999;
        justify-content: center;
        align-items: center;
        padding: 10px;
    }

    .modal-panel {
        background: #111;
        border: 1px solid #444;
        padding: 16px;
        width: 100%;
        max-width: 92vw;
        max-height: 90vh;
        overflow-y: auto;
        border-radius: 8px;
        box-sizing: border-box;
        margin: 0 auto;
    }

    .close-btn {
        background: #222;
        border: 1px solid #444;
        padding: 8px 12px;
        cursor: pointer;
        border-radius: 4px;
        color: #ccc;
    }

    .close-btn:hover {
        background: #333;
    }
</style>
</head>

<body>

<div class="admin-header">
    FIRM ADMIN PORTAL
</div>

<div class="admin-actions">
    <button class="admin-btn" onclick="openPanel('casesPanel')">Case Management</button>
    <button class="admin-btn" onclick="openPanel('associatesPanel')">Associate Management</button>
    <button class="admin-btn" onclick="openPanel('clientsPanel')">Client Management</button>
    <button class="admin-btn" onclick="openPanel('publicPanel')">Public Case Approval</button>
    <button class="admin-btn" onclick="openPanel('settingsPanel')">System Settings</button>
</div>

<div id="modalOverlay" class="modal-overlay">
    <div id="modalPanel" class="modal-panel">

        <div style="display:flex; justify-content:flex-end; margin-bottom:10px;">
            <button class="close-btn" onclick="closePanel()">Close</button>
        </div>

        <div id="modalContent"></div>
    </div>
</div>

<script>
function openPanel(panelName) {
    document.getElementById("modalOverlay").style.display = "flex";
    document.getElementById("modalContent").innerHTML = window[panelName];
}

function closePanel() {
    document.getElementById("modalOverlay").style.display = "none";
}
</script>

<script>
window.casesPanel = `
    <h2 style="margin-top:0; color:#9cf;">Case Management</h2>

    <p style="color:#ccc; margin-bottom:15px;">
        View, filter, and manage all cases. You may approve any case for public view,
        even if the associate did not recommend it.
    </p>

    <div style="margin-bottom:15px;">
        <button onclick="filterCases('all')" class="filter-btn">All</button>
        <button onclick="filterCases('open')" class="filter-btn">Open</button>
        <button onclick="filterCases('review')" class="filter-btn">In Review</button>
        <button onclick="filterCases('completed')" class="filter-btn">Completed</button>
        <button onclick="filterCases('closed')" class="filter-btn">Closed</button>
    </div>

    <div id="caseList" style="margin-top:10px;">
        <p style="color:#777;">Loading cases...</p>
    </div>
`;

let allCases = [
    {
        id: "2026-001",
        client: "John Doe",
        associate: "Raven Hale",
        status: "completed",
        recommended: true,
        clientText: "Over the past month, I’ve noticed irregular access to restricted folders within our internal document system. Several files were opened outside normal business hours, and I have reason to believe an employee may be misusing their credentials.",
        associateNotes: "Initial review of access logs confirms multiple after-hours entries tied to a single workstation. No corresponding work orders or scheduled tasks justify the activity. Further analysis recommended.",
        internalNotes: "Potential internal breach. Recommend deeper credential audit and workstation imaging."
    },
    {
        id: "2026-002",
        client: "Acme Corp",
        associate: "Marcus V.",
        status: "open",
        recommended: false,
        clientText: "We’ve detected unusual login attempts from an internal account that should be inactive. The activity appears to be escalating.",
        associateNotes: "Reviewed authentication logs. Activity originates from VPN endpoint. Possible credential compromise.",
        internalNotes: "Flag for immediate credential reset and endpoint isolation."
    },
    {
        id: "2026-003",
        client: "Sarah L.",
        associate: "Raven Hale",
        status: "review",
        recommended: false,
        clientText: "Sensitive HR files were accessed without authorization. I suspect internal misuse.",
        associateNotes: "Preliminary review shows unauthorized access from shared workstation. Needs deeper audit.",
        internalNotes: "Possible policy violation. Recommend workstation imaging."
    }
];

function renderCases(list) {
    const container = document.getElementById("caseList");

    if (!list.length) {
        container.innerHTML = `<p style="color:#777;">No cases found.</p>`;
        return;
    }

    container.innerHTML = list.map(c => `
        <div style="background:#1a1a1a; border:1px solid #333; padding:15px; margin-bottom:12px; border-radius:6px;">
            <div style="font-size:18px; color:#9cf;">Case #${c.id}</div>
            <div style="color:#ccc; margin-top:5px;">
                <strong>Client:</strong> ${c.client}<br>
                <strong>Associate:</strong> ${c.associate}<br>
                <strong>Status:</strong> ${c.status.toUpperCase()}<br>
                <strong>Associate Recommendation:</strong>
                ${c.recommended ? `<span style="color:#6f6;">Recommended</span>` : `<span style="color:#f66;">Not Recommended</span>`}
            </div>

            <button onclick="openCaseDetails('${c.id}')" 
                style="margin-top:12px; background:#222; border:1px solid #444; padding:10px 14px; color:#ccc; border-radius:4px; cursor:pointer;">
                Open Case
            </button>
        </div>
    `).join("");
}

function filterCases(type) {
    if (type === "all") return renderCases(allCases);
    renderCases(allCases.filter(c => c.status === type));
}

function openCaseDetails(caseId) {
    const c = allCases.find(x => x.id === caseId);

    const html = `
        <h2 style="margin-top:0; color:#9cf;">Case #${c.id}</h2>

        <h3 style="color:#9cf;">Client’s Statement</h3>
        <p style="color:#ccc; white-space:pre-wrap;">${c.clientText}</p>

        <h3 style="color:#9cf;">Associate Notes</h3>
        <p style="color:#ccc; white-space:pre-wrap;">${c.associateNotes}</p>

        <h3 style="color:#9cf;">Internal Notes (Firm Only)</h3>
        <p style="color:#ccc; white-space:pre-wrap;">${c.internalNotes}</p>

        <h3 style="color:#9cf;">Public Summary (this will appear on the View Cases page)</h3>
        <textarea id="publicSummary" style="width:100%; height:120px; background:#1a1a1a; border:1px solid #333; color:#ccc; padding:10px; border-radius:6px;"></textarea>

        <button onclick="saveSummary('${c.id}')" class="save-btn" 
            style="margin-top:12px; background:#222; border:1px solid #444; padding:10px 14px; color:#ccc; border-radius:4px; cursor:pointer;">
            Save Summary
        </button>

        <h3 style="color:#9cf; margin-top:20px;">Public View Controls</h3>

        <button onclick="approvePublic('${c.id}')" class="approve-btn"
            style="background:#1f3d1f; border:1px solid #3f6f3f; padding:10px 14px; color:#9f9; border-radius:4px; cursor:pointer; margin-right:10px;">
            Approve for Public View
        </button>

        <button onclick="rejectPublic('${c.id}')" class="reject-btn"
            style="background:#3d1f1f; border:1px solid #6f3f3f; padding:10px 14px; color:#f99; border-radius:4px; cursor:pointer;">
            Reject
        </button>
    `;

    document.getElementById("modalContent").innerHTML = html;
}

function approvePublic(id) {
    alert("Case " + id + " approved for public view.");
}

function rejectPublic(id) {
    alert("Case " + id + " rejected.");
}

function saveSummary(id) {
    const text = document.getElementById("publicSummary").value;
    alert("Summary saved for case " + id + ".");
}

document.addEventListener("click", function(e) {
    if (e.target && e.target.innerText.includes("Case Management")) {
        setTimeout(() => renderCases(allCases), 50);
    }
});
</script>

<div style="text-align:center; margin:40px 0;">
    <a href="index.html" style="color:#77c0ff; text-decoration:none; font-family:Consolas, monospace; font-size:1rem; border-bottom:1px solid #444; padding-bottom:2px;">
        ‹ Back to Home
    </a>
</div>

</body>
</html>
