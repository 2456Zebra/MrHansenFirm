<script>
function openPanel(panelName) {
    const overlay = document.getElementById("modalOverlay");
    const content = document.getElementById("modalContent");

    overlay.style.display = "flex";
    content.innerHTML = window[panelName] || "<p style='color:#f88;'>Panel not available.</p>";

    if (panelName === "casesPanel") setTimeout(() => renderCases(allCases), 10);
    if (panelName === "associatesPanel") setTimeout(() => renderAssociates(), 10);
    if (panelName === "timelinePanel") setTimeout(() => renderTimeline(), 10);
    if (panelName === "caseLoadPanel") setTimeout(() => renderCaseLoadDashboard(), 10);
}

function closePanel() {
    document.getElementById("modalOverlay").style.display = "none";
}
</script>

<!-- ===================== CASE SEVERITY & AGING HELPERS (MODULE 5) ===================== -->

<script>
function getSeverityBadge(sev) {
    if (!sev) return "";
    const s = sev.toLowerCase();
    let cls = "badge-sev-low";
    if (s === "critical") cls = "badge-sev-critical";
    else if (s === "high") cls = "badge-sev-high";
    else if (s === "medium") cls = "badge-sev-medium";
    return `<span class="badge ${cls}">${sev.toUpperCase()}</span>`;
}

function getCaseAgeDays(caseObj) {
    if (!caseObj.openedAt) return null;
    const opened = new Date(caseObj.openedAt);
    const now = new Date();
    const diffMs = now - opened;
    return Math.floor(diffMs / (1000 * 60 * 60 * 24));
}

function getAgingBadge(caseObj) {
    const days = getCaseAgeDays(caseObj);
    if (days === null || isNaN(days)) return "";

    let cls = "badge-age-fresh";
    let label = `${days} day${days === 1 ? "" : "s"}`;

    if (days >= 45) {
        cls = "badge-age-overdue";
        label = `${days} days — OVERDUE`;
    } else if (days >= 30) {
        cls = "badge-age-stale";
    } else if (days >= 14) {
        cls = "badge-age-aging";
    }

    return `<span class="badge ${cls}">${label}</span>`;
}

function computeRiskScore(caseObj) {
    let score = 0;

    const sev = (caseObj.severity || "").toLowerCase();
    if (sev === "critical") score += 40;
    else if (sev === "high") score += 25;
    else if (sev === "medium") score += 10;
    else if (sev === "low") score += 5;

    const days = getCaseAgeDays(caseObj) || 0;
    if (days > 45) score += 30;
    else if (days > 30) score += 20;
    else if (days > 14) score += 10;

    if (caseObj.previousAssociates && caseObj.previousAssociates.length >= 2) {
        score += 10;
    }

    const assoc = associates.find(a => a.name === caseObj.associate);
    if (assoc) {
        if (assoc.flag) score += 10;
        if (assoc.status === "suspended") score += 20;
    }

    if (caseObj.status === "review") score += 5;

    return score;
}

function getRiskLabel(score) {
    if (score >= 70) return "CRITICAL RISK";
    if (score >= 50) return "HIGH RISK";
    if (score >= 30) return "ELEVATED RISK";
    return "BASELINE";
}

function getRiskBadge(score) {
    const label = getRiskLabel(score);
    let cls = "badge-age-fresh";
    if (score >= 70) cls = "badge-sev-critical";
    else if (score >= 50) cls = "badge-sev-high";
    else if (score >= 30) cls = "badge-age-aging";
    return `<span class="badge ${cls}">${label}</span>`;
}
</script>

<!-- ===================== CASE LOAD DASHBOARD (MODULE 4 + 5) ===================== -->

<script>
window.caseLoadPanel = `
    <h2 style="margin-top:0; color:#9cf;">Case Load Dashboard</h2>

    <p style="color:#ccc; margin-bottom:15px;">
        Real‑time operational overview of associate workload, case distribution, severity, and aging risk.
    </p>

    <!-- METRIC TILES -->
    <div id="metricTiles" style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:20px;">
        <div class="metric-tile" id="tileTotalCases"></div>
        <div class="metric-tile" id="tileReviewCases"></div>
        <div class="metric-tile" id="tileCompletedCases"></div>
        <div class="metric-tile" id="tileCriticalCases"></div>
        <div class="metric-tile" id="tileOverdueCases"></div>
        <div class="metric-tile" id="tileFlaggedAssociates"></div>
        <div class="metric-tile" id="tileSuspendedAssociates"></div>
    </div>

    <!-- ASSOCIATE LOAD CARDS -->
    <div id="loadCards">
        <p style="color:#777;">Loading workload...</p>
    </div>

    <!-- HIGH RISK CASES -->
    <h3 style="color:#9cf; margin-top:25px;">High‑Risk & Overdue Cases</h3>
    <div id="highRiskCases">
        <p style="color:#777;">Scanning cases...</p>
    </div>
`;

/* METRIC TILE STYLES */
const metricTileStyle = `
    background:#1a1a1a;
    border:1px solid #333;
    padding:14px;
    border-radius:6px;
    flex:1 1 calc(50% - 10px);
    min-width:140px;
    text-align:center;
`;

function renderMetricTiles() {
    const totalCases = allCases.length;
    const reviewCases = allCases.filter(c => c.status === "review").length;
    const completedCases = allCases.filter(c => c.status === "completed").length;

    const criticalCases = allCases.filter(c => (c.severity || "").toLowerCase() === "critical").length;
    const overdueCases = allCases.filter(c => {
        const days = getCaseAgeDays(c) || 0;
        return days >= 45;
    }).length;

    const flaggedAssociates = associates.filter(a => a.flag).length;
    const suspendedAssociates = associates.filter(a => a.status === "suspended").length;

    document.getElementById("tileTotalCases").style = metricTileStyle;
    document.getElementById("tileTotalCases").innerHTML = `
        <div style="font-size:22px; color:#9cf;">${totalCases}</div>
        <div style="color:#ccc; font-size:14px;">Total Cases</div>
    `;

    document.getElementById("tileReviewCases").style = metricTileStyle;
    document.getElementById("tileReviewCases").innerHTML = `
        <div style="font-size:22px; color:#ffdd99;">${reviewCases}</div>
        <div style="color:#ccc; font-size:14px;">In Review</div>
    `;

    document.getElementById("tileCompletedCases").style = metricTileStyle;
    document.getElementById("tileCompletedCases").innerHTML = `
        <div style="font-size:22px; color:#9f9;">${completedCases}</div>
        <div style="color:#ccc; font-size:14px;">Completed</div>
    `;

    document.getElementById("tileCriticalCases").style = metricTileStyle;
    document.getElementById("tileCriticalCases").innerHTML = `
        <div style="font-size:22px; color:#ff7777;">${criticalCases}</div>
        <div style="color:#ccc; font-size:14px;">Critical Severity</div>
    `;

    document.getElementById("tileOverdueCases").style = metricTileStyle;
    document.getElementById("tileOverdueCases").innerHTML = `
        <div style="font-size:22px; color:#ff9999;">${overdueCases}</div>
        <div style="color:#ccc; font-size:14px;">Overdue Cases</div>
    `;

    document.getElementById("tileFlaggedAssociates").style = metricTileStyle;
    document.getElementById("tileFlaggedAssociates").innerHTML = `
        <div style="font-size:22px; color:#ffdd99;">${flaggedAssociates}</div>
        <div style="color:#ccc; font-size:14px;">Flagged Associates</div>
    `;

    document.getElementById("tileSuspendedAssociates").style = metricTileStyle;
    document.getElementById("tileSuspendedAssociates").innerHTML = `
        <div style="font-size:22px; color:#f99;">${suspendedAssociates}</div>
        <div style="color:#ccc; font-size:14px;">Suspended</div>
    `;
}

/* LOAD BAR GENERATOR */
function generateLoadBar(count) {
    const max = 8; // visual scale
    const pct = Math.min(count / max, 1);

    let color = "#3f6f3f"; // green
    if (pct >= 0.75) color = "#6f3f3f"; // red
    else if (pct >= 0.5) color = "#6f6f3f"; // yellow

    return `
        <div style="background:#222; width:100%; height:10px; border-radius:4px; overflow:hidden; margin-top:6px;">
            <div style="width:${pct * 100}%; height:100%; background:${color};"></div>
        </div>
    `;
}

/* RENDER ASSOCIATE LOAD CARDS */
function renderLoadCards() {
    const container = document.getElementById("loadCards");
    if (!container) return;

    container.innerHTML = associates.map(a => {
        const assignedCases = allCases.filter(c => c.associate === a.name);
        const highRiskCount = assignedCases.filter(c => computeRiskScore(c) >= 50).length;

        return `
        <div style="background:#1a1a1a; border:1px solid #333; padding:15px; margin-bottom:12px; border-radius:6px;">
            <div style="font-size:18px; color:#9cf;">
                ${a.name}
                <span class="badge ${a.status === 'active' ? 'badge-status-active' : 'badge-status-suspended'}">
                    ${a.status.toUpperCase()}
                </span>
                ${
                    a.flag
                    ? `<span class="badge badge-flag">${a.flag}</span>`
                    : ""
                }
            </div>

            <div style="color:#ccc; margin-top:5px;">
                <strong>Assigned Cases:</strong> ${a.cases}
                ${generateLoadBar(a.cases)}
            </div>

            <div style="color:#ccc; margin-top:5px;">
                <strong>High‑Risk Cases:</strong> ${highRiskCount}
            </div>

            ${
                a.autoReactivate
                ? `<div style="color:#ffdd99; margin-top:6px;">Auto‑Reactivate: ${a.autoReactivate}</div>`
                : ""
            }

            <button onclick="openFullProfile('${a.id}')"
                style="margin-top:12px; background:#222; border:1px solid #444; padding:10px 14px; color:#ccc; border-radius:4px;">
                View Profile
            </button>
        </div>
    `;
    }).join("");
}

/* HIGH RISK CASE LIST */
function renderHighRiskCases() {
    const container = document.getElementById("highRiskCases");
    if (!container) return;

    const flagged = allCases
        .map(c => ({ c, score: computeRiskScore(c) }))
        .filter(x => x.score >= 50 || (getCaseAgeDays(x.c) || 0) >= 45)
        .sort((a, b) => b.score - a.score);

    if (!flagged.length) {
        container.innerHTML = `<p style="color:#777;">No high‑risk or overdue cases at this time.</p>`;
        return;
    }

    container.innerHTML = flagged.map(({ c, score }) => `
        <div style="background:#1a1a1a; border:1px solid #444; padding:12px; margin-bottom:10px; border-radius:6px;">
            <div style="color:#9cf; font-size:16px;">
                Case #${c.id}
                ${getSeverityBadge(c.severity)}
                ${getAgingBadge(c)}
            </div>
            <div style="color:#ccc; margin-top:4px;">
                <strong>Client:</strong> ${c.client}<br>
                <strong>Associate:</strong> ${c.associate}<br>
                <strong>Status:</strong> ${c.status.toUpperCase()}<br>
                <strong>Risk:</strong> ${getRiskBadge(score)}
            </div>
            <button onclick="openCaseDetails('${c.id}')"
                style="margin-top:8px; background:#222; border:1px solid #444; padding:8px 12px; color:#ccc; border-radius:4px;">
                Open Case
            </button>
        </div>
    `).join("");
}

/* MAIN RENDER FUNCTION */
function renderCaseLoadDashboard() {
    renderMetricTiles();
    renderLoadCards();
    renderHighRiskCases();
}
</script>

<!-- ===================== CASE MANAGEMENT ===================== -->

<script>
window.casesPanel = `
    <h2 style="margin-top:0; color:#9cf;">Case Management</h2>

    <p style="color:#ccc; margin-bottom:15px;">
        View, filter, and manage all cases.
    </p>

    <div style="margin-bottom:15px;">
        <button onclick="filterCases('all')">All</button>
        <button onclick="filterCases('open')">Open</button>
        <button onclick="filterCases('review')">In Review</button>
        <button onclick="filterCases('completed')">Completed</button>
        <button onclick="filterCases('closed')">Closed</button>
    </div>

    <div id="caseList" style="margin-top:10px;">
        <p style="color:#777;">Loading cases...</p>
    </div>
`;

let allCases = [
    {
        id: "2026-001",
        client: "John Doe",
        associate: "Raven Hale",
        status: "completed",
        recommended: true,
        severity: "High",
        openedAt: "2026-03-15T09:00:00",
        clientText: "Over the past month, I’ve noticed irregular access...",
        associateNotes: "Initial review of access logs confirms...",
        internalNotes: "Potential internal breach...",
        previousAssociates: []
    },
    {
        id: "2026-003",
        client: "Sarah L.",
        associate: "Raven Hale",
        status: "review",
        recommended: false,
        severity: "Critical",
        openedAt: "2026-02-20T10:30:00",
        clientText: "Sensitive HR files were accessed...",
        associateNotes: "Preliminary review shows unauthorized access...",
        internalNotes: "Possible policy violation...",
        previousAssociates: [
            {
                from: "Marcus V.",
                to: "Raven Hale",
                date: "2026-05-10 13:04",
                reason: "Client requested specialist"
            }
        ]
    }
];

function renderCases(list) {
    const container = document.getElementById("caseList");
    if (!container) return;

    if (!list.length) {
        container.innerHTML = `<p style="color:#777;">No cases found.</p>`;
        return;
    }

    container.innerHTML = list.map(c => {
        const ageBadge = getAgingBadge(c);
        const sevBadge = getSeverityBadge(c.severity);
        const riskScore = computeRiskScore(c);
        const riskBadge = getRiskBadge(riskScore);

        return `
        <div style="background:#1a1a1a; border:1px solid #333; padding:15px; margin-bottom:12px; border-radius:6px;">
            <div style="font-size:18px; color:#9cf;">
                Case #${c.id}
                ${sevBadge}
                ${ageBadge}
            </div>
            <div style="color:#ccc; margin-top:5px;">
                <strong>Client:</strong> ${c.client}<br>
                <strong>Associate:</strong> ${c.associate}<br>
                <strong>Status:</strong> ${c.status.toUpperCase()}<br>
                <strong>Risk:</strong> ${riskBadge}
            </div>

            ${
                c.previousAssociates && c.previousAssociates.length
                ? `<span class="badge">Reassigned</span>`
                : ""
            }

            <button onclick="openCaseDetails('${c.id}')"
                style="margin-top:12px; background:#222; border:1px solid #444; padding:10px 14px; color:#ccc; border-radius:4px;">
                Open Case
            </button>
        </div>
    `;
    }).join("");
}

function filterCases(type) {
    if (type === "all") return renderCases(allCases);
    renderCases(allCases.filter(c => c.status === type));
}

function openCaseDetails(caseId) {
    const c = allCases.find(x => x.id === caseId);
    if (!c) return;

    const ageBadge = getAgingBadge(c);
    const sevBadge = getSeverityBadge(c.severity);
    const riskScore = computeRiskScore(c);
    const riskBadge = getRiskBadge(riskScore);

    document.getElementById("modalContent").innerHTML = `
        <h2 style="margin-top:0; color:#9cf;">Case #${c.id}</h2>

        <p style="color:#ccc; margin-bottom:8px;">
            ${sevBadge} ${ageBadge} ${riskBadge}
        </p>

        <h3 style="color:#9cf;">Client’s Statement</h3>
        <p style="color:#ccc;">${c.clientText}</p>

        <h3 style="color:#9cf;">Associate Notes</h3>
        <p style="color:#ccc;">${c.associateNotes}</p>

        <h3 style="color:#9cf;">Internal Notes</h3>
        <p style="color:#ccc;">${c.internalNotes}</p>

        ${
            c.previousAssociates && c.previousAssociates.length
            ? `
                <h3 style="color:#9cf;">Reassignment History</h3>

                        c.previousAssociates.map(r => `

                        `).join("")
                    }

            `

        }

            Reassign Case
        </button>
    `;
}
</script>

<!-- ===================== REASSIGNMENT LOGIC ===================== -->

<script>
let caseBeingReassigned = null;

function openReassign(caseId) {
    caseBeingReassigned = allCases.find(c => c.id === caseId);
    if (!caseBeingReassigned) return;

    const select = document.getElementById("reassignSelect");
    select.innerHTML = "";

    associates.forEach(a => {
        if (a.status !== "active") {
            const opt = document.createElement("option");
            opt.value = "";
            opt.textContent = `${a.name} (SUSPENDED)`;
            opt.disabled = true;
            select.appendChild(opt);
            return;
        }

        const opt = document.createElement("option");
        opt.value = a.name;
        opt.textContent = a.flag ? `${a.name} — ${a.flag}` : a.name;
        select.appendChild(opt);
    });

    document.getElementById("reassignReason").value = "";
    document.getElementById("reassignOverlay").style.display = "flex";
}

function closeReassign() {
    document.getElementById("reassignOverlay").style.display = "none";
}

function confirmReassign() {
    const newAssociate = document.getElementById("reassignSelect").value;
    const reason = document.getElementById("reassignReason").value.trim();

    if (!newAssociate) return alert("Select an active associate.");
    if (!reason) return alert("Provide a reason.");

    const oldAssociate = caseBeingReassigned.associate;

    caseBeingReassigned.previousAssociates = caseBeingReassigned.previousAssociates || [];
    caseBeingReassigned.previousAssociates.push({
        from: oldAssociate,
        to: newAssociate,
        date: new Date().toLocaleString(),
        reason
    });

    caseBeingReassigned.associate = newAssociate;

    const oldA = associates.find(a => a.name === oldAssociate);
    const newA = associates.find(a => a.name === newAssociate);

    if (oldA) oldA.cases = Math.max(0, oldA.cases - 1);
    if (newA) newA.cases += 1;

    activityLog.push({
        type: "reassignment",
        actor: "Firm Admin",
        target: `Case #${caseBeingReassigned.id}`,
        details: `Reassigned from ${oldAssociate} → ${newAssociate}`,
        timestamp: new Date().toLocaleString()
    });

    closeReassign();
    closePanel();

    alert(`Case reassigned from ${oldAssociate} to ${newAssociate}.`);

    renderCases(allCases);
}
</script>
