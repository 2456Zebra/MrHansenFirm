<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Firm Admin — MR. HANSEN FIRM</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #0d0d0d;
        color: #e5e5e5;
        font-family: Arial, sans-serif;
    }

    .admin-header {
        background: #111;
        padding: 20px;
        text-align: center;
        font-size: 22px;
        border-bottom: 1px solid #333;
    }

    .admin-actions {
        padding: 20px;
        max-width: 600px;
        margin: auto;
    }

    .admin-btn {
        width: 100%;
        background: #1a1a1a;
        border: 1px solid #333;
        padding: 15px;
        margin-bottom: 15px;
        color: #e5e5e5;
        font-size: 18px;
        cursor: pointer;
        text-align: left;
        border-radius: 6px;
        transition: 0.2s;
    }

    .admin-btn:hover {
        background: #222;
        border-color: #555;
    }

    .badge {
        display: inline-block;
        padding: 3px 6px;
        background: #333;
        border-radius: 4px;
        color: #ccc;
        font-size: 12px;
        margin-left: 6px;
    }

    .badge-status-active {
        background: #1f3d1f;
        color: #9f9;
    }

    .badge-status-suspended {
        background: #3d1f1f;
        color: #f99;
    }

    .badge-flag {
        background: #333;
        color: #ffdd99;
    }

    .modal-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.7);
        z-index: 9999;
        justify-content: center;
        align-items: center;
        padding: 10px;
    }

    .modal-panel {
        background: #111;
        border: 1px solid #444;
        padding: 16px;
        width: 100%;
        max-width: 92vw;
        max-height: 90vh;
        overflow-y: auto;
        border-radius: 8px;
        box-sizing: border-box;
        margin-left: auto;
        margin-right: 6vw;
    }

    .close-btn {
        background: #222;
        border: 1px solid #444;
        padding: 8px 12px;
        cursor: pointer;
        border-radius: 4px;
        color: #ccc;
    }

    .close-btn:hover {
        background: #333;
    }
</style>
</head>

<body>

<div class="admin-header">FIRM ADMIN PORTAL</div>

<div class="admin-actions">
    <button class="admin-btn" onclick="openPanel('casesPanel')">Case Management</button>
    <button class="admin-btn" onclick="openPanel('associatesPanel')">Associate Management</button>
    <button class="admin-btn" onclick="openPanel('publicPanel')">Public Case Approval</button>
    <button class="admin-btn" onclick="openPanel('settingsPanel')">System Settings</button>
</div>

<!-- MAIN MODAL -->
<div id="modalOverlay" class="modal-overlay">
    <div id="modalPanel" class="modal-panel">
        <div style="display:flex; justify-content:flex-end; margin-bottom:10px;">
            <button class="close-btn" onclick="closePanel()">Close</button>
        </div>
        <div id="modalContent"></div>
    </div>
</div>

<script>
function openPanel(panelName) {
    const overlay = document.getElementById("modalOverlay");
    const content = document.getElementById("modalContent");

    overlay.style.display = "flex";
    content.innerHTML = window[panelName] || "<p style='color:#f88;'>Panel not available.</p>";

    if (panelName === "casesPanel") setTimeout(() => renderCases(allCases), 10);
    if (panelName === "associatesPanel") setTimeout(() => renderAssociates(), 10);
}

function closePanel() {
    document.getElementById("modalOverlay").style.display = "none";
}
</script>

<!-- ===================== CASE MANAGEMENT ===================== -->

<script>
window.casesPanel = `
    <h2 style="margin-top:0; color:#9cf;">Case Management</h2>

    <p style="color:#ccc; margin-bottom:15px;">
        View, filter, and manage all cases.
    </p>

    <div style="margin-bottom:15px;">
        <button onclick="filterCases('all')">All</button>
        <button onclick="filterCases('open')">Open</button>
        <button onclick="filterCases('review')">In Review</button>
        <button onclick="filterCases('completed')">Completed</button>
        <button onclick="filterCases('closed')">Closed</button>
    </div>

    <div id="caseList" style="margin-top:10px;">
        <p style="color:#777;">Loading cases...</p>
    </div>
`;

let allCases = [
    {
        id: "2026-001",
        client: "John Doe",
        associate: "Raven Hale",
        status: "completed",
        recommended: true,
        clientText: "Over the past month, I’ve noticed irregular access...",
        associateNotes: "Initial review of access logs confirms...",
        internalNotes: "Potential internal breach...",
        previousAssociates: []
    },
    {
        id: "2026-003",
        client: "Sarah L.",
        associate: "Raven Hale",
        status: "review",
        clientText: "Sensitive HR files were accessed...",
        associateNotes: "Preliminary review shows unauthorized access...",
        internalNotes: "Possible policy violation...",
        previousAssociates: [
            {
                from: "Marcus V.",
                to: "Raven Hale",
                date: "2026-05-10 13:04",
                reason: "Client requested specialist"
            }
        ]
    }
];

function renderCases(list) {
    const container = document.getElementById("caseList");
    if (!container) return;

    if (!list.length) {
        container.innerHTML = `<p style="color:#777;">No cases found.</p>`;
        return;
    }

    container.innerHTML = list.map(c => `
        <div style="background:#1a1a1a; border:1px solid #333; padding:15px; margin-bottom:12px; border-radius:6px;">
            <div style="font-size:18px; color:#9cf;">Case #${c.id}</div>
            <div style="color:#ccc; margin-top:5px;">
                <strong>Client:</strong> ${c.client}<br>
                <strong>Associate:</strong> ${c.associate}<br>
                <strong>Status:</strong> ${c.status.toUpperCase()}
            </div>

            ${
                c.previousAssociates && c.previousAssociates.length
                ? `<span class="badge">Reassigned</span>`
                : ""
            }

            <button onclick="openCaseDetails('${c.id}')" 
                style="margin-top:12px; background:#222; border:1px solid #444; padding:10px 14px; color:#ccc; border-radius:4px;">
                Open Case
            </button>
        </div>
    `).join("");
}

function filterCases(type) {
    if (type === "all") return renderCases(allCases);
    renderCases(allCases.filter(c => c.status === type));
}

function openCaseDetails(caseId) {
    const c = allCases.find(x => x.id === caseId);
    if (!c) return;

    document.getElementById("modalContent").innerHTML = `
        <h2 style="margin-top:0; color:#9cf;">Case #${c.id}</h2>

        <h3 style="color:#9cf;">Client’s Statement</h3>
        <p style="color:#ccc;">${c.clientText}</p>

        <h3 style="color:#9cf;">Associate Notes</h3>
        <p style="color:#ccc;">${c.associateNotes}</p>

        <h3 style="color:#9cf;">Internal Notes</h3>
        <p style="color:#ccc;">${c.internalNotes}</p>

        ${
            c.previousAssociates && c.previousAssociates.length
            ? `
                <h3 style="color:#9cf;">Reassignment History</h3>
                <ul style="color:#ccc; padding-left:18px;">
                    ${
                        c.previousAssociates.map(r => `
                            <li>
                                ${r.date}: ${r.from} → ${r.to} — ${r.reason}
                            </li>
                        `).join("")
                    }
                </ul>
            `
            : ""
        }

        <button onclick="openReassign('${c.id}')"
            style="margin-top:12px; background:#1f3d1f; border:1px solid #3f6f3f; padding:10px 14px; color:#9f9; border-radius:4px;">
            Reassign Case
        </button>
    `;
}

<!-- ===================== ASSOCIATE MANAGEMENT ===================== -->

<script>
window.associatesPanel = `
    <h2 style="margin-top:0; color:#9cf;">Associate Management</h2>

    <p style="color:#ccc; margin-bottom:15px;">
        View all associates, their status, flags, and case load.
    </p>

    <div id="associateList" style="margin-top:10px;">
        <p style="color:#777;">Loading associates...</p>
    </div>
`;

let associates = [
    {
        id: "A-001",
        name: "Raven Hale",
        status: "active",
        cases: 4,
        username: "ravenhale",
        flag: "",
        autoReactivate: ""
    },
    {
        id: "A-002",
        name: "Marcus V.",
        status: "active",
        cases: 2,
        username: "marcusv",
        flag: "Under Review",
        autoReactivate: ""
    },
    {
        id: "A-003",
        name: "Elena S.",
        status: "suspended",
        cases: 0,
        username: "elenas",
        flag: "Pending HR Review",
        autoReactivate: "2026-06-01"
    }
];

function renderAssociates() {
    const container = document.getElementById("associateList");
    if (!container) return;

    container.innerHTML = associates.map(a => `
        <div style="background:#1a1a1a; border:1px solid #333; padding:15px; margin-bottom:12px; border-radius:6px;">
            <div style="font-size:18px; color:#9cf;">
                ${a.name}
                <span class="badge ${a.status === 'active' ? 'badge-status-active' : 'badge-status-suspended'}">
                    ${a.status.toUpperCase()}
                </span>

                ${
                    a.flag
                    ? `<span class="badge badge-flag">${a.flag}</span>`
                    : ""
                }
            </div>

            <div style="color:#ccc; margin-top:5px;">
                <strong>ID:</strong> ${a.id}<br>
                <strong>Username:</strong> ${a.username}<br>
                <strong>Assigned Cases:</strong> ${a.cases}<br>
                ${
                    a.autoReactivate
                    ? `<strong>Auto‑Reactivate:</strong> ${a.autoReactivate}<br>`
                    : ""
                }
            </div>

            <button onclick="openAssociateQuick('${a.id}')"
                style="margin-top:12px; background:#222; border:1px solid #444; padding:10px 14px; color:#ccc; border-radius:4px;">
                Quick View
            </button>

            <button onclick="openFullProfile('${a.id}')"
                style="margin-top:12px; background:#1f3d1f; border:1px solid #3f6f3f; padding:10px 14px; color:#9f9; border-radius:4px;">
                Open Full Profile
            </button>
        </div>
    `).join("");
}

function openAssociateQuick(id) {
    const a = associates.find(x => x.id === id);
    if (!a) return;

    const assignedCases = allCases.filter(c => c.associate === a.name);

    document.getElementById("modalContent").innerHTML = `
        <h2 style="margin-top:0; color:#9cf;">${a.name} — Quick View</h2>

        <p style="color:#ccc;">
            <strong>ID:</strong> ${a.id}<br>
            <strong>Status:</strong> ${a.status}<br>
            <strong>Flag:</strong> ${a.flag || "None"}<br>
            <strong>Username:</strong> ${a.username}<br>
            <strong>Assigned Cases:</strong> ${a.cases}<br>
            ${
                a.autoReactivate
                ? `<strong>Auto‑Reactivate:</strong> ${a.autoReactivate}<br>`
                : ""
            }
        </p>

        <h3 style="color:#9cf;">Assigned Cases</h3>
        ${
            assignedCases.length
            ? assignedCases.map(c => `
                <div style="background:#151515; border:1px solid #333; padding:10px; margin-bottom:8px; border-radius:4px;">
                    <strong style="color:#9cf;">Case #${c.id}</strong>
                    ${
                        c.previousAssociates && c.previousAssociates.length
                        ? `<span class="badge">Reassigned</span>`
                        : ""
                    }
                    <br>
                    <span style="color:#ccc;">${c.client}</span><br>
                    <button onclick="openCaseDetails('${c.id}')"
                        style="margin-top:6px; background:#222; border:1px solid #444; padding:6px 10px; color:#ccc; border-radius:4px;">
                        View Case
                    </button>
                </div>
            `).join("")
            : `<p style="color:#777;">No cases assigned.</p>`
        }
    `;
}

function openFullProfile(id) {
    window.location.href = `firm-admin-view-associates.html?id=${id}`;
}
</script>

<!-- ===================== REASSIGNMENT LOGIC ===================== -->

<script>
let caseBeingReassigned = null;

function openReassign(caseId) {
    caseBeingReassigned = allCases.find(c => c.id === caseId);
    if (!caseBeingReassigned) return;

    const select = document.getElementById("reassignSelect");
    select.innerHTML = "";

    associates.forEach(a => {
        if (a.status !== "active") {
            const opt = document.createElement("option");
            opt.value = "";
            opt.textContent = `${a.name} (SUSPENDED)`;
            opt.disabled = true;
            select.appendChild(opt);
            return;
        }

        const opt = document.createElement("option");
        opt.value = a.name;
        opt.textContent = a.flag ? `${a.name} — ${a.flag}` : a.name;
        select.appendChild(opt);
    });

    document.getElementById("reassignReason").value = "";
    document.getElementById("reassignOverlay").style.display = "flex";
}

function closeReassign() {
    document.getElementById("reassignOverlay").style.display = "none";
}

function confirmReassign() {
    const newAssociate = document.getElementById("reassignSelect").value;
    const reason = document.getElementById("reassignReason").value.trim();

    if (!newAssociate) return alert("Select an active associate.");
    if (!reason) return alert("Provide a reason.");

    const oldAssociate = caseBeingReassigned.associate;

    caseBeingReassigned.previousAssociates = caseBeingReassigned.previousAssociates || [];
    caseBeingReassigned.previousAssociates.push({
        from: oldAssociate,
        to: newAssociate,
        date: new Date().toLocaleString(),
        reason
    });

    caseBeingReassigned.associate = newAssociate;

    const oldA = associates.find(a => a.name === oldAssociate);
    const newA = associates.find(a => a.name === newAssociate);

    if (oldA) oldA.cases = Math.max(0, oldA.cases - 1);
    if (newA) newA.cases += 1;

    closeReassign();
    closePanel();

    alert(`Case reassigned from ${oldAssociate} to ${newAssociate}.`);

    renderCases(allCases);
}
</script>
