<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Associate Application</title>
  <style>
    body {
      font-family: "Consolas", "Courier New", monospace;
      background: #000;
      color: #00ff88;
      padding: 40px;
      max-width: 700px;
      margin: auto;
      overflow-x: hidden;
      position: relative;
    }
    /* Scanline overlay */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: repeating-linear-gradient(
        rgba(0, 255, 136, 0.05) 0px,
        rgba(0, 255, 136, 0.05) 2px,
        transparent 2px,
        transparent 4px
      );
      z-index: 999;
    }
    /* Animated typing header */
    .typing {
      font-size: 28px;
      margin-bottom: 30px;
      text-shadow: 0 0 10px #00ff88;
      display: inline-block;
      position: relative;
      color: #00ff88;
      white-space: nowrap;
      max-width: 100%;
      overflow: hidden;
      clip-path: inset(0 100% 0 0);
      animation: reveal 3s steps(40) forwards, cursorBlink 0.7s infinite;
      border-right: 2px solid #00ff88;
    }
    @keyframes reveal {
      from { clip-path: inset(0 100% 0 0); }
      to { clip-path: inset(0 0 0 0); }
    }
    @keyframes cursorBlink {
      50% { border-color: transparent; }
    }
    @media (max-width: 480px) {
      .typing { font-size: 20px; }
    }
    label {
      display: block;
      margin-top: 20px;
      font-weight: bold;
      font-size: 15px;
      text-shadow: 0 0 8px #00ff88;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 6px;
      border: 1px solid #00ff88;
      background: #0a0a0a;
      color: #00ff88;
      font-size: 15px;
      box-shadow: 0 0 10px #00ff88 inset;
      transition: 0.2s;
    }
    input:focus, textarea:focus {
      outline: none;
      box-shadow: 0 0 18px #00ff88;
    }
    #preview {
      margin-top: 15px;
      width: 120px;
      height: 120px;
      border-radius: 6px;
      border: 1px solid #00ff88;
      object-fit: cover;
      display: none;
      box-shadow: 0 0 12px #00ff88;
    }
    button {
      margin-top: 35px;
      width: 100%;
      padding: 14px;
      background: #00ff88;
      border: none;
      border-radius: 6px;
      color: #000;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
      box-shadow: 0 0 15px #00ff88;
      transition: 0.2s ease-in-out;
    }
    button:hover {
      background: #00ffaa;
      box-shadow: 0 0 25px #00ffaa;
      transform: scale(1.02);
    }
    #uploadStatus {
      margin-top: 20px;
      font-size: 14px;
      color: #00ff88;
      display: none;
      text-shadow: 0 0 8px #00ff88;
    }
    .pulse {
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0% { opacity: 0.4; }
      50% { opacity: 1; }
      100% { opacity: 0.4; }
    }
    #successScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #00ff88;
      display: none;
      justify-content: center;
      align-items: center;
      font-size: 32px;
      text-shadow: 0 0 15px #00ff88;
      z-index: 2000;
      animation: fadeIn 1s forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .back-btn {
      margin-top: 30px;
      display: block;
      text-align: center;
      color: #00ff88;
      text-decoration: none;
      font-size: 15px;
      font-weight: normal;
      text-shadow: 0 0 6px #00ff88;
      transition: 0.2s;
    }
    .back-btn:hover {
      color: #00ffaa;
      text-shadow: 0 0 10px #00ffaa;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="typing">INITIALIZING ASSOCIATE APPLICATION TERMINAL...</div>
  <form id="applyForm">
    <label>Display Name</label>
    <input type="text" id="displayName" required autocomplete="off" />

    <label>Email</label>
    <input type="email" id="email" required autocomplete="off" />

    <label>Create Password</label>
    <input type="password" 
           id="password" 
           name="new_password_987654"
           autocomplete="new-password" 
           required />

    <label>Instagram Handle</label>
    <input type="text" id="instagram" placeholder="instagram username" required autocomplete="off" />

    <label>Specialty</label>
    <input type="text" id="specialty" required autocomplete="off" />

    <label>Bio</label>
    <textarea id="bio" rows="4" required></textarea>

    <label>Upload Photo</label>
    <input type="file" id="photo" accept="image/*" required />

    <img id="preview" />
    <div id="uploadStatus" class="pulse">UPLOADING... PLEASE WAIT</div>
    <button type="submit">SUBMIT APPLICATION</button>
  </form>
  <a href="/associates.html" class="back-btn">← BACK TO ASSOCIATES</a>
  <div id="successScreen">APPLICATION RECEIVED — REDIRECTING...</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCXijSyw_EqvRSKwJH0M-xPs5piNfiCiYI",
    authDomain: "mrhansenfirm-b57c1.firebaseapp.com",
    projectId: "mrhansenfirm-b57c1",
    storageBucket: "mrhansenfirm-b57c1.appspot.com",
    messagingSenderId: "1007101301706",
    appId: "1:1007101301706:web:bbbac146ca9411e41af533"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  let photoBase64 = null;

  function cleanInstagramHandle(input) {
    if (!input) return "";
    return input
      .trim()
      .replace(/^@/, "")
      .replace(/https?:\/\/(www\.)?instagram\.com\//, "")
      .replace(/\/$/, "")
      .replace(/\s+/g, "");
  }

  document.getElementById("photo").addEventListener("change", function () {
    const file = this.files[0];
    if (file) {
      const preview = document.getElementById("preview");
      preview.src = URL.createObjectURL(file);
      preview.style.display = "block";
      const reader = new FileReader();
      reader.onload = () => {
        photoBase64 = reader.result;
      };
      reader.readAsDataURL(file);
    }
  });

  function generateAssociateId() {
    return "assoc_" + Math.random().toString(36).substring(2, 10);
  }

  async function createOrSignInAssociate(email, password) {
    try {
      const cred = await auth.createUserWithEmailAndPassword(email, password);
      return cred.user;
    } catch (err) {
      if (err.code === "auth/email-already-in-use") {
        const cred = await auth.signInWithEmailAndPassword(email, password);
        return cred.user;
      }
      throw err;
    }
  }

  async function saveAssociateToFirestore(uid, data) {
    await db.collection("users").doc(uid).set(data);
  }

  document.getElementById("applyForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const displayName = document.getElementById("displayName").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    let instagram = cleanInstagramHandle(document.getElementById("instagram").value);
    const specialty = document.getElementById("specialty").value.trim();
    const bio = document.getElementById("bio").value.trim();

    if (!displayName || !email || !password || !instagram || !specialty || !bio || !photoBase64) {
      alert("Please complete all fields.");
      return;
    }
    if (password.length < 6) {
      alert("Password must be at least 6 characters.");
      return;
    }

    document.getElementById("uploadStatus").style.display = "block";

    try {
      const user = await createOrSignInAssociate(email, password);
      const uid = user.uid;
      const associateId = generateAssociateId();
      const firestoreData = {
        role: "associate",
        email,
        name: displayName,
        instagram,
        specialty,
        bio,
        photo: photoBase64,
        associateId,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      };
      await saveAssociateToFirestore(uid, firestoreData);
      document.getElementById("successScreen").style.display = "flex";
      setTimeout(() => {
        window.location.href = "/associate-admin.html?id=" + associateId;
      }, 2000);
    } catch (err) {
      console.error(err);
      alert("Error submitting application.");
      document.getElementById("uploadStatus").style.display = "none";
    }
  });
</script>
</body>
</html>
