<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Associate Application</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: white;
      padding: 40px;
      max-width: 600px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: none;
      background: #1a1a1a;
      color: white;
    }

    button {
      margin-top: 25px;
      width: 100%;
      padding: 12px;
      background: #4caf50;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }
  </style>
</head>

<body>
  <h1>Associate Application</h1>

  <form id="applyForm">
    <label>Name</label>
    <input type="text" name="name" required />

    <label>Email</label>
    <input type="email" name="email" required />

    <label>Instagram Handle</label>
    <input type="text" name="instagram" required />

    <label>Specialty</label>
    <input type="text" name="specialty" required />

    <label>Bio</label>
    <textarea name="bio" rows="4" required></textarea>

    <label>Upload Photo</label>
    <input type="file" name="photo" accept="image/*" required />

    <button type="submit">Submit Application</button>
  </form>

  <script>
    // ⭐ IMPORTANT: This is your correct, live backend URL
    const BASE_URL = "https://script.google.com/macros/s/AKfycbxOt2pOZySr1pMi8PBB99duXLjF9DwxJcqbVuCMZ2BSK3d_dPYXc0E_iyKhiDyG7n_K/exec";

    document.getElementById("applyForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const form = e.target;
      const formData = new FormData(form);

      try {
        const response = await fetch(BASE_URL, {
          method: "POST",
          body: formData
        });

        const text = await response.text();

        if (text.includes("OK")) {
          alert("Application submitted successfully. Please check your email to verify.");

          // ⭐ Redirect to Associates page after success
          window.location.href = "/associates.html";
        } else {
          alert("Error submitting application: " + text);
        }
      } catch (err) {
        alert("Network error submitting application.");
        console.error(err);
      }
    });
  </script>
</body>
</html>
