<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Become an Intelligence Associate</title>

    <style>
        body {
            background-color: #0d0d0d;
            color: #e6e6e6;
            font-family: Consolas, monospace;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #0f0;
        }

        form {
            max-width: 600px;
            margin: 0 auto;
            background: #111;
            padding: 20px;
            border: 1px solid #0f0;
            border-radius: 6px;
        }

        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            color: #0f0;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            background: #000;
            border: 1px solid #0f0;
            color: #e6e6e6;
            border-radius: 4px;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: #0f0;
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }

        button:hover {
            background: #9f9;
        }
    </style>
</head>

<body>

    <h1>Become an Intelligence Associate</h1>

    <form id="associateForm" enctype="multipart/form-data">
        <label>Name *</label>
        <input type="text" name="name" required>

        <label>Email *</label>
        <input type="email" name="email" required>

        <label>Instagram Handle</label>
        <input type="text" name="instagram">

        <label>Specialty *</label>
        <input type="text" name="specialty" required>

        <label>Bio *</label>
        <textarea name="bio" rows="5" required></textarea>

        <label>Upload Photo *</label>
        <input type="file" name="photo" accept="image/*" required>

        <button type="submit">Submit Application</button>
    </form>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxOt2pOZySr1pMi8PBB99duXLjF9DwxJcqbVuCMZ2BSK3d_dPYXc0E_iyKhiDyG7n_K/exec";

        document.getElementById("associateForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const form = document.getElementById("associateForm");
            const formData = new FormData(form);

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: "POST",
                    body: formData
                });

                const result = await response.text();
                console.log(result);

                alert("Application submitted successfully. Please check your email to verify.");
                form.reset();

            } catch (err) {
                console.error(err);
                alert("Error submitting application.");
            }
        });
    </script>

</body>
</html>
