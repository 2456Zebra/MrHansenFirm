<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apply as Associate</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    form {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    #photoPreview {
      margin-top: 10px;
      max-width: 150px;
      border-radius: 8px;
      display: none;
    }

    #uploadStatus {
      display: none;
      margin-top: 20px;
      text-align: center;
      font-weight: bold;
      color: #007bff;
    }

    #successScreen {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      color: white;
      font-size: 28px;
      justify-content: center;
      align-items: center;
      text-align: center;
      z-index: 9999;
    }

    button {
      margin-top: 20px;
      padding: 12px;
      width: 100%;
      background: black;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <h1>Associate Application</h1>

  <form id="applyForm">
    <label>Name</label>
    <input type="text" name="name" required />

    <label>Email</label>
    <input type="email" name="email" required />

    <label>Instagram Handle</label>
    <input type="text" name="instagram" required />

    <label>Specialty</label>
    <input type="text" name="specialty" required />

    <label>Bio</label>
    <textarea name="bio" rows="5" required></textarea>

    <label>Upload Photo</label>
    <input type="file" id="photoInput" accept="image/*" required />

    <img id="photoPreview" />

    <button type="submit">Submit Application</button>

    <div id="uploadStatus">UPLOADING…</div>
  </form>

  <div id="successScreen">Application Submitted Successfully</div>

  <script>
    const BASE_URL = "https://script.google.com/macros/s/AKfycbz_vOFpD9MlXADWLMXavqEbsYVIzNMmtfAwLFtDpqH29Sqgbggte-OIHOhiyrsxnEZHyw/exec";

    let photoBase64 = "";

    // Convert uploaded image to Base64
    document.getElementById("photoInput").addEventListener("change", function (e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function (event) {
        photoBase64 = event.target.result;
        const preview = document.getElementById("photoPreview");
        preview.src = photoBase64;
        preview.style.display = "block";
      };
      reader.readAsDataURL(file);
    });

    // Submit form using FormData (NO JSON HEADERS)
    document.getElementById("applyForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      if (!photoBase64) {
        alert("Please upload a photo before submitting.");
        return;
      }

      const form = e.target;
      const uploadStatus = document.getElementById("uploadStatus");
      uploadStatus.style.display = "block";

      const formData = new FormData();
      formData.append("action", "associateApply");
      formData.append("name", form.name.value);
      formData.append("email", form.email.value);
      formData.append("instagram", form.instagram.value);
      formData.append("specialty", form.specialty.value);
      formData.append("bio", form.bio.value);
      formData.append("photo", photoBase64);

      try {
        const response = await fetch(BASE_URL, {
          method: "POST",
          body: formData
        });

        const result = await response.json();

        if (result.success === true) {
          document.getElementById("successScreen").style.display = "flex";
          setTimeout(() => {
            window.location.href = "/associates.html";
          }, 2000);
        } else {
          alert("Submission failed: " + result.error);
          uploadStatus.style.display = "none";
        }

      } catch (err) {
        alert("Network error submitting application.");
        console.error(err);
        uploadStatus.style.display = "none";
      }
    });
  </script>

</body>
</html>
