<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Associate Application</title>

  <style>
    body {
      font-family: "Consolas", "Courier New", monospace;
      background: #000000;
      color: #00ff88;
      padding: 40px;
      max-width: 650px;
      margin: auto;
      text-shadow: 0 0 8px #00ff88;
    }

    h1 {
      text-align: center;
      margin-bottom: 35px;
      font-size: 32px;
      letter-spacing: 2px;
    }

    label {
      display: block;
      margin-top: 20px;
      font-weight: bold;
      font-size: 15px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 6px;
      border: 1px solid #00ff88;
      background: #0a0a0a;
      color: #00ff88;
      font-size: 15px;
      box-shadow: 0 0 10px #00ff88 inset;
    }

    input:focus, textarea:focus {
      outline: none;
      box-shadow: 0 0 15px #00ff88;
    }

    button {
      margin-top: 35px;
      width: 100%;
      padding: 14px;
      background: #00ff88;
      border: none;
      border-radius: 6px;
      color: #000;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
      box-shadow: 0 0 15px #00ff88;
      transition: 0.2s ease-in-out;
    }

    button:hover {
      background: #00ffaa;
      box-shadow: 0 0 25px #00ffaa;
      transform: scale(1.02);
    }
  </style>
</head>

<body>
  <h1>ASSOCIATE APPLICATION</h1>

  <form id="applyForm">
    <label>Name</label>
    <input type="text" name="name" required />

    <label>Email</label>
    <input type="email" name="email" required />

    <label>Instagram Handle</label>
    <input type="text" name="instagram" required />

    <label>Specialty</label>
    <input type="text" name="specialty" required />

    <label>Bio</label>
    <textarea name="bio" rows="4" required></textarea>

    <label>Upload Photo</label>
    <input type="file" id="photo" name="photo" accept="image/*" required />

    <button type="submit">SUBMIT APPLICATION</button>
  </form>

  <script>
    const BASE_URL =
      "https://script.google.com/macros/s/AKfycbxOt2pOZySr1pMi8PBB99duXLjF9DwxJcqbVuCMZ2BSK3d_dPYXc0E_iyKhiDyG7n_K/exec";

    document.getElementById("applyForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const form = e.target;
      const formData = new FormData(form);

      try {
        const response = await fetch(BASE_URL, {
          method: "POST",
          body: formData,
        });

        const text = await response.text();

        if (text.includes("OK")) {
          alert("Application submitted successfully. Please check your email to verify.");
          window.location.href = "/associates.html";
        } else {
          alert("Error submitting application: " + text);
        }
      } catch (err) {
        alert("Network error submitting application.");
        console.error(err);
      }
    });
  </script>
</body>
</html>
