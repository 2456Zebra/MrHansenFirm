<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apply as Associate</title>

  <!-- NEON CONSOLE THEME RESTORED -->
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px;
      background: #0d0d0d; /* deep console black */
      color: #e5ffe5; /* soft neon green text */
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #00ff88; /* neon green */
      text-shadow: 0 0 8px rgba(0,255,136,0.6);
    }

    form {
      max-width: 600px;
      margin: auto;
      background: #111;
      padding: 25px;
      border-radius: 10px;
      border: 2px solid #00ff88;
      box-shadow: 0 0 18px rgba(0,255,136,0.25);
    }

    label {
      display: block;
      margin-top: 18px;
      font-weight: bold;
      color: #00ff88;
      text-shadow: 0 0 6px rgba(0,255,136,0.4);
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border-radius: 6px;
      border: 1px solid #00ff88;
      background: #0f0f0f;
      color: #e5ffe5;
      font-size: 15px;
    }

    input:focus, textarea:focus {
      outline: none;
      box-shadow: 0 0 10px rgba(0,255,136,0.5);
    }

    #photoPreview {
      margin-top: 12px;
      max-width: 160px;
      border-radius: 8px;
      display: none;
      border: 2px solid #00ff88;
      box-shadow: 0 0 12px rgba(0,255,136,0.4);
    }

    #uploadStatus {
      display: none;
      margin-top: 20px;
      text-align: center;
      font-weight: bold;
      color: #00ff88;
      text-shadow: 0 0 6px rgba(0,255,136,0.5);
    }

    #successScreen {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      color: #00ff88;
      font-size: 30px;
      justify-content: center;
      align-items: center;
      text-align: center;
      z-index: 9999;
      text-shadow: 0 0 10px rgba(0,255,136,0.7);
    }

    button {
      margin-top: 25px;
      padding: 14px;
      width: 100%;
      background: #00ff88;
      color: #000;
      border: none;
      border-radius: 6px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0,255,136,0.5);
      transition: 0.2s;
    }

    button:hover {
      background: #00cc6d;
      box-shadow: 0 0 14px rgba(0,255,136,0.7);
    }
  </style>
</head>

<body>

  <h1>Associate Application</h1>

  <form id="applyForm">
    <label>Name</label>
    <input type="text" name="name" required />

    <label>Email</label>
    <input type="email" name="email" required />

    <label>Instagram Handle</label>
    <input type="text" name="instagram" required />

    <label>Specialty</label>
    <input type="text" name="specialty" required />

    <label>Bio</label>
    <textarea name="bio" rows="5" required></textarea>

    <label>Upload Photo</label>
    <input type="file" id="photoInput" accept="image/*" required />

    <img id="photoPreview" />

    <button type="submit">Submit Application</button>

    <div id="uploadStatus">UPLOADING…</div>
  </form>

  <div id="successScreen">Application Submitted Successfully</div>

  <script>
    const BASE_URL = "https://script.google.com/macros/s/AKfycbz_vOFpD9MlXADWLMXavqEbsYVIzNMmtfAwLFtDpqH29Sqgbggte-OIHOhiyrsxnEZHyw/exec";

    let photoBase64 = "";

    // Convert uploaded image to Base64
    document.getElementById("photoInput").addEventListener("change", function (e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function (event) {
        photoBase64 = event.target.result;
        const preview = document.getElementById("photoPreview");
        preview.src = photoBase64;
        preview.style.display = "block";
      };
      reader.readAsDataURL(file);
    });

    // Submit form using JSON (NO HEADERS → NO CORS)
    document.getElementById("applyForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      if (!photoBase64) {
        alert("Please upload a photo before submitting.");
        return;
      }

      const form = e.target;
      const uploadStatus = document.getElementById("uploadStatus");
      uploadStatus.style.display = "block";

      const payload = {
        action: "associateApply",
        name: form.name.value,
        email: form.email.value,
        instagram: form.instagram.value,
        specialty: form.specialty.value,
        bio: form.bio.value,
        photo: photoBase64
      };

      try {
        const response = await fetch(BASE_URL, {
          method: "POST",
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (result.success === true) {
          document.getElementById("successScreen").style.display = "flex";
          setTimeout(() => {
            window.location.href = "/associates.html";
          }, 2000);
        } else {
          alert("Submission failed: " + result.error);
          uploadStatus.style.display = "none";
        }

      } catch (err) {
        alert("Network error submitting application.");
        console.error(err);
        uploadStatus.style.display = "none";
      }
    });
  </script>

</body>
</html>
