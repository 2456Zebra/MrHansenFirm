<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Associate Application</title>

  <style>
    body {
      font-family: "Consolas", "Courier New", monospace;
      background: #000;
      color: #00ff88;
      padding: 40px;
      max-width: 700px;
      margin: auto;
      overflow-x: hidden;
      position: relative;
    }

    /* Scanline overlay */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: repeating-linear-gradient(
        rgba(0, 255, 136, 0.05) 0px,
        rgba(0, 255, 136, 0.05) 2px,
        transparent 2px,
        transparent 4px
      );
      z-index: 999;
    }

    /* Animated typing header — FIXED to never spill */
    .typing {
      font-size: 28px;
      margin-bottom: 30px;
      text-shadow: 0 0 10px #00ff88;
      display: inline-block;
      position: relative;
      color: #00ff88;
      white-space: nowrap;
      max-width: 100%;
      overflow: hidden;
      clip-path: inset(0 100% 0 0);
      animation: reveal 3s steps(40) forwards, cursorBlink 0.7s infinite;
      border-right: 2px solid #00ff88;
    }

    @keyframes reveal {
      from { clip-path: inset(0 100% 0 0); }
      to { clip-path: inset(0 0 0 0); }
    }

    @keyframes cursorBlink {
      50% { border-color: transparent; }
    }

    @media (max-width: 480px) {
      .typing {
        font-size: 20px;
      }
    }

    label {
      display: block;
      margin-top: 20px;
      font-weight: bold;
      font-size: 15px;
      text-shadow: 0 0 8px #00ff88;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 6px;
      border: 1px solid #00ff88;
      background: #0a0a0a;
      color: #00ff88;
      font-size: 15px;
      box-shadow: 0 0 10px #00ff88 inset;
      transition: 0.2s;
    }

    input:focus, textarea:focus {
      outline: none;
      box-shadow: 0 0 18px #00ff88;
    }

    #preview {
      margin-top: 15px;
      width: 120px;
      height: 120px;
      border-radius: 6px;
      border: 1px solid #00ff88;
      object-fit: cover;
      display: none;
      box-shadow: 0 0 12px #00ff88;
    }

    button {
      margin-top: 35px;
      width: 100%;
      padding: 14px;
      background: #00ff88;
      border: none;
      border-radius: 6px;
      color: #000;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
      box-shadow: 0 0 15px #00ff88;
      transition: 0.2s ease-in-out;
    }

    button:hover {
      background: #00ffaa;
      box-shadow: 0 0 25px #00ffaa;
      transform: scale(1.02);
    }

    #uploadStatus {
      margin-top: 20px;
      font-size: 14px;
      color: #00ff88;
      display: none;
      text-shadow: 0 0 8px #00ff88;
    }

    .pulse {
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.4; }
      50% { opacity: 1; }
      100% { opacity: 0.4; }
    }

    #successScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #00ff88;
      display: none;
      justify-content: center;
      align-items: center;
      font-size: 32px;
      text-shadow: 0 0 15px #00ff88;
      z-index: 2000;
      animation: fadeIn 1s forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Back button — centered, not bold, no box */
    .back-btn {
      margin-top: 30px;
      display: block;
      text-align: center;
      color: #00ff88;
      text-decoration: none;
      font-size: 15px;
      font-weight: normal;
      text-shadow: 0 0 6px #00ff88;
      transition: 0.2s;
    }

    .back-btn:hover {
      color: #00ffaa;
      text-shadow: 0 0 10px #00ffaa;
      transform: translateY(-2px);
    }
  </style>
</head>

<body>

  <div class="typing">INITIALIZING ASSOCIATE APPLICATION TERMINAL...</div>

  <form id="applyForm">
    <label>Name</label>
    <input type="text" name="name" required />

    <label>Email</label>
    <input type="email" name="email" required />

    <label>Instagram Handle</label>
    <input type="text" name="instagram" required />

    <label>Specialty</label>
    <input type="text" name="specialty" required />

    <label>Bio</label>
    <textarea name="bio" rows="4" required></textarea>

    <label>Upload Photo</label>
    <input type="file" id="photo" accept="image/*" required />

    <img id="preview" />

    <div id="uploadStatus" class="pulse">UPLOADING... PLEASE WAIT</div>

    <button type="submit">SUBMIT APPLICATION</button>
  </form>

  <!-- Back to Associates (centered, no box, not bold) -->
  <a href="/associates.html" class="back-btn">← BACK TO ASSOCIATES</a>

  <div id="successScreen">APPLICATION RECEIVED — REDIRECTING...</div>

<script>
  const BASE_URL = "https://script.google.com/macros/s/AKfycbz_vOFpD9MlXADWLMXavqEbsYVIzNMmtfAwLFtDpqH29Sqgbggte-OIHOhiyrsxnEZHyw/exec";

  let photoBase64 = null;

  // Photo preview + Base64 conversion
  document.getElementById("photo").addEventListener("change", function () {
    const file = this.files[0];
    if (file) {
      const preview = document.getElementById("preview");
      preview.src = URL.createObjectURL(file);
      preview.style.display = "block";

      const reader = new FileReader();
      reader.onload = () => {
        photoBase64 = reader.result;
      };
      reader.readAsDataURL(file);
    }
  });

  document.getElementById("applyForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const form = e.target;
    const uploadStatus = document.getElementById("uploadStatus");
    uploadStatus.style.display = "block";

    const payload = {
      action: "associateApply",
      name: form.name.value,
      email: form.email.value,
      instagram: form.instagram.value,
      specialty: form.specialty.value,
      bio: form.bio.value,
      photo: photoBase64
    };

    try {
      const response = await fetch(BASE_URL, {
        method: "POST",
        body: JSON.stringify(payload)
      });

      const result = await response.json();

      if (result.success === true) {
        document.getElementById("successScreen").style.display = "flex";
        setTimeout(() => {
          window.location.href = "/associates.html";
        }, 2000);
      } else {
        alert("Submission failed: " + result.error);
        uploadStatus.style.display = "none";
      }

    } catch (err) {
      alert("Network error submitting application.");
      console.error(err);
      uploadStatus.style.display = "none";
    }
  });
</script>

</body>
</html>
