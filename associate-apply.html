<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Apply to Be an Intelligence Associate</title>

  <!-- ===========================
       GLOBAL NEON CONSOLE STYLE
       =========================== -->
  <style>
    body {
      background: #000;
      color: #00ff88;
      font-family: "Courier New", monospace;
      padding: 20px;
      text-align: center;
    }

    h1 {
      text-shadow: 0 0 12px #00ff88;
      margin-bottom: 25px;
    }

    /* Form container */
    .form-wrapper {
      max-width: 600px;
      margin: 0 auto;
      background: #0a0a0a;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 15px #00ff88;
    }

    /* Inputs */
    input, textarea {
      width: 90%;
      padding: 12px;
      margin: 12px 0;
      background: #0a0a0a;
      border: 1px solid #00ff88;
      color: #00ff88;
      border-radius: 6px;
      font-family: inherit;
      font-size: 15px;
      outline: none;
      box-shadow: 0 0 8px #00ff88;
    }

    textarea {
      resize: vertical;
    }

    /* File input wrapper */
    .file-label {
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
      font-size: 16px;
      font-weight: bold;
      text-shadow: 0 0 8px #00ff88;
    }

    /* Submit button */
    button {
      padding: 14px 24px;
      background: #00ff88;
      color: #000;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 12px #00ff88;
      margin-top: 15px;
      font-size: 16px;
      transition: 0.2s;
    }

    button:hover {
      background: #00d977;
      box-shadow: 0 0 18px #00ff88;
    }

    /* Status message */
    #status {
      margin-top: 20px;
      font-size: 18px;
      min-height: 24px;
      text-shadow: 0 0 8px #00ff88;
    }

    /* Back link */
    .back-home {
      display: block;
      margin-top: 30px;
      color: #00ff88;
      text-decoration: none;
      font-size: 16px;
      text-shadow: 0 0 8px #00ff88;
    }

    .back-home:hover {
      color: #00ffaa;
    }

    /* Divider line */
    .divider {
      width: 80%;
      height: 1px;
      background: #00ff88;
      margin: 25px auto;
      box-shadow: 0 0 10px #00ff88;
    }
  </style>
</head>

<body>

  <!-- ===========================
       PAGE TITLE
       =========================== -->
  <h1>APPLY TO BE AN INTELLIGENCE ASSOCIATE</h1>

  <!-- ===========================
       FORM WRAPPER
       =========================== -->
  <div class="form-wrapper">

    <!-- ===========================
         APPLICATION FORM
         =========================== -->
    <form id="applyForm">

      <!-- NAME -->
      <input
        type="text"
        id="name"
        placeholder="Your Name"
        required
      />

      <!-- EMAIL -->
      <input
        type="email"
        id="email"
        placeholder="Your Email"
        required
      />

      <!-- INSTAGRAM -->
      <input
        type="text"
        id="instagram"
        placeholder="Instagram Username"
        required
      />

      <!-- SPECIALTY -->
      <input
        type="text"
        id="specialty"
        placeholder="Your Specialty"
        required
      />

      <!-- BIO -->
      <textarea
        id="bio"
        placeholder="Short Bio"
        rows="5"
        required
      ></textarea>

      <!-- PHOTO UPLOAD -->
      <label class="file-label">Upload Your Photo</label>
      <input
        type="file"
        id="photo"
        accept="image/*"
        required
      />

      <!-- SUBMIT BUTTON -->
      <button type="submit">Submit Application</button>

    </form>

    <!-- STATUS MESSAGE -->
    <div id="status"></div>

  </div>

  <!-- DIVIDER -->
  <div class="divider"></div>

  <!-- BACK LINK -->
  <a href="/associates.html" class="back-home">&lt; Back to Associates</a>

  <!-- ===========================
       JAVASCRIPT LOGIC
       =========================== -->
  <script>

    /* ============================================
       BACKEND URL (CONFIRMED WORKING)
       ============================================ */
    const BACKEND_URL =
      "https://script.google.com/macros/s/AKfycbxYQDtjZuz7FXE6y6nRTt6MewoeifzF1Fi94v_n4f0hHFM_75LyZZTOKeE1AkSNovlG/exec";


    /* ============================================
       FORM SUBMISSION HANDLER
       ============================================ */
    document.getElementById("applyForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const status = document.getElementById("status");
      status.innerText = "Submitting...";
      status.style.color = "#00ff88";

      const file = document.getElementById("photo").files[0];

      if (!file) {
        status.innerText = "Please upload a photo.";
        status.style.color = "#ff4444";
        return;
      }

      const reader = new FileReader();

      /* ============================================
         WHEN FILE IS LOADED AS BASE64
         ============================================ */
      reader.onload = async function(event) {
        const photoBase64 = event.target.result;

        /* ============================================
           BUILD PAYLOAD
           ============================================ */
        const payload = {
          name: document.getElementById("name").value.trim(),
          email: document.getElementById("email").value.trim(),
          instagram: document.getElementById("instagram").value.trim(),
          specialty: document.getElementById("specialty").value.trim(),
          bio: document.getElementById("bio").value.trim(),
          photoBase64
        };

        /* ============================================
           SEND TO BACKEND
           ============================================ */
        try {
          const res = await fetch(BACKEND_URL, {
            method: "POST",
            body: JSON.stringify(payload),
            headers: { "Content-Type": "application/json" }
          });

          const data = await res.json();

          if (data.status === "success") {
            status.innerText = "Application submitted successfully!";
            status.style.color = "#00ff88";

            // Optional: clear form
            document.getElementById("applyForm").reset();

          } else {
            status.innerText = "Error: " + data.message;
            status.style.color = "#ff4444";
          }

        } catch (err) {
          console.error(err);
          status.innerText = "Submission failed. Please try again.";
          status.style.color = "#ff4444";
        }
      };

      /* ============================================
         READ FILE AS BASE64
         ============================================ */
      reader.readAsDataURL(file);
    });

  </script>

</body>
</html>
