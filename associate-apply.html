<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Associate Application</title>
  <style>
    body {
      font-family: "Consolas", "Courier New", monospace;
      background: #000;
      color: #00ff88;
      padding: 40px 20px;
      max-width: 720px;
      margin: auto;
      overflow-x: hidden;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      background: repeating-linear-gradient(
        rgba(0, 255, 136, 0.06) 0px,
        rgba(0, 255, 136, 0.06) 2px,
        transparent 2px,
        transparent 4px
      );
      z-index: -1;
    }
    .typing {
      font-size: 28px;
      margin-bottom: 40px;
      text-shadow: 0 0 12px #00ff88;
      display: inline-block;
      animation: reveal 3s steps(40) forwards, cursorBlink 0.8s infinite;
      border-right: 3px solid #00ff88;
    }
    @keyframes reveal {
      from { clip-path: inset(0 100% 0 0); }
      to { clip-path: inset(0 0 0 0); }
    }
    @keyframes cursorBlink {
      50% { border-color: transparent; }
    }
    label {
      display: block;
      margin-top: 24px;
      font-weight: bold;
      font-size: 15px;
      text-shadow: 0 0 8px #00ff88;
    }
    input, textarea {
      width: 100%;
      padding: 12px 14px;
      margin-top: 8px;
      border-radius: 6px;
      border: 1px solid #00ff88;
      background: #0a0a0a;
      color: #00ff88;
      font-size: 15px;
      box-shadow: 0 0 10px #00ff88 inset;
      transition: all 0.2s;
    }
    input:focus, textarea:focus {
      outline: none;
      box-shadow: 0 0 20px #00ff88;
      border-color: #00ffaa;
    }
    #preview {
      margin-top: 12px;
      width: 140px;
      height: 140px;
      border-radius: 8px;
      border: 2px solid #00ff88;
      object-fit: cover;
      display: none;
      box-shadow: 0 0 15px #00ff88;
    }
    button {
      margin-top: 40px;
      width: 100%;
      padding: 16px;
      background: #00ff88;
      border: none;
      border-radius: 6px;
      color: #000;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1.5px;
      box-shadow: 0 0 18px #00ff88;
      transition: all 0.25s;
    }
    button:hover {
      background: #00ffaa;
      box-shadow: 0 0 28px #00ffaa;
      transform: scale(1.03);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    #status {
      margin-top: 20px;
      font-size: 15px;
      min-height: 1.5em;
    }
    .success { color: #00ff88; }
    .error { color: #ff3366; }
    #successScreen {
      position: fixed;
      inset: 0;
      background: #000;
      color: #00ff88;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-size: 32px;
      text-shadow: 0 0 20px #00ff88;
      z-index: 3000;
      animation: fadeIn 0.8s forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="typing">INITIALIZING ASSOCIATE APPLICATION TERMINAL...</div>
  
  <form id="applyForm">
    <label>Name</label>
    <input type="text" name="name" required />

    <label>Email</label>
    <input type="email" name="email" required />

    <label>Instagram Handle (without @)</label>
    <input type="text" name="instagram" placeholder="username" required />

    <label>Specialty</label>
    <input type="text" name="specialty" required />

    <label>Bio</label>
    <textarea name="bio" rows="5" required></textarea>

    <label>Upload Photo (Max ~5MB)</label>
    <input type="file" id="photo" name="photo" accept="image/*" required />
    <img id="preview" alt="Photo Preview" />

    <div id="status"></div>
    <button type="submit" id="submitBtn">SUBMIT APPLICATION</button>
  </form>

  <div id="successScreen">
    <div>APPLICATION RECEIVED</div>
    <div style="font-size:18px; margin-top:20px;">REDIRECTING...</div>
  </div>

  <script>
    const BASE_URL = "https://script.google.com/macros/s/AKfycbx8c8jC3ts2eQUtSSCHGydI_iLHTQZK0HG5KEXvXyDCbOM8F4jKgIr5t86ncm7eMy9x/exec";

    // Photo Preview
    document.getElementById("photo").addEventListener("change", function() {
      const file = this.files[0];
      if (file) {
        if (file.size > 5 * 1024 * 1024) {
          alert("Photo must be smaller than 5MB.");
          this.value = "";
          return;
        }
        document.getElementById("preview").src = URL.createObjectURL(file);
        document.getElementById("preview").style.display = "block";
      }
    });

    // Form Submit
    document.getElementById("applyForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      
      const submitBtn = document.getElementById("submitBtn");
      const status = document.getElementById("status");
      const successScreen = document.getElementById("successScreen");

      submitBtn.disabled = true;
      status.innerHTML = `<span>PROCESSING UPLOAD...</span>`;

      const formData = new FormData(e.target);
      let ig = (formData.get("instagram") || "").trim();
      if (ig.startsWith("@")) ig = ig.slice(1);

      // Convert photo to base64
      const file = document.getElementById("photo").files[0];
      let photoBase64 = "";
      if (file) {
        photoBase64 = await new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.readAsDataURL(file);
        });
      }

      const payload = {
        name: formData.get("name"),
        email: formData.get("email"),
        instagram: ig,
        specialty: formData.get("specialty"),
        bio: formData.get("bio"),
        photoBase64: photoBase64
      };

      try {
        const response = await fetch(BASE_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (result.status === "success") {
          status.innerHTML = `<span class="success">✓ Application submitted successfully!</span>`;
          successScreen.style.display = "flex";
          setTimeout(() => {
            window.location.href = "/associates.html";
          }, 2200);
        } else {
          throw new Error(result.message || "Server rejected request");
        }
      } catch (err) {
        console.error(err);
        status.innerHTML = `<span class="error">✗ Submission failed. Please try again.</span>`;
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
