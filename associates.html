<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intelligence Associates</title>

  <style>
    body {
      background: #000;
      color: #0f0;
      font-family: monospace;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .apply-btn, .back-home {
      display: inline-block;
      margin: 15px 0;
      padding: 10px 20px;
      background: #0f0;
      color: #000;
      text-decoration: none;
      font-weight: bold;
      border-radius: 4px;
    }

    #loading {
      margin-top: 20px;
      font-size: 18px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
      padding: 10px;
    }

    .card {
      background: #111;
      border: 1px solid #0f0;
      padding: 15px;
      border-radius: 6px;
      text-align: left;
    }

    .card img {
      width: 100%;
      border-radius: 4px;
      margin-bottom: 10px;
    }

    .card h3 {
      margin: 5px 0;
      color: #0f0;
    }

    .card p {
      margin: 5px 0;
      color: #0f0;
    }
  </style>
</head>

<body>
  <h1>INTELLIGENCE ASSOCIATES</h1>
  <a href="/associate-apply.html" class="apply-btn">Apply to Be an Intelligence Associate</a>

  <div id="loading">INITIALIZING ASSOCIATES NETWORK...</div>
  <div class="grid" id="grid"></div>

  <a href="/index.html" class="back-home">&lt; Back to Home</a>

  <script>
    const BASE_URL = "https://script.google.com/macros/s/AKfycbz_vOFpD9MlXADWLMXavqEbsYVIzNMmtfAwLFtDpqH29Sqgbggte-OIHOhiyrsxnEZHyw/exec";

    async function loadAssociates() {
      const loading = document.getElementById("loading");
      const grid = document.getElementById("grid");

      try {
        const res = await fetch(BASE_URL + "?list=1");
        const data = await res.json();

        loading.style.display = "none";

        if (!data || data.length === 0) {
          loading.style.display = "block";
          loading.innerText = "NO ASSOCIATES FOUND";
          return;
        }

        data.forEach(a => {
          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <img src="${a.photoUrl}" alt="${a.name}">
            <h3>${a.name}</h3>
            <p><b>Specialty:</b> ${a.specialty}</p>
            <p><b>Instagram:</b> @${a.instagram}</p>
            <p>${a.bio}</p>
          `;

          grid.appendChild(card);
        });

      } catch (err) {
        loading.innerText = "ERROR LOADING ASSOCIATES NETWORK";
        console.error("Load error:", err);
      }
    }

    loadAssociates();
  </script>
</body>
</html>
