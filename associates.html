<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hansen Intelligence Associates</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        background: #000;
        color: #0f0;
        font-family: "Courier New", monospace;
    }

    .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 30px 20px 60px;
    }

    .back-home {
        margin-bottom: 20px;
    }

    .back-link {
        color: #0f0;
        text-decoration: none;
        font-size: 14px;
    }

    .back-link:hover {
        text-decoration: underline;
    }

    h1 {
        text-align: center;
        margin: 10px 0 5px;
        letter-spacing: 2px;
        font-size: 26px;
    }

    .subtitle {
        text-align: center;
        font-size: 13px;
        opacity: 0.8;
        margin-bottom: 25px;
    }

    .apply-bar {
        text-align: center;
        margin-bottom: 25px;
    }

    .apply-btn {
        display: inline-block;
        padding: 10px 20px;
        border: 1px solid #0f0;
        color: #0f0;
        text-decoration: none;
        font-size: 13px;
        border-radius: 4px;
    }

    .apply-btn:hover {
        background: #0f0;
        color: #000;
    }

    .status-line {
        text-align: center;
        font-size: 12px;
        opacity: 0.8;
        margin-bottom: 20px;
    }

    .grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 20px;
    }

    @media (min-width: 800px) {
        .grid {
            grid-template-columns: repeat(3, 1fr);
        }
    }

    .card {
        border: 1px solid #0f0;
        border-radius: 6px;
        padding: 12px;
        background: #020202;
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-height: 260px;
    }

    .photo {
        width: 100%;
        height: 180px;
        background: #050505;
        border: 1px solid #0f0;
        border-radius: 4px;
        background-size: cover;
        background-position: center;
        margin-bottom: 6px;
    }

    .name {
        font-size: 15px;
        font-weight: bold;
    }

    .specialty {
        font-size: 12px;
        opacity: 0.9;
    }

    .bio {
        font-size: 12px;
        opacity: 0.85;
    }

    .links {
        margin-top: auto;
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .btn {
        display: block;
        text-align: center;
        padding: 7px;
        font-size: 12px;
        text-decoration: none;
        border-radius: 4px;
        font-weight: bold;
    }

    .btn-instagram {
        border: 1px solid #0f0;
        color: #0f0;
    }

    .btn-instagram:hover {
        background: #0f0;
        color: #000;
    }

    .btn-select {
        border: 1px solid #0f0;
        color: #000;
        background: #0f0;
    }

    .btn-select:hover {
        opacity: 0.85;
    }

    .terminal {
        font-size: 12px;
        white-space: pre-line;
        margin-top: 15px;
        opacity: 0.9;
    }

    .muted {
        opacity: 0.7;
    }
</style>
</head>

<body>
<div class="container">

    <div class="back-home">
        <a href="index.html" class="back-link">‹ Back to Home</a>
    </div>

    <h1>ACTIVE ASSOCIATES</h1>
    <div class="subtitle">Verified & Approved operatives currently available for case assignment.</div>

    <div class="apply-bar">
        <a href="associate-apply.html" class="apply-btn">Apply to Become an Associate</a>
    </div>

    <div class="status-line" id="statusLine">
        Initializing associate directory...
    </div>

    <div class="grid" id="associateGrid"></div>

    <div class="terminal" id="terminalLog"></div>
</div>

<script>
const GRID = document.getElementById("associateGrid");
const STATUS = document.getElementById("statusLine");
const LOG = document.getElementById("terminalLog");

// Your existing Web App URL:
const BASE_URL = "https://script.google.com/macros/s/AKfycbxWepmyjLfJbiEX67SQRDDdc6_5i76nnN0oExFgqmLAY6ESMcNAOJwQ2uYcPy2K0OiI/exec";

const steps = [
    "Establishing secure uplink to Hansen Intelligence Database...",
    "Querying verified & approved associates...",
    "Decrypting operative profiles...",
    "Rendering active associate roster..."
];

let stepIndex = 0;

function logStep(text) {
    LOG.innerText += text + "\n";
}

function runBootSequence(callback) {
    function next() {
        if (stepIndex < steps.length) {
            logStep(steps[stepIndex]);
            stepIndex++;
            setTimeout(next, 450);
        } else {
            callback();
        }
    }
    next();
}

function fetchAssociates() {
    STATUS.innerText = "Loading active associates...";
    fetch(BASE_URL + "?list=1")
        .then(r => r.json())
        .then(data => {
            if (!data || data.length === 0) {
                STATUS.innerText = "No active associates are currently visible.";
                logStep("No active associates returned from database.");
                return;
            }

            STATUS.innerText = data.length + " active associate(s) online.";
            renderAssociates(data);
            logStep("Associate roster rendered successfully.");
        })
        .catch(err => {
            STATUS.innerText = "Error loading associates.";
            logStep("Error: " + err);
        });
}

function renderAssociates(list) {
    GRID.innerHTML = "";
    list.forEach(a => {
        const card = document.createElement("div");
        card.className = "card";

        const photo = document.createElement("div");
        photo.className = "photo";
        if (a.photoUrl) {
            photo.style.backgroundImage = "url('" + a.photoUrl + "')";
        }

        const name = document.createElement("div");
        name.className = "name";
        name.innerText = a.name || "Unnamed Associate";

        const spec = document.createElement("div");
        spec.className = "specialty";
        spec.innerText = a.specialty || "Specialty undisclosed";

        const bio = document.createElement("div");
        bio.className = "bio";
        bio.innerText = a.bio || "No public bio available.";

        const links = document.createElement("div");
        links.className = "links";

        if (a.instagram) {
            const ig = document.createElement("a");
            ig.className = "btn btn-instagram";
            ig.href = a.instagram.startsWith("http") ? a.instagram : "https://instagram.com/" + a.instagram.replace("@", "");
            ig.target = "_blank";
            ig.innerText = "View Instagram Profile";
            links.appendChild(ig);
        }

        const select = document.createElement("a");
        select.className = "btn btn-select";
        select.href = "index.html?associate=" + encodeURIComponent(a.name || "") + "#submit";
        select.innerText = "Select This Associate & Submit Case";
        links.appendChild(select);

        card.appendChild(photo);
        card.appendChild(name);
        card.appendChild(spec);
        card.appendChild(bio);
        card.appendChild(links);

        GRID.appendChild(card);
    });
}

runBootSequence(fetchAssociates);
</script>

</body>
</html>
