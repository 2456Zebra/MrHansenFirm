<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MR. HANSEN INTELLIGENCE ASSOCIATES</title>

<style>
    body {
        background: #000;
        color: #00ff9d;
        font-family: "Courier New", monospace;
        margin: 0;
        padding: 30px;
        text-align: center;
    }

    h1 {
        font-size: 28px;
        letter-spacing: 2px;
        margin-bottom: 10px;
    }

    h2 {
        font-size: 20px;
        opacity: 0.9;
        margin-bottom: 30px;
    }

    a.button {
        display: inline-block;
        padding: 12px 22px;
        border: 1px solid #00ff9d;
        color: #00ff9d;
        text-decoration: none;
        font-size: 16px;
        letter-spacing: 1px;
        border-radius: 6px;
        margin-bottom: 40px;
        box-shadow: 0 0 10px #00ff9d;
    }

    a.button:hover {
        background: #00ff9d;
        color: #000;
        box-shadow: 0 0 18px #00ff9d;
    }

    #associatesBox {
        width: 90%;
        max-width: 700px;
        margin: 0 auto;
        padding: 20px;
        border: 1px solid #00ff9d;
        border-radius: 8px;
        background: rgba(0,255,157,0.05);
    }

    #backHome {
        display: inline-block;
        margin-top: 40px;
        padding: 10px 18px;
        border: 1px solid #00ff9d;
        color: #00ff9d;
        text-decoration: none;
        border-radius: 6px;
        font-size: 14px;
    }

    #backHome:hover {
        background: #00ff9d;
        color: #000;
    }
</style>
</head>

<body>

<h1>MR. HANSEN INTELLIGENCE ASSOCIATES</h1>
<h2>Approved Associates</h2>

<!-- APPLY BUTTON -->
<a href="/associates-apply.html" class="button">APPLY TO BE AN ASSOCIATE</a>

<!-- ASSOCIATES LIST BOX -->
<div id="associatesBox">
    <div id="loading">Loading associates...</div>
    <div id="list"></div>
</div>

<!-- BACK TO HOME -->
<a id="backHome" href="/">‹ Back to Home</a>

<script>
const BACKEND_URL =
  "https://script.google.com/macros/s/AKfycbwbFCgXHrIeE-QHLDmCqPUWfilaNjnjun2FWHA_L19ceqjmfm78Jq4z1QD8vvkPpwfk/exec";

async function loadAssociates() {
    try {
        const res = await fetch(BACKEND_URL + "?list=1");
        const data = await res.json();

        document.getElementById("loading").style.display = "none";

        const list = document.getElementById("list");

        if (!data || data.length === 0) {
            list.innerHTML = "<p>No associates available.</p>";
            return;
        }

        list.innerHTML = data
            .map(a => `<p><b>${a.name}</b> — ${a.specialty}</p>`)
            .join("");
    } catch (err) {
        document.getElementById("list").innerHTML =
            "<p>Error loading associates.</p>";
    }
}

loadAssociates();
</script>

</body>
</html>
