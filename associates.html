<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MR. HANSEN INTELLIGENCE ASSOCIATES</title>

<style>
    body {
        background: #000;
        color: #00ff9d;
        font-family: "Courier New", monospace;
        margin: 0;
        padding: 30px;
        text-align: center;
    }

    h1 {
        font-size: 28px;
        letter-spacing: 2px;
        margin-bottom: 10px;
    }

    h2 {
        font-size: 20px;
        opacity: 0.9;
        margin-bottom: 30px;
    }

    /* Apply button (centered) */
    .apply-btn {
        display: inline-block;
        padding: 12px 22px;
        border: 1px solid #00ff9d;
        color: #00ff9d;
        text-decoration: none;
        font-size: 16px;
        letter-spacing: 1px;
        border-radius: 6px;
        margin-bottom: 40px;
    }

    .apply-btn:hover {
        background: #00ff9d;
        color: #000;
    }

    /* Associates list — LEFT aligned, no box */
    #list {
        text-align: left;
        margin: 0 auto;
        width: 90%;
        max-width: 700px;
        font-size: 16px;
        line-height: 1.6;
    }

    /* Back to Home — CENTERED now */
    #backHome {
        display: block;
        text-align: center;
        margin: 40px auto 0;
        color: #00ff9d;
        text-decoration: none;
        font-size: 14px;
    }

    #backHome:hover {
        text-decoration: underline;
    }
</style>
</head>

<body>

<h1>MR. HANSEN INTELLIGENCE ASSOCIATES</h1>
<h2>Approved Associates</h2>

<!-- APPLY BUTTON -->
<a href="/associates-apply.html" class="apply-btn">APPLY TO BE AN ASSOCIATE</a>

<!-- ASSOCIATES LIST (left aligned, no box) -->
<div id="list">
    <div id="loading">Loading associates...</div>
</div>

<!-- BACK TO HOME (centered) -->
<a id="backHome" href="/">‹ Back to Home</a>

<script>
const BACKEND_URL =
  "https://script.google.com/macros/s/AKfycbwbFCgXHrIeE-QHLDmCqPUWfilaNjnjun2FWHA_L19ceqjmfm78Jq4z1QD8vvkPpwfk/exec";

async function loadAssociates() {
    try {
        const res = await fetch(BACKEND_URL + "?list=1");
        const data = await res.json();

        document.getElementById("loading").style.display = "none";

        const list = document.getElementById("list");

        if (!data || data.length === 0) {
            list.innerHTML = "No associates available.";
            return;
        }

        list.innerHTML = data
            .map(a => `<p><b>${a.name}</b> — ${a.specialty}</p>`)
            .join("");
    } catch (err) {
        document.getElementById("list").innerHTML =
            "Error loading associates.";
    }
}

loadAssociates();
</script>

</body>
</html>
