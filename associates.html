<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Associate Profile</title>
  <style>
    body {
      font-family: "Courier New", monospace;
      background: #000;
      color: #00ff88;
      padding: 40px 20px;
      max-width: 1000px;
      margin: auto;
      line-height: 1.6;
    }
    .back-link {
      color: #00ff88;
      text-decoration: none;
      font-size: 18px;
      margin-bottom: 30px;
      display: inline-block;
    }
    .back-link:hover {
      text-shadow: 0 0 12px #00ff88;
    }
    .profile-container {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 50px;
      margin-top: 20px;
    }
    .photo {
      width: 100%;
      border-radius: 12px;
      border: 3px solid #00ff88;
      box-shadow: 0 0 30px #00ff88;
      background: #111;
    }
    .info h1 {
      font-size: 42px;
      margin: 0 0 8px 0;
      text-shadow: 0 0 15px #00ff88;
    }
    .specialty {
      font-size: 24px;
      color: #00ffaa;
      margin-bottom: 25px;
    }
    .bio {
      font-size: 17px;
      background: #0a0a0a;
      padding: 30px;
      border-radius: 10px;
      border-left: 5px solid #00ff88;
      box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
    }
    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 16px 32px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 6px;
      text-decoration: none;
      transition: all 0.3s;
    }
    .insta-btn {
      background: #ff2ea6;
      color: #fff;
      box-shadow: 0 0 20px #ff2ea6;
    }
    .case-btn {
      background: #00ff88;
      color: #000;
      box-shadow: 0 0 20px #00ff88;
      margin-left: 15px;
    }
    .btn:hover {
      transform: scale(1.05);
    }
    @media (max-width: 768px) {
      .profile-container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <a href="/associates.html" class="back-link">← BACK TO ALL ASSOCIATES</a>

  <div id="loading">LOADING PROFILE...</div>

  <div id="profileContent" style="display: none;">
    <div class="profile-container">
      <div>
        <img id="profilePhoto" class="photo" alt="Associate Photo">
      </div>
      <div class="info">
        <h1 id="profileName"></h1>
        <div id="profileSpecialty" class="specialty"></div>
        <div id="profileBio" class="bio"></div>

        <div>
          <a id="instaBtn" class="btn insta-btn" target="_blank">VIEW INSTAGRAM</a>
          <a id="caseBtn" class="btn case-btn">SUBMIT CASE TO THIS ASSOCIATE</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const BASE_URL = "https://script.google.com/macros/s/AKfycbxdfivR3V3XwbfvpFZdKJ4xhIjVLMbid2V55c_JA55kN_t9uwHOQpGAd79MRbu1YVKW/exec";

    async function loadProfile() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');

      if (!id) {
        document.getElementById("loading").innerHTML = "<span class='error'>Error: No profile ID provided.</span>";
        return;
      }

      try {
        const res = await fetch(BASE_URL);
        const associates = await res.json();

        const associate = associates.find(a => a.id === id);

        if (!associate) {
          document.getElementById("loading").innerHTML = "Associate not found.";
          return;
        }

        // Populate the profile
        document.getElementById("profileName").textContent = associate.name;
        document.getElementById("profileSpecialty").textContent = associate.specialty;
        document.getElementById("profileBio").innerHTML = associate.bio.replace(/\n/g, '<br>');
        document.getElementById("profilePhoto").src = associate.photoUrl;
        document.getElementById("instaBtn").href = `https://instagram.com/${associate.instagram}`;

        // Submit case button with pre-filled associate
        document.getElementById("caseBtn").href = `/case-submission.html?associate=${encodeURIComponent(associate.name)}&id=${associate.id}`;

        // Show content
        document.getElementById("loading").style.display = "none";
        document.getElementById("profileContent").style.display = "block";

      } catch (err) {
        console.error(err);
        document.getElementById("loading").innerHTML = "Failed to load profile. Please try again.";
      }
    }

    window.onload = loadProfile;
  </script>
</body>
</html>
