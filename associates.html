<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intelligence Associates</title>

  <style>
    body {
      background: #000;
      color: #00ff88;
      font-family: "Courier New", monospace;
      padding: 20px;
      text-align: center;
    }

    h1 {
      text-shadow: 0 0 12px #00ff88;
    }

    .apply-btn {
      display: inline-block;
      padding: 12px 20px;
      background: #00ff88;
      color: #000;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 0 12px #00ff88;
      transition: 0.2s;
      margin-bottom: 20px;
    }

    .apply-btn:hover {
      background: #00ffaa;
      box-shadow: 0 0 18px #00ffaa;
      transform: scale(1.05);
    }

    #loading {
      text-align: center;
      font-size: 20px;
      margin-top: 40px;
      text-shadow: 0 0 10px #00ff88;
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.3; }
      50% { opacity: 1; }
      100% { opacity: 0.3; }
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: #0a0a0a;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 12px #00ff88;
      text-align: center;
    }

    .photo {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 12px;
      box-shadow: 0 0 10px #00ff88;
    }

    .name {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .specialty {
      font-size: 16px;
      margin-bottom: 10px;
    }

    .bio {
      font-size: 14px;
      margin-bottom: 14px;
      color: #baffd9;
    }

    .insta-btn {
      display: inline-block;
      padding: 10px 16px;
      background: #ff2ea6;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 0 12px #ff2ea6;
      transition: 0.2s;
      margin-bottom: 12px;
    }

    .insta-btn:hover {
      background: #ff4fba;
      box-shadow: 0 0 18px #ff4fba;
      transform: scale(1.05);
    }

    .select-btn {
      display: inline-block;
      padding: 10px 16px;
      background: #00ff88;
      color: #000;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 0 12px #00ff88;
      transition: 0.2s;
    }

    .select-btn:hover {
      background: #00ffaa;
      box-shadow: 0 0 18px #00ffaa;
      transform: scale(1.05);
    }

    .back-home {
      display: block;
      margin: 50px auto 0 auto;
      width: fit-content;
      color: #00ff88;
      text-decoration: none;
      font-size: 16px;
      text-shadow: 0 0 8px #00ff88;
      transition: 0.2s;
    }

    .back-home:hover {
      color: #00ffaa;
      text-shadow: 0 0 12px #00ffaa;
    }
  </style>
</head>

<body>

  <h1>INTELLIGENCE ASSOCIATES</h1>

  <a href="/associate-apply.html" class="apply-btn">Apply to Be an Intelligence Associate</a>

  <div id="loading">LOADING ASSOCIATES...</div>

  <div class="grid" id="grid"></div>

  <a href="/index.html" class="back-home">&lt; Back to Home</a>

  <script>
    const BASE_URL = "https://script.google.com/macros/s/AKfycbytj2jBob2f1hKrvkXmi3MgNrUhrjmmc5w-tgCzM-VN8oaXElAARxAiKbOmfP49ke6a/exec";

    async function loadAssociates() {
      try {
        const res = await fetch(BASE_URL);
        const data = await res.json();

        const grid = document.getElementById("grid");
        const loading = document.getElementById("loading");

        loading.style.display = "none";

        if (!data || data.length === 0) {
          loading.style.display = "block";
          loading.innerText = "NO ASSOCIATES FOUND";
          return;
        }

        data.forEach(a => {
          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <img src="${a.photoUrl}" class="photo" />
            <div class="name">${a.name}</div>
            <div class="specialty">${a.specialty}</div>
            <div class="bio">${a.bio}</div>

            <a class="insta-btn" href="https://instagram.com/${a.instagram}" target="_blank">
              View Instagram
            </a>

            <br>

            <a class="select-btn" href="/index.html?associate=${encodeURIComponent(a.name)}#submit">
              Select This Associate
            </a>
          `;

          grid.appendChild(card);
        });

      } catch (err) {
        const loading = document.getElementById("loading");
        loading.innerText = "ERROR LOADING ASSOCIATES";
        console.error(err);
      }
    }

    loadAssociates();
  </script>

</body>
</html>
