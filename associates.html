<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Associates</title>

  <style>
    body {
      font-family: "Consolas", "Courier New", monospace;
      background: #000;
      color: #00ff88;
      padding: 40px;
      max-width: 1200px;
      margin: auto;
      overflow-x: hidden;
      position: relative;
      text-align: center;
    }

    /* Scanline overlay */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: repeating-linear-gradient(
        rgba(0, 255, 136, 0.04) 0px,
        rgba(0, 255, 136, 0.04) 2px,
        transparent 2px,
        transparent 4px
      );
      z-index: 999;
    }

    h1 {
      font-size: 38px;
      text-shadow: 0 0 14px #00ff88;
      margin-bottom: 40px;
      letter-spacing: 2px;
    }

    .back {
      display: inline-block;
      margin-bottom: 30px;
      color: #00ff88;
      text-decoration: none;
      font-size: 18px;
      text-shadow: 0 0 10px #00ff88;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 35px;
      margin-top: 20px;
    }

    .card {
      background: #0a0a0a;
      border: 1px solid #00ff88;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 18px #00ff88;
      text-align: center;
      transition: 0.25s;
    }

    .card:hover {
      transform: scale(1.03);
      box-shadow: 0 0 25px #00ffaa;
    }

    .card img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #00ff88;
      margin-bottom: 20px;
      box-shadow: 0 0 14px #00ff88;
    }

    .name {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 10px;
      text-shadow: 0 0 10px #00ff88;
    }

    .specialty {
      font-size: 16px;
      margin-bottom: 12px;
      opacity: 0.9;
    }

    .bio {
      font-size: 15px;
      margin-bottom: 18px;
      opacity: 0.85;
      line-height: 1.4;
    }

    .insta {
      display: block;
      margin-bottom: 18px;
      color: #00ffaa;
      text-decoration: none;
      font-size: 15px;
    }

    .select-btn {
      display: inline-block;
      padding: 12px 18px;
      background: #00ff88;
      color: #000;
      font-weight: bold;
      border-radius: 6px;
      text-decoration: none;
      box-shadow: 0 0 15px #00ff88;
      transition: 0.2s;
    }

    .select-btn:hover {
      background: #00ffaa;
      box-shadow: 0 0 25px #00ffaa;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <a href="/index.html" class="back">‹ Back to Home</a>
  <h1>ACTIVE ASSOCIATES</h1>

  <div id="grid" class="grid"></div>

  <script>
    const DATA_URL =
      "https://script.google.com/macros/s/AKfycbxOt2pOZySr1pMi8PBB99duXLjF9DwxJcqbVuCMZ2BSK3d_dPYXc0E_iyKhiDyG7n_K/exec?list=1";

    async function loadAssociates() {
      try {
        const response = await fetch(DATA_URL);
        const associates = await response.json();

        const grid = document.getElementById("grid");
        grid.innerHTML = "";

        if (!associates || associates.length === 0) {
          grid.innerHTML = "<p style='font-size:18px;opacity:0.7;'>No associates available.</p>";
          return;
        }

        associates.forEach(a => {
          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <img src="${a.photoUrl}" alt="${a.name}">
            <div class="name">${a.name}</div>
            <div class="specialty">${a.specialty}</div>
            <a class="insta" href="https://instagram.com/${a.instagram}" target="_blank">
              @${a.instagram}
            </a>
            <div class="bio">${a.bio}</div>
            <a class="select-btn" href="/associate-apply.html?associate=${encodeURIComponent(a.name)}">
              SELECT THIS ASSOCIATE
            </a>
          `;

          grid.appendChild(card);
        });

      } catch (err) {
        console.error("Error loading associates:", err);
        document.getElementById("grid").innerHTML =
          "<p style='font-size:18px;opacity:0.7;'>Error loading associates.</p>";
      }
    }

    loadAssociates();
  </script>

</body>
</html>
