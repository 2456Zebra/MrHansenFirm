<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intelligence Associates</title>

  <style>
    body {
      background: #000;
      color: #00ff88;
      font-family: "Courier New", monospace;
      padding: 20px;
      text-align: center;
    }

    h1 { text-shadow: 0 0 12px #00ff88; }

    .apply-btn {
      display: inline-block;
      padding: 12px 20px;
      background: #00ff88;
      color: #000;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 0 12px #00ff88;
      transition: 0.2s;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: #0a0a0a;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 12px #00ff88;
      text-align: center;
    }

    .photo {
      width: 100%;
      height: 280px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 12px;
      box-shadow: 0 0 10px #00ff88;
      background: #111;
    }

    /* Other styles remain the same */
    .name { font-size: 22px; font-weight: bold; margin-bottom: 6px; }
    .specialty { font-size: 16px; margin-bottom: 10px; }
    .bio { font-size: 14px; margin-bottom: 14px; color: #baffd9; }
    .insta-btn, .select-btn {
      display: inline-block;
      padding: 10px 16px;
      margin: 6px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
    }
    .insta-btn { background: #ff2ea6; color: #fff; box-shadow: 0 0 12px #ff2ea6; }
    .select-btn { background: #00ff88; color: #000; box-shadow: 0 0 12px #00ff88; }
  </style>
</head>
<body>

  <h1>INTELLIGENCE ASSOCIATES</h1>
  <a href="/associate-apply.html" class="apply-btn">Apply to Be an Intelligence Associate</a>

  <div id="loading">LOADING ASSOCIATES...</div>
  <div class="grid" id="grid"></div>

  <a href="/index.html" class="back-home">&lt; Back to Home</a>

  <script>
    const BASE_URL = "https://script.google.com/macros/s/AKfycbxOOgNe5mGjo_9mRfXAerrlFypPiRmLaFVbErfwKstkXgdMSWQCM_uXvbdjcPBZsD8P/exec";   // ← Update if needed

    async function loadAssociates() {
      try {
        const res = await fetch(BASE_URL);
        const data = await res.json();

        const grid = document.getElementById("grid");
        const loading = document.getElementById("loading");
        loading.style.display = "none";

        if (!data || data.length === 0) {
          loading.style.display = "block";
          loading.innerText = "NO ASSOCIATES FOUND";
          return;
        }

        grid.innerHTML = "";

        data.forEach(a => {
          const card = document.createElement("div");
          card.className = "card";

          // Force better Drive image loading
          const imageUrl = a.photoUrl.replace("export=view", "uc?id=") + "&t=" + Date.now(); // cache buster

          card.innerHTML = `
            <img src="${imageUrl}" class="photo" onerror="this.src='https://via.placeholder.com/300x280/111111/00ff88?text=Photo+Unavailable'" />
            <div class="name">${a.name}</div>
            <div class="specialty">${a.specialty}</div>
            <div class="bio">${a.bio}</div>

            <a class="insta-btn" href="https://instagram.com/${a.instagram}" target="_blank">
              View Instagram
            </a>

            <a class="select-btn" href="/index.html?associate=${encodeURIComponent(a.name)}#submit">
              Select This Associate
            </a>
          `;

          grid.appendChild(card);
        });

      } catch (err) {
        console.error(err);
        document.getElementById("loading").innerText = "ERROR LOADING ASSOCIATES";
      }
    }

    // Load on page open
    window.onload = loadAssociates;
  </script>
</body>
</html>
