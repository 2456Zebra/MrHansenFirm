<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligence Associates</title>

    <style>
        body {
            background-color: #0d0d0d;
            color: #e6e6e6;
            font-family: Consolas, monospace;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #0f0;
            margin-bottom: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            padding: 10px;
        }

        .card {
            background: #111;
            border: 1px solid #0f0;
            border-radius: 6px;
            padding: 15px;
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #0f0;
        }

        .name {
            font-size: 18px;
            color: #0f0;
            margin-top: 10px;
        }

        .specialty {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .bio {
            font-size: 13px;
            line-height: 1.4;
            margin-bottom: 10px;
        }

        .insta {
            color: #0f0;
            text-decoration: none;
            font-size: 14px;
        }

        .insta:hover {
            text-decoration: underline;
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #0f0;
            text-decoration: none;
        }

        .back:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <h1>INTELLIGENCE ASSOCIATES</h1>

    <div id="associateGrid" class="grid"></div>

    <a href="index.html" class="back">← Back to Home</a>

    <script>
        const BASE_URL = "https://script.google.com/macros/s/AKfycbxOt2pOZySr1pMi8PBB99duXLjF9DwxJcqbVuCMZ2BSK3d_dPYXc0E_iyKhiDyG7n_K/exec";

        async function loadAssociates() {
            try {
                const response = await fetch(BASE_URL + "?list=1");
                const data = await response.json();

                const grid = document.getElementById("associateGrid");
                grid.innerHTML = "";

                if (data.length === 0) {
                    grid.innerHTML = "<p>No associates available.</p>";
                    return;
                }

                data.forEach(a => {
                    const card = document.createElement("div");
                    card.className = "card";

                    card.innerHTML = `
                        <img src="${a.photoUrl}" alt="${a.name}">
                        <div class="name">${a.name}</div>
                        <div class="specialty">${a.specialty}</div>
                        <div class="bio">${a.bio}</div>
                        <a class="insta" href="https://instagram.com/${a.instagram}" target="_blank">
                            @${a.instagram}
                        </a>
                    `;

                    grid.appendChild(card);
                });

            } catch (err) {
                console.error(err);
                document.getElementById("associateGrid").innerHTML =
                    "<p>Error loading associates.</p>";
            }
        }

        loadAssociates();
    </script>

</body>
</html>
