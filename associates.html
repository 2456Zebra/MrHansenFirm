<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Associates</title>

  <style>
    body {
      font-family: "Consolas", "Courier New", monospace;
      background: #000;
      color: #00ff88;
      padding: 40px;
      margin: 0;
      overflow-x: hidden;
    }

    /* Scanline overlay */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: repeating-linear-gradient(
        rgba(0, 255, 136, 0.05) 0px,
        rgba(0, 255, 136, 0.05) 2px,
        transparent 2px,
        transparent 4px
      );
      z-index: 999;
    }

    h1 {
      text-align: center;
      font-size: 36px;
      margin-bottom: 40px;
      text-shadow: 0 0 12px #00ff88;
    }

    /* Grid layout */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    /* Associate card */
    .card {
      background: #0a0a0a;
      border: 1px solid #00ff88;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 0 15px #00ff88;
      text-align: center;
      animation: fadeIn 0.8s ease forwards;
      opacity: 0;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .photo {
      width: 100%;
      height: 260px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #00ff88;
      box-shadow: 0 0 12px #00ff88;
      margin-bottom: 15px;
    }

    .name {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 8px;
      text-shadow: 0 0 8px #00ff88;
    }

    .specialty {
      font-size: 16px;
      margin-bottom: 12px;
      color: #7affc9;
    }

    .bio {
      font-size: 14px;
      margin-bottom: 18px;
      line-height: 1.4;
      color: #baffea;
    }

    /* Pink Instagram button */
    .insta-btn {
      display: inline-block;
      padding: 10px 16px;
      background: #ff2ea6;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 0 12px #ff2ea6;
      transition: 0.2s;
    }

    .insta-btn:hover {
      background: #ff4fba;
      box-shadow: 0 0 18px #ff4fba;
      transform: scale(1.05);
    }

    /* Loading text */
    #loading {
      text-align: center;
      font-size: 20px;
      margin-top: 40px;
      text-shadow: 0 0 10px #00ff88;
    }
  </style>
</head>

<body>

  <h1>INTELLIGENCE ASSOCIATES</h1>

  <div id="loading">LOADING ASSOCIATES...</div>

  <div class="grid" id="grid"></div>

  <script>
    const BASE_URL =
      "https://script.google.com/macros/s/AKfycby1fP5um9r0tVH8sj6N1BwkRRnc3Sy9zlrD5CvdslkxbeED2jsLyHZ6HdSCL96LjRjX/exec?list=1";

    async function loadAssociates() {
      try {
        const res = await fetch(BASE_URL);
        const data = await res.json();

        const grid = document.getElementById("grid");
        const loading = document.getElementById("loading");

        loading.style.display = "none";

        data.forEach(a => {
          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <img src="${a.photoUrl}" class="photo" />
            <div class="name">${a.name}</div>
            <div class="specialty">${a.specialty}</div>
            <div class="bio">${a.bio}</div>
            <a class="insta-btn" href="https://instagram.com/${a.instagram}" target="_blank">
              View Instagram
            </a>
          `;

          grid.appendChild(card);
        });

      } catch (err) {
        document.getElementById("loading").innerText =
          "ERROR LOADING ASSOCIATES";
        console.error(err);
      }
    }

    loadAssociates();
  </script>

</body>
</html>
