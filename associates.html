<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Associates – MR. HANSEN FIRM</title>

<style>
    body {
        background-color: #000;
        color: #00ff9d;
        font-family: "Courier New", monospace;
        margin: 0;
        padding: 0;
    }

    h1, h2 {
        text-align: center;
        margin-top: 30px;
        letter-spacing: 2px;
    }

    .section {
        width: 90%;
        max-width: 900px;
        margin: 40px auto;
        padding: 20px;
        border: 1px solid #00ff9d;
        border-radius: 8px;
        background: rgba(0, 255, 157, 0.05);
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 20px;
        margin-top: 20px;
    }

    .card {
        border: 1px solid #00ff9d;
        padding: 15px;
        border-radius: 8px;
        background: rgba(0, 255, 157, 0.08);
        text-align: center;
    }

    .card img {
        width: 100%;
        height: 220px;
        object-fit: cover;
        border-radius: 6px;
        border: 1px solid #00ff9d;
    }

    label {
        display: block;
        margin-top: 12px;
        font-size: 14px;
    }

    input, textarea {
        width: 100%;
        padding: 10px;
        margin-top: 6px;
        background: #000;
        border: 1px solid #00ff9d;
        color: #00ff9d;
        border-radius: 4px;
        font-family: inherit;
    }

    button {
        margin-top: 20px;
        width: 100%;
        padding: 12px;
        background: #00ff9d;
        color: #000;
        font-weight: bold;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        letter-spacing: 1px;
    }

    button:hover {
        background: #00e68c;
    }

    .loading {
        text-align: center;
        margin-top: 20px;
        font-size: 16px;
        opacity: 0.8;
    }
</style>
</head>

<body>

<h1>MR. HANSEN FIRM</h1>
<h2>Associates</h2>

<!-- ASSOCIATES LIST -->
<div class="section">
    <h2>Approved Associates</h2>
    <div id="loading" class="loading">Loading associates...</div>
    <div id="grid" class="grid"></div>
</div>

<!-- APPLICATION FORM -->
<div class="section">
    <h2>Apply to Become an Associate</h2>

    <form id="associateForm" enctype="multipart/form-data">
        <label>Name</label>
        <input type="text" name="name" required />

        <label>Email</label>
        <input type="email" name="email" required />

        <label>Instagram Handle</label>
        <input type="text" name="instagram" required />

        <label>Specialty</label>
        <input type="text" name="specialty" required />

        <label>Bio</label>
        <textarea name="bio" rows="4" required></textarea>

        <label>Upload Photo</label>
        <input type="file" name="photo" accept="image/*" required />

        <button type="submit">Submit Application</button>
    </form>

    <div id="formStatus" class="loading"></div>
</div>

<script>
const BACKEND_URL = "https://script.google.com/macros/s/AKfycbwbFCgXHrIeE-QHLDmCqPUWfilaNjnjun2FWHA_L19ceqjmfm78Jq4z1QD8vvkPpwfk/exec";

/* LOAD APPROVED ASSOCIATES */
async function loadAssociates() {
    try {
        const res = await fetch(BACKEND_URL + "?list=1");
        const data = await res.json();

        document.getElementById("loading").style.display = "none";

        const grid = document.getElementById("grid");
        grid.innerHTML = "";

        if (data.length === 0) {
            grid.innerHTML = "<p>No associates available yet.</p>";
            return;
        }

        data.forEach(a => {
            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
                <img src="${a.photoUrl}" />
                <h3>${a.name}</h3>
                <p><b>${a.specialty}</b></p>
                <p>@${a.instagram}</p>
            `;

            grid.appendChild(card);
        });

    } catch (err) {
        document.getElementById("loading").innerText = "Error loading associates.";
    }
}

loadAssociates();

/* SUBMIT APPLICATION */
document.getElementById("associateForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const formStatus = document.getElementById("formStatus");
    formStatus.innerText = "Submitting...";

    const formData = new FormData(e.target);

    try {
        const res = await fetch(BACKEND_URL, {
            method: "POST",
            body: formData
        });

        const text = await res.text();

        if (text.includes("OK")) {
            formStatus.innerText = "Application submitted! Check your email to verify.";
            e.target.reset();
        } else {
            formStatus.innerText = "Error: " + text;
        }

    } catch (err) {
        formStatus.innerText = "Submission failed.";
    }
});
</script>

</body>
</html>
