<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intelligence Associates</title>
  <style>
    body {
      background: #000;
      color: #00ff88;
      font-family: "Courier New", monospace;
      padding: 20px;
      text-align: center;
    }
    h1 { 
      text-shadow: 0 0 12px #00ff88; 
      margin-bottom: 10px;
    }

    .apply-btn {
      display: inline-block;
      padding: 12px 20px;
      background: #00ff88;
      color: #000;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 0 12px #00ff88;
      transition: 0.2s;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 25px;
      margin-top: 20px;
    }

    .card {
      background: #0a0a0a;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 12px #00ff88;
      text-align: center;
      transition: all 0.3s;
    }
    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 0 25px #00ff88;
    }

    .photo {
      width: 100%;
      height: 280px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 12px;
      box-shadow: 0 0 10px #00ff88;
      background: #111;
    }

    .name { font-size: 22px; font-weight: bold; margin-bottom: 6px; }
    .specialty { font-size: 16px; margin-bottom: 10px; color: #00ffaa; }
    .bio { 
      font-size: 14px; 
      margin-bottom: 16px; 
      color: #baffd9;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .insta-btn, .select-btn {
      display: inline-block;
      padding: 10px 16px;
      margin: 6px 4px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
    }
    .insta-btn { background: #ff2ea6; color: #fff; box-shadow: 0 0 12px #ff2ea6; }
    .select-btn { background: #00ff88; color: #000; box-shadow: 0 0 12px #00ff88; }

    .back-home {
      display: block;
      margin: 60px auto 0;
      color: #00ff88;
      text-decoration: none;
      font-size: 16px;
    }

    /* Animated Loading */
    #loading {
      font-size: 20px;
      margin: 50px 0;
      text-shadow: 0 0 10px #00ff88;
      animation: pulse 1.5s infinite, typing 3s steps(30) infinite alternate;
      min-height: 30px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>

  <h1>INTELLIGENCE ASSOCIATES</h1>
  <a href="/associate-apply.html" class="apply-btn">Apply to Be an Intelligence Associate</a>

  <div id="loading">INITIALIZING ASSOCIATES NETWORK...</div>
  <div class="grid" id="grid"></div>

  <a href="/index.html" class="back-home">&lt; Back to Home</a>

  <script>
    const BASE_URL = "https://script.google.com/macros/s/AKfycbxdfivR3V3XwbfvpFZdKJ4xhIjVLMbid2V55c_JA55kN_t9uwHOQpGAd79MRbu1YVKW/exec";

    async function loadAssociates() {
      const loading = document.getElementById("loading");
      
      try {
        const res = await fetch(BASE_URL);
        const data = await res.json();

        loading.style.display = "none";

        if (!data || data.length === 0) {
          loading.style.display = "block";
          loading.innerText = "NO ASSOCIATES FOUND";
          return;
        }

        const grid = document.getElementById("grid");
        grid.innerHTML = "";

        data.forEach(a => {
          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <img src="${a.photoUrl}" class="photo" 
                 onerror="this.src='https://via.placeholder.com/300x280/111111/00ff88?text=Photo+Unavailable'" />
            <div class="name">${a.name}</div>
            <div class="specialty">${a.specialty}</div>
            <div class="bio">${a.bio}</div>
            
            <a class="insta-btn" href="https://instagram.com/${a.instagram}" target="_blank">
              View Instagram
            </a>
            
            <a class="select-btn" href="/profile.html?id=${a.id}">
              View Full Profile
            </a>
          `;

          grid.appendChild(card);
        });

      } catch (err) {
        console.error(err);
        loading.style.display = "block";
        loading.innerHTML = "ERROR LOADING ASSOCIATES NETWORK";
      }
    }

    window.onload = loadAssociates;
  </script>
</body>
</html>
