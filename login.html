<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. Hansen Firm - Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f0f0f;
            color: #ddd;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-container {
            background: #1a1a1a;
            padding: 40px 30px;
            border-radius: 12px;
            border: 1px solid #444;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        h2 { text-align: center; margin-bottom: 30px; color: #fff; }
        label { display: block; margin: 15px 0 6px; color: #ccc; }
        select, input {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #555;
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
        }
        input:focus, select:focus {
            border-color: #0066ff;
            outline: none;
        }
        .error-message {
            color: #ff6666;
            font-size: 0.9em;
            margin-top: 4px;
            display: none;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #0066ff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 17px;
            margin-top: 25px;
            cursor: pointer;
        }
        button:hover { background: #3388ff; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #888; text-decoration: none; }
        .back-link a:hover { color: #ddd; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Admin Login</h2>
        
        <form id="loginForm" autocomplete="off" novalidate>
            <!-- Dummy fields to trick password managers -->
            <input type="text" style="display:none;" aria-hidden="true">
            <input type="password" style="display:none;" aria-hidden="true">

            <label for="adminType">Select Admin Portal</label>
            <select id="adminType" required>
                <option value="">-- Select Portal --</option>
                <option value="client-admin.html">Client Admin</option>
                <option value="associate-admin.html">Associate Admin</option>
                <option value="firm-admin.html">Firm Admin</option>
            </select>
            <div id="adminTypeError" class="error-message"></div>

            <label for="email">Email</label>
            <input type="text" id="email" autocomplete="off" 
                   placeholder="your@email.com">
            <div id="emailError" class="error-message"></div>

            <label for="password">Password</label>
            <input type="password" id="password" autocomplete="new-password" 
                   placeholder="Enter password">
            <div id="passwordError" class="error-message"></div>

            <button type="submit">Sign In</button>
        </form>

        <div class="back-link">
            <a href="index.html">← Back to Main Site</a>
        </div>
    </div>

    <script>
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const redirect = params.get('redirect');
            if (redirect) {
                document.getElementById('adminType').value = redirect;
            }
        };

        function showError(fieldId, message) {
            const errorDiv = document.getElementById(fieldId + 'Error');
            if (errorDiv) {
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
            }
        }

        function clearErrors() {
            document.querySelectorAll('.error-message').forEach(el => el.style.display = 'none');
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            clearErrors();

            const adminType = document.getElementById('adminType').value;
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            let isValid = true;

            if (!adminType) {
                showError('adminType', 'Please select an Admin Portal');
                isValid = false;
            }
            if (!email) {
                showError('email', 'Please enter your email');
                isValid = false;
            }
            if (!password) {
                showError('password', 'Please enter your password');
                isValid = false;
            } else if (password.length < 4) {
                showError('password', 'Password must be at least 4 characters');
                isValid = false;
            }

            if (!isValid) return;

            window.location.href = adminType;
        });
    </script>
</body>
</html>
