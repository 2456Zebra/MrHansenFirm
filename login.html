<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mr. Hansen Firm - Login</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: linear-gradient(135deg, #1e3a8a, #3b82f6); 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      margin: 0; 
    }
    .login-box { 
      background: white; 
      padding: 40px; 
      border-radius: 12px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
      width: 380px; 
      text-align: center; 
    }
    h2 { color: #1e3a8a; }
    select, input, button { 
      width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; font-size: 16px; 
    }
    button { 
      background: #1e3a8a; color: white; border: none; cursor: pointer; font-weight: bold; 
    }
    button:hover { background: #2e5bcc; }
    .error { color: red; margin-top: 10px; font-weight: bold; }
  </style>
</head>
<body>

<div class="login-box">
  <h2>Mr. Hansen & Associates</h2>
  <p><strong>Admin Portal</strong></p>

  <label><strong>Select Your Role</strong></label><br><br>
  <select id="roleSelect">
    <option value="client_admin">Client Admin</option>
    <option value="associates_admin">Associates Admin</option>
    <option value="firm_admin">Firm Admin (Full Access)</option>
  </select>

  <input type="text" id="username" placeholder="Email Address" value="admin@mrhansenfirm.com">

  <button onclick="handleLogin()">Login →</button>
  
  <div id="errorMsg" class="error"></div>
  <p style="margin-top:20px; font-size:14px;">Demo Mode - No password required</p>
</div>

<script>
console.log("✅ Login page script loaded");

function handleLogin() {
  console.log("🔄 handleLogin() function called");
  
  const role = document.getElementById('roleSelect').value;
  const username = document.getElementById('username').value.trim();
  const errorMsg = document.getElementById('errorMsg');

  if (!username) {
    errorMsg.textContent = "Please enter an email";
    console.log("❌ No username entered");
    return;
  }

  console.log("✅ Login successful - Role:", role);

  localStorage.setItem('userRole', role);
  localStorage.setItem('userName', username.split('@')[0] || 'Admin');

  // Redirect
  window.location.href = 'dashboard.html';
}

// Fallback: Allow pressing Enter key
document.addEventListener('keypress', function(e) {
  if (e.key === 'Enter') handleLogin();
});
</script>

</body>
</html>
