<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. Hansen Firm - Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f0f0f;
            color: #ddd;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-container {
            background: #1a1a1a;
            padding: 40px 30px;
            border-radius: 12px;
            border: 1px solid #444;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        h2 { text-align: center; margin-bottom: 30px; color: #fff; }
        label { display: block; margin: 15px 0 6px; color: #ccc; }
        select, input {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #555;
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
        }
        input:focus, select:focus {
            border-color: #0066ff;
            outline: none;
        }
        .error-message {
            color: #ff6666;
            font-size: 0.9em;
            margin-top: 4px;
            display: none;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #0066ff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 17px;
            margin-top: 25px;
            cursor: pointer;
        }
        button:hover { background: #3388ff; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #888; text-decoration: none; }
        .back-link a:hover { color: #ddd; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Admin Login</h2>
        
        <form id="loginForm" autocomplete="off">
            <!-- Dummy fields to fight password manager -->
            <input type="text" style="display:none;" aria-hidden="true">
            <input type="password" style="display:none;" aria-hidden="true">

            <label for="adminType">Select Admin Portal</label>
            <select id="adminType" required>
                <option value="">-- Select Portal --</option>
                <option value="client-admin.html">Client Admin</option>
                <option value="associate-admin.html">Associate Admin</option>
                <option value="firm-admin.html">Firm Admin</option>
            </select>
            <div id="adminTypeError" class="error-message"></div>

            <label for="email">Email</label>
            <input type="text" id="email" autocomplete="off" 
                   placeholder="your@email.com" required>
            <div id="emailError" class="error-message"></div>

            <label for="password">Password</label>
            <input type="password" id="password" autocomplete="new-password" 
                   placeholder="Enter password" required>
            <div id="passwordError" class="error-message"></div>

            <button type="submit">Sign In</button>
        </form>

        <div class="back-link">
            <a href="index.html">← Back to Main Site</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    // Pre-select admin type
    window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        const redirect = params.get('redirect');
        if (redirect) {
            document.getElementById('adminType').value = redirect;
        }
    };

    function showError(fieldId, message) {
        const errorDiv = document.getElementById(fieldId + 'Error');
        if (errorDiv) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
    }

    function clearErrors() {
        document.querySelectorAll('.error-message').forEach(el => el.style.display = 'none');
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        clearErrors();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();

        let isValid = true;

        if (!email) {
            showError('email', 'Please enter your email');
            isValid = false;
        }
        if (!password) {
            showError('password', 'Please enter your password');
            isValid = false;
        } else if (password.length < 4) {
            showError('password', 'Password must be at least 4 characters');
            isValid = false;
        }

        if (!isValid) return;

        try {
            // Authenticate user
            const userCred = await firebase.auth().signInWithEmailAndPassword(email, password);
            const uid = userCred.user.uid;

            // Fetch role from Firestore
            const doc = await db.collection("users").doc(uid).get();
            if (!doc.exists) {
                alert("No user profile found. Contact support.");
                return;
            }

            const role = doc.data().role;

            // Role-based redirect
            if (role === "client_admin") {
                window.location.href = "client-admin.html";
            } else if (role === "associate_admin") {
                window.location.href = "associate-admin.html";
            } else if (role === "firm_admin") {
                window.location.href = "firm-admin.html";
            } else if (role === "community_user") {
                window.location.href = "community.html";
            } else {
                alert("Your account has no valid role assigned.");
            }

        } catch (err) {
            console.error(err);
            alert("Invalid login. Check your email and password.");
        }
    });
</script>

</body>
</html>
