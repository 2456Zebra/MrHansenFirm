<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mr. Hansen Firm</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 120px 20px; 
            background: #f8f8f8;
        }
        .login-box { 
            max-width: 420px; 
            margin: 0 auto; 
            background: white;
            padding: 50px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 { margin-bottom: 30px; }
        input { 
            width: 100%; 
            padding: 14px; 
            margin: 12px 0; 
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button { 
            width: 100%;
            padding: 14px; 
            background: #1a1a1a; 
            color: white; 
            border: none; 
            cursor: pointer;
            font-size: 16px;
            border-radius: 4px;
            margin-top: 10px;
        }
        button:hover { background: #333; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Mr. Hansen Firm</h2>
    
    <div id="admin-mode">
        <p><strong>Mr. H Admin Access</strong></p>
        <input type="password" id="admin-pass" placeholder="Enter Admin Password" />
        <button onclick="adminLogin()">Login as Mr. H</button>
    </div>

    <div id="associate-mode" style="display: none;">
        <p>Associate Portal</p>
        <input type="text" id="username" placeholder="Username or Email" />
        <input type="password" id="password" placeholder="Password" />
        <button onclick="associateLogin()">Login as Associate</button>
    </div>
</div>

<script>
// Show admin login if coming from "Mr. H" link
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('role') === 'admin') {
    document.getElementById('admin-mode').style.display = 'block';
} else {
    document.getElementById('associate-mode').style.display = 'block';
}

function adminLogin() {
    const pass = document.getElementById('admin-pass').value;
    
    if (pass === "admin2025*Black9") {
        localStorage.setItem('userRole', 'admin');
        localStorage.setItem('userName', 'Mr. Hansen');
        window.location.href = "dashboard.html";
    } else {
        alert("Incorrect password");
    }
}

function associateLogin() {
    alert("Associate login coming soon.");
}
</script>

</body>
</html>
