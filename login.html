<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mr. Hansen Firm - Login</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 380px; text-align: center; }
    select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; font-size: 16px; }
    button { background: #1e3a8a; color: white; border: none; cursor: pointer; }
    button:hover { background: #2e5bcc; }
  </style>
</head>
<body>

<div class="login-box">
  <h2>Mr. Hansen & Associates</h2>
  <p><strong>Admin Portal</strong></p>

  <label>Select Your Role</label><br><br>
  <select id="roleSelect">
    <option value="client_admin">Client Admin</option>
    <option value="associates_admin">Associates Admin</option>
    <option value="firm_admin">Firm Admin (Full Access)</option>
  </select>

  <input type="text" id="username" placeholder="Username or Email" value="admin@mrhansenfirm.com" style="width:100%; padding:12px; margin:10px 0;"><br>

  <button onclick="login()">Login</button>
</div>

<script>
function login() {
  const role = document.getElementById('roleSelect').value;
  localStorage.setItem('userRole', role);
  localStorage.setItem('userName', 'John Hansen');
  
  window.location.href = 'dashboard.html';
}
</script>

</body>
</html>
