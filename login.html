<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. Hansen Firm - Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f0f0f;
            color: #ddd;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-container {
            background: #1a1a1a;
            padding: 40px 30px;
            border-radius: 12px;
            border: 1px solid #444;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #fff;
        }
        label {
            display: block;
            margin: 15px 0 6px;
            color: #ccc;
        }
        select, input {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #555;
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
        }
        input:focus, select:focus {
            border-color: #0066ff;
            outline: none;
        }
        .error-message {
            color: #ff6666;
            font-size: 0.9em;
            margin-top: 4px;
            display: none;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #0066ff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 17px;
            margin-top: 25px;
            cursor: pointer;
        }
        button:hover {
            background: #3388ff;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #888;
            text-decoration: none;
        }
        .back-link a:hover {
            color: #ddd;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Admin Login</h2>
        
        <form id="loginForm" autocomplete="off">
            <label for="adminType">Select Admin Portal</label>
            <select id="adminType" required>
                <option value="">-- Select Portal --</option>
                <option value="client-admin.html">Client Admin</option>
                <option value="associate-admin.html">Associate Admin</option>
                <option value="firm-admin.html">Firm Admin</option>
            </select>
            <div id="adminTypeError" class="error-message"></div>

            <label for="email">Email</label>
            <input type="email" id="email" autocomplete="off" placeholder="your@email.com" required>
            <div id="emailError" class="error-message"></div>

            <label for="password">Password</label>
            <input type="password" id="password" autocomplete="new-password" placeholder="Enter password" required>
            <div id="passwordError" class="error-message"></div>

            <button type="submit">Sign In</button>
        </form>

        <div class="back-link">
            <a href="index.html">← Back to Main Site</a>
        </div>
    </div>

    <script>
        // Handle redirect parameter
        function getRedirectParam() {
            const params = new URLSearchParams(window.location.search);
            return params.get('redirect');
        }

        // Pre-select admin type
        window.onload = function() {
            const redirectPage = getRedirectParam();
            if (redirectPage) {
                document.getElementById('adminType').value = redirectPage;
            }
        };

        function showError(fieldId, message) {
            const errorDiv = document.getElementById(fieldId + 'Error');
            const input = document.getElementById(fieldId);
            if (errorDiv) {
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
            }
            if (input) input.style.borderColor = '#ff6666';
        }

        function clearErrors() {
            document.querySelectorAll('.error-message').forEach(el => el.style.display = 'none');
            document.querySelectorAll('select, input').forEach(el => el.style.borderColor = '#555');
        }

        // Main Login Handler
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            clearErrors();

            const adminType = document.getElementById('adminType').value;
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            let isValid = true;

            if (!adminType) {
                showError('adminType', 'Please select an Admin Portal');
                isValid = false;
            }
            if (!email) {
                showError('email', 'Please enter your email');
                isValid = false;
            }
            if (!password) {
                showError('password', 'Please enter your password');
                isValid = false;
            } else if (password.length < 4) {
                showError('password', 'Password must be at least 4 characters');
                isValid = false;
            }

            if (!isValid) return;

            // Proceed with login
            console.log(`Login successful → ${adminType}`);
            window.location.href = adminType;
        });
    </script>
</body>
</html>
