<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Test</title>
</head>
<body>
  <h1>Login Page Test v4</h1>
  <p>If you see this, the file is updated.</p>

  <select id="roleSelect">
    <option value="client_admin">Client Admin</option>
    <option value="associates_admin">Associates Admin</option>
    <option value="firm_admin">Firm Admin</option>
  </select>

  <button onclick="goToDashboard()">Login</button>

<script>
alert("JavaScript is working!");   // This should pop up immediately

function goToDashboard() {
  const role = document.getElementById('roleSelect').value;
  localStorage.setItem('userRole', role);
  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
