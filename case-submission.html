<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submit Case</title>
  <style>
    body {
      font-family: "Courier New", monospace;
      background: #000;
      color: #00ff88;
      padding: 40px 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { text-shadow: 0 0 15px #00ff88; margin-bottom: 10px; }
    .associate-banner {
      background: #0a0a0a;
      padding: 15px 20px;
      border-left: 5px solid #00ff88;
      margin-bottom: 30px;
      font-size: 18px;
    }
    label { display: block; margin-top: 20px; font-weight: bold; }
    input, textarea, select {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      background: #0a0a0a;
      border: 1px solid #00ff88;
      color: #00ff88;
      border-radius: 6px;
      font-size: 16px;
    }
    button {
      margin-top: 40px;
      width: 100%;
      padding: 18px;
      background: #00ff88;
      color: #000;
      font-size: 20px;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      box-shadow: 0 0 25px #00ff88;
    }
    button:hover { background: #00ffaa; box-shadow: 0 0 35px #00ffaa; }
    #status { margin-top: 20px; font-size: 16px; min-height: 1.5em; }
  </style>
</head>
<body>
  <h1>SUBMIT NEW CASE</h1>
  
  <div id="associateBanner" class="associate-banner" style="display:none;">
    Submitting case to: <strong id="selectedAssociate"></strong>
  </div>

  <form id="caseForm">
    <input type="hidden" id="associateId">

    <label>Associate</label>
    <input type="text" id="associateName" readonly />

    <label>Your Name</label>
    <input type="text" id="clientName" required />

    <label>Your Email</label>
    <input type="email" id="clientEmail" required />

    <label>Case Title</label>
    <input type="text" id="caseTitle" required />

    <label>Case Description</label>
    <textarea id="caseDescription" rows="8" required></textarea>

    <label>Service Tier</label>
    <select id="tier" required>
      <option value="">— Select Tier —</option>
      <option value="Level 1 - Quick Read" data-link="https://buy.stripe.com/test_aFadR9c403TR98u9TY77O00">Level 1 — Quick Read ($35)</option>
      <option value="Level 2 - Deep Dive Analysis" data-link="https://buy.stripe.com/test_4gM00j5FC4XVbgCc2677O01">Level 2 — Deep Dive Analysis ($95)</option>
      <option value="Level 3 - Crisis Session" data-link="https://buy.stripe.com/test_5kQaEX9VSgGDbgCgim77O02">Level 3 — Crisis Session ($195)</option>
    </select>

    <div id="status"></div>
    <button type="submit" id="submitBtn">PAY NOW & SUBMIT CASE</button>
  </form>

  <script>
    const BASE_URL = "https://script.google.com/macros/s/AKfycbxcU-ADNA0l3KO-Pev4OEdFmWfJVTLA1E8knM3odyhifCC20e17LPD7R4vtQM2_c4Rv/exec";

    const params = new URLSearchParams(window.location.search);
    const associateName = params.get('associate');
    const associateId = params.get('id');

    if (associateName) {
      document.getElementById("associateBanner").style.display = "block";
      document.getElementById("selectedAssociate").textContent = associateName;
      document.getElementById("associateName").value = associateName;
      if (associateId) document.getElementById("associateId").value = associateId;
    }

    document.getElementById("caseForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      
      const status = document.getElementById("status");
      const btn = document.getElementById("submitBtn");
      const tierSelect = document.getElementById("tier");
      const selectedOption = tierSelect.options[tierSelect.selectedIndex];
      const stripeLink = selectedOption.getAttribute("data-link");

      if (!stripeLink) {
        status.innerHTML = `<span style="color:#ff3366">Please select a tier.</span>`;
        return;
      }

      btn.disabled = true;
      status.innerHTML = `<span style="color:#00ff88">SAVING CASE...</span>`;

      const payload = {
        clientName: document.getElementById("clientName").value,
        clientEmail: document.getElementById("clientEmail").value,
        associateName: document.getElementById("associateName").value,
        associateId: document.getElementById("associateId").value,
        caseTitle: document.getElementById("caseTitle").value,
        caseDescription: document.getElementById("caseDescription").value,
        tier: tierSelect.value,
        timestamp: new Date().toISOString()
      };

      try {
        // Save to sheet
        await fetch(BASE_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        });

        status.innerHTML = `<span style="color:#00ff88">REDIRECTING TO SECURE PAYMENT...</span>`;

        // Small delay so user sees the message
        setTimeout(() => {
          window.location.href = stripeLink;
        }, 1200);

      } catch (err) {
        console.error(err);
        status.innerHTML = `<span style="color:#ff3366">Error saving case. Please try again.</span>`;
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
