<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community Access</title>

  <style>
    body {
      font-family: "Consolas", "Courier New", monospace;
      background: #000;
      color: #00ff88;
      padding: 40px;
      max-width: 700px;
      margin: auto;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: repeating-linear-gradient(
        rgba(0, 255, 136, 0.05) 0px,
        rgba(0, 255, 136, 0.05) 2px,
        transparent 2px,
        transparent 4px
      );
      z-index: 999;
    }

    .typing {
      font-size: 28px;
      margin-bottom: 30px;
      text-shadow: 0 0 10px #00ff88;
      display: inline-block;
      white-space: nowrap;
      overflow: hidden;
      clip-path: inset(0 100% 0 0);
      animation: reveal 3s steps(40) forwards, cursorBlink 0.7s infinite;
      border-right: 2px solid #00ff88;
    }

    @keyframes reveal {
      from { clip-path: inset(0 100% 0 0); }
      to { clip-path: inset(0 0 0 0); }
    }

    @keyframes cursorBlink {
      50% { border-color: transparent; }
    }

    @media (max-width: 480px) {
      .typing { font-size: 20px; }
    }

    .subtitle {
      margin-top: 5px;
      margin-bottom: 25px;
      color: #00ff88;
      font-size: 15px;
      opacity: 0.9;
    }

    label {
      display: block;
      margin-top: 20px;
      font-weight: bold;
      font-size: 15px;
      text-shadow: 0 0 8px #00ff88;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 6px;
      border: 1px solid #00ff88;
      background: #0a0a0a;
      color: #00ff88;
      font-size: 15px;
      box-shadow: 0 0 10px #00ff88 inset;
      transition: 0.2s;
    }

    input:focus, textarea:focus {
      outline: none;
      box-shadow: 0 0 18px #00ff88;
    }

    #preview {
      margin-top: 15px;
      width: 120px;
      height: 120px;
      border-radius: 6px;
      border: 1px solid #00ff88;
      object-fit: cover;
      display: none;
      box-shadow: 0 0 12px #00ff88;
    }

    button {
      margin-top: 35px;
      width: 100%;
      padding: 14px;
      background: #00ff88;
      border: none;
      border-radius: 6px;
      color: #000;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
      box-shadow: 0 0 15px #00ff88;
      transition: 0.2s ease-in-out;
    }

    button:hover {
      background: #00ffaa;
      box-shadow: 0 0 25px #00ffaa;
      transform: scale(1.02);
    }

    #status {
      margin-top: 20px;
      font-size: 14px;
      color: #00ff88;
      min-height: 1.5em;
      text-shadow: 0 0 8px #00ff88;
    }

    .back-btn {
      margin-top: 30px;
      display: block;
      text-align: center;
      color: #00ff88;
      text-decoration: none;
      font-size: 15px;
      text-shadow: 0 0 6px #00ff88;
      transition: 0.2s;
    }

    .back-btn:hover {
      color: #00ffaa;
      text-shadow: 0 0 10px #00ffaa;
      transform: translateY(-2px);
    }
  </style>
</head>

<body>

  <div class="typing">INITIALIZING COMMUNITY ACCESS TERMINAL...</div>
  <div class="subtitle">
    Create a Community profile to join discussions, comment, and return to your personal community dashboard.
  </div>

  <form id="communityForm">
    <label>Display Name</label>
    <input type="text" id="displayName" required />

    <label>Email</label>
    <input type="email" id="email" required />

    <label>Create Password</label>
    <input type="password" id="password" required />

    <label>Short Bio</label>
    <textarea id="bio" rows="3" required></textarea>

    <label>Instagram Handle (optional)</label>
    <input type="text" id="instagram" placeholder="instagram username" />

    <label>Upload Photo / Avatar</label>
    <input type="file" id="photo" accept="image/*" required />

    <img id="preview" />

    <div id="status"></div>
    <button type="submit" id="submitBtn">CREATE COMMUNITY ACCESS</button>
  </form>

  <a href="/index.html" class="back-btn">← BACK TO HOME</a>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCXijSyw_EqvRSKwJH0M-xPs5piNfiCiYI",
      authDomain: "mrhansenfirm-b57c1.firebaseapp.com",
      projectId: "mrhansenfirm-b57c1",
      storageBucket: "mrhansenfirm-b57c1.appspot.com",
      messagingSenderId: "1007101301706",
      appId: "1:1007101301706:web:bbbac146ca9411e41af533"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let photoBase64 = null;

    // Clean Instagram handle
    function cleanInstagramHandle(input) {
      if (!input) return "";
      return input
        .trim()
        .replace(/^@/, "")
        .replace(/https?:\/\/(www\.)?instagram\.com\//, "")
        .replace(/\/$/, "")
        .replace(/\s+/g, "");
    }

    // Photo preview + Base64 conversion
    document.getElementById("photo").addEventListener("change", function () {
      const file = this.files[0];
      if (file) {
        const preview = document.getElementById("preview");
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";

        const reader = new FileReader();
        reader.onload = () => {
          photoBase64 = reader.result;
        };
        reader.readAsDataURL(file);
      }
    });

    async function createOrSignInCommunity(email, password) {
      try {
        const cred = await auth.createUserWithEmailAndPassword(email, password);
        return cred.user;
      } catch (err) {
        if (err.code === "auth/email-already-in-use") {
          const cred = await auth.signInWithEmailAndPassword(email, password);
          return cred.user;
        }
        throw err;
      }
    }

    async function saveCommunityUser(uid, data) {
      await db.collection("users").doc(uid).set(data);
    }

    document.getElementById("communityForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const displayName = document.getElementById("displayName").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const bio = document.getElementById("bio").value.trim();
      let instagram = cleanInstagramHandle(document.getElementById("instagram").value);

      if (!displayName || !email || !password || !bio || !photoBase64) {
        setStatus("Please complete all required fields.", "#ff3366");
        return;
      }

      if (password.length < 6) {
        setStatus("Password must be at least 6 characters.", "#ff3366");
        return;
      }

      document.getElementById("submitBtn").disabled = true;
      setStatus("CREATING COMMUNITY PROFILE...");

      try {
        const user = await createOrSignInCommunity(email, password);
        const uid = user.uid;

        const data = {
          role: "community_user",
          email,
          name: displayName,
          bio,
          instagram: instagram || null,
          photo: photoBase64,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        await saveCommunityUser(uid, data);

        setStatus("Community access ready. Redirecting...", "#00ff88");

        setTimeout(() => {
          window.location.href = "/community-admin.html";
        }, 1500);

      } catch (err) {
        console.error(err);
        setStatus("Error creating community access.", "#ff3366");
        document.getElementById("submitBtn").disabled = false;
      }
    });

    function setStatus(msg, color = "#00ff88") {
      const statusEl = document.getElementById("status");
      statusEl.style.color = color;
      statusEl.textContent = msg;
    }
  </script>
</body>
</html>
