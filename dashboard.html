<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - Hansen Intelligence</title>
  <style>
    body {
      font-family: "Courier New", monospace;
      background: #000;
      color: #00ff88;
      padding: 20px;
      margin: 0;
    }
    h1 { text-shadow: 0 0 15px #00ff88; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: #0a0a0a;
    }
    th, td {
      padding: 14px;
      border: 1px solid #00ff88;
      text-align: left;
    }
    th { background: #111; }
    .status-paid { color: #00ff88; font-weight: bold; }
    .no-data { text-align: center; padding: 50px; color: #666; }
    button.logout {
      background: #ff3366;
      color: white;
      border: none;
      padding: 8px 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>ADMIN DASHBOARD</h1>
      <p><strong>Mr. Hansen Firm - Intelligence Division</strong></p>
    </div>
    <button class="logout" onclick="logout()">LOGOUT</button>
  </div>

  <h2>Recent Cases</h2>
  <table id="casesTable">
    <thead>
      <tr>
        <th>Date</th>
        <th>Client</th>
        <th>Email</th>
        <th>Associate</th>
        <th>Tier</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    // Check if logged in
    if (!localStorage.getItem("adminToken")) {
      window.location.href = "login.html";
    }

    const BASE_URL = "https://script.google.com/macros/s/AKfycbxcU-ADNA0l3KO-Pev4OEdFmWfJVTLA1E8knM3odyhifCC20e17LPD7R4vtQM2_c4Rv/exec";

    async function loadCases() {
      try {
        const res = await fetch(BASE_URL + "?type=cases");
        const cases = await res.json();
        const tbody = document.querySelector("#casesTable tbody");
        tbody.innerHTML = "";

        if (!cases || cases.length === 0) {
          tbody.innerHTML = `<tr><td colspan="6" class="no-data">No cases received yet.</td></tr>`;
          return;
        }

        cases.forEach(c => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${new Date(c.timestamp).toLocaleString()}</td>
            <td>${c.clientName || ''}</td>
            <td>${c.clientEmail || ''}</td>
            <td>${c.associateName || '—'}</td>
            <td>${c.tier || ''}</td>
            <td><span class="status-paid">${c.paymentStatus || 'Paid'}</span></td>
          `;
          tbody.appendChild(row);
        });
      } catch (err) {
        console.error(err);
        document.querySelector("#casesTable tbody").innerHTML = `
          <tr><td colspan="6" class="no-data" style="color:#ff3366;">Failed to load data</td></tr>`;
      }
    }

    function logout() {
      localStorage.removeItem("adminToken");
      window.location.href = "login.html";
    }

    window.onload = loadCases;
  </script>
</body>
</html>
