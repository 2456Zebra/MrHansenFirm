<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard – Mr. Hansen Firm</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a; /* deep navy/charcoal */
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: white;
      height: 100vh;
      padding: 25px;
      box-shadow: 2px 0 12px rgba(0,0,0,0.25);
      overflow-y: auto;
    }

    .sidebar h2 {
      margin-top: 0;
      color: #1e3a8a;
      font-size: 22px;
      margin-bottom: 20px;
    }

    .menu-item {
      padding: 12px;
      border-radius: 8px;
      margin: 8px 0;
      cursor: pointer;
      font-size: 16px;
      transition: 0.2s;
      border: 1px solid #e2e8f0;
    }

    .menu-item:hover {
      background: #e8edff;
      border-color: #1e3a8a;
    }

    /* Main content */
    .main {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
      color: white;
    }

    .content-card {
      background: white;
      color: #1e293b;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.25);
      max-width: 900px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .header h1 {
      margin: 0;
      font-size: 26px;
      color: white;
    }

    .logout {
      color: #93c5fd;
      cursor: pointer;
      text-decoration: underline;
      font-size: 16px;
    }

    .logout:hover {
      color: #bfdbfe;
    }
  </style>
</head>

<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <h2 id="sidebarTitle">Admin Portal</h2>
    <div id="menu"></div>
  </div>

  <!-- Main Content -->
  <div class="main">
    <div class="header">
      <h1 id="dashboardTitle">Dashboard</h1>
      <div class="logout" onclick="logout()">Logout</div>
    </div>

    <div class="content-card">
      <h2 id="pageTitle">Welcome</h2>
      <p>Select an option from the left menu.</p>
      <div id="contentArea"></div>
    </div>
  </div>

<script>
/* Session Protection */
const role = localStorage.getItem('userRole');
const userName = localStorage.getItem('userName') || 'Admin';

if (!role) {
  window.location.href = "login.html";
}

/* Role-based UI */
let title = '';
let menuHTML = '';

if (role === 'firm_admin') {
  title = 'Firm Admin Portal';
  menuHTML = `
    <div class="menu-item" onclick="showSection('users')">👥 All Users</div>
    <div class="menu-item" onclick="showSection('clients')">📋 All Clients</div>
    <div class="menu-item" onclick="showSection('associates')">👔 Associates</div>
    <div class="menu-item" onclick="showSection('reports')">📊 Reports</div>
    <div class="menu-item" onclick="showSection('settings')">⚙️ Firm Settings</div>
  `;
} else if (role === 'associates_admin') {
  title = 'Associate Admin Portal';
  menuHTML = `
    <div class="menu-item" onclick="showSection('associates')">👔 Manage Associates</div>
    <div class="menu-item" onclick="showSection('assignments')">📌 Matter Assignments</div>
    <div class="menu-item" onclick="showSection('performance')">📈 Team Performance</div>
    <div class="menu-item" onclick="showSection('time')">⏱️ Approve Time</div>
  `;
} else {
  title = 'Client Admin Portal';
  menuHTML = `
    <div class="menu-item" onclick="showSection('clients')">📋 My Clients</div>
    <div class="menu-item" onclick="showSection('matters')">📁 My Matters</div>
    <div class="menu-item" onclick="showSection('documents')">📄 Documents</div>
    <div class="menu-item" onclick="showSection('billing')">💰 Billing Summary</div>
  `;
}

document.getElementById('sidebarTitle').textContent = title;
document.getElementById('dashboardTitle').textContent = title;
document.getElementById('menu').innerHTML = menuHTML;

/* Section Loader */
function showSection(section) {
  const formatted = section.charAt(0).toUpperCase() + section.slice(1);
  document.getElementById('pageTitle').textContent = formatted;
  document.getElementById('contentArea').innerHTML = `
    <p>Content for <strong>${formatted}</strong> will appear here.</p>
  `;
}

/* Logout */
function logout() {
  localStorage.removeItem('userRole');
  localStorage.removeItem('userName');
  window.location.href = "login.html";
}
</script>

</body>
</html>
