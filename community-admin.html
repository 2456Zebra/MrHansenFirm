<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community User Dashboard</title>

  <style>
    body {
      font-family: "Consolas", "Courier New", monospace;
      background: #000;
      color: #00ff88;
      padding: 40px;
      max-width: 800px;
      margin: auto;
      overflow-x: hidden;
      position: relative;
    }

    /* Scanline overlay */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: repeating-linear-gradient(
        rgba(0, 255, 136, 0.05) 0px,
        rgba(0, 255, 136, 0.05) 2px,
        transparent 2px,
        transparent 4px
      );
      z-index: 999;
    }

    /* Animated typing header */
    .typing {
      font-size: 28px;
      margin-bottom: 30px;
      text-shadow: 0 0 10px #00ff88;
      display: inline-block;
      white-space: nowrap;
      overflow: hidden;
      clip-path: inset(0 100% 0 0);
      animation: reveal 3s steps(40) forwards, cursorBlink 0.7s infinite;
      border-right: 2px solid #00ff88;
    }

    @keyframes reveal {
      from { clip-path: inset(0 100% 0 0); }
      to { clip-path: inset(0 0 0 0); }
    }

    @keyframes cursorBlink {
      50% { border-color: transparent; }
    }

    @media (max-width: 480px) {
      .typing { font-size: 20px; }
    }

    .profile-box {
      background: #0a0a0a;
      padding: 25px;
      border: 1px solid #00ff88;
      border-radius: 8px;
      box-shadow: 0 0 15px #00ff88 inset;
      margin-bottom: 30px;
    }

    .avatar {
      width: 140px;
      height: 140px;
      border-radius: 6px;
      border: 1px solid #00ff88;
      object-fit: cover;
      box-shadow: 0 0 12px #00ff88;
      margin-bottom: 20px;
    }

    .label {
      font-weight: bold;
      margin-top: 15px;
      text-shadow: 0 0 8px #00ff88;
    }

    .value {
      margin-top: 5px;
      font-size: 16px;
    }

    .instagram-link {
      color: #00ffaa;
      text-decoration: none;
      text-shadow: 0 0 6px #00ffaa;
    }

    .instagram-link:hover {
      color: #00ffcc;
      text-shadow: 0 0 10px #00ffcc;
    }

    .edit-btn {
      margin-top: 25px;
      padding: 10px 22px;
      background: #00ff88;
      border: none;
      border-radius: 6px;
      color: #000;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 15px #00ff88;
      transition: 0.2s;
      width: auto;
      display: inline-block;
    }

    .edit-btn:hover {
      background: #00ffaa;
      box-shadow: 0 0 25px #00ffaa;
      transform: scale(1.03);
    }

    .back-btn {
      margin-top: 30px;
      display: block;
      text-align: center;
      color: #00ff88;
      text-decoration: none;
      font-size: 15px;
      text-shadow: 0 0 6px #00ff88;
      transition: 0.2s;
    }

    .back-btn:hover {
      color: #00ffaa;
      text-shadow: 0 0 10px #00ffaa;
      transform: translateY(-2px);
    }

    #status {
      margin-top: 20px;
      font-size: 14px;
      text-shadow: 0 0 8px #00ff88;
    }
  </style>
</head>

<body>

  <div class="typing">INITIALIZING COMMUNITY USER DASHBOARD...</div>

  <div id="status">Loading profile...</div>

  <div id="profile" class="profile-box" style="display:none;">
    <img id="avatar" class="avatar" />

    <div class="label">Display Name</div>
    <div id="name" class="value"></div>

    <div class="label">Bio</div>
    <div id="bio" class="value"></div>

    <div class="label">Instagram</div>
    <div id="instagram" class="value"></div>

    <button class="edit-btn" id="editProfileBtn">EDIT YOUR PROFILE</button>
  </div>

  <a href="/index.html" class="back-btn">← BACK TO HOME</a>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCXijSyw_EqvRSKwJH0M-xPs5piNfiCiYI",
      authDomain: "mrhansenfirm-b57c1.firebaseapp.com",
      projectId: "mrhansenfirm-b57c1",
      storageBucket: "mrhansenfirm-b57c1.appspot.com",
      messagingSenderId: "1007101301706",
      appId: "1:1007101301706:web:bbbac146ca9411e41af533"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const statusEl = document.getElementById("status");
    const profileBox = document.getElementById("profile");

    auth.onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = "/community-signup.html";
        return;
      }

      try {
        const ref = db.collection("users").doc(user.uid);
        const snap = await ref.get();

        if (!snap.exists) {
          statusEl.textContent = "Profile not found.";
          return;
        }

        const data = snap.data();

        document.getElementById("name").textContent = data.name || "";
        document.getElementById("bio").textContent = data.bio || "";

        if (data.photo) {
          document.getElementById("avatar").src = data.photo;
        }

        if (data.instagram) {
          document.getElementById("instagram").innerHTML =
            `<a class="instagram-link" href="https://instagram.com/${data.instagram}" target="_blank">@${data.instagram}</a>`;
        } else {
          document.getElementById("instagram").textContent = "None";
        }

        statusEl.style.display = "none";
        profileBox.style.display = "block";

      } catch (err) {
        console.error(err);
        statusEl.textContent = "Error loading profile.";
      }
    });

    document.getElementById("editProfileBtn").addEventListener("click", () => {
      window.location.href = "/profile.html";
    });
  </script>

</body>
</html>
