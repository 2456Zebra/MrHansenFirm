<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>View Cases</title>

  <style>
    body {
      font-family: "Consolas", "Courier New", monospace;
      background: #000;
      color: #00ff88;
      padding: 40px;
      max-width: 900px;
      margin: auto;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: repeating-linear-gradient(
        rgba(0, 255, 136, 0.05) 0px,
        rgba(0, 255, 136, 0.05) 2px,
        transparent 2px,
        transparent 4px
      );
      z-index: 999;
    }

    .typing {
      font-size: 28px;
      margin-bottom: 30px;
      text-shadow: 0 0 10px #00ff88;
      display: inline-block;
      white-space: nowrap;
      overflow: hidden;
      clip-path: inset(0 100% 0 0);
      animation: reveal 3s steps(40) forwards, cursorBlink 0.7s infinite;
      border-right: 2px solid #00ff88;
    }

    @keyframes reveal {
      from { clip-path: inset(0 100% 0 0); }
      to { clip-path: inset(0 0 0 0); }
    }

    @keyframes cursorBlink {
      50% { border-color: transparent; }
    }

    .case-card {
      background: #0a0a0a;
      padding: 20px;
      border: 1px solid #00ff88;
      border-radius: 6px;
      margin-bottom: 25px;
      box-shadow: 0 0 12px #00ff88 inset;
      cursor: pointer;
      transition: 0.2s;
    }

    .case-card:hover {
      box-shadow: 0 0 20px #00ffaa inset;
      transform: scale(1.01);
    }

    .case-title {
      font-size: 20px;
      font-weight: bold;
      text-shadow: 0 0 8px #00ff88;
    }

    .case-summary {
      margin-top: 10px;
      opacity: 0.9;
    }

    .case-meta {
      margin-top: 12px;
      font-size: 14px;
      opacity: 0.8;
    }

    .signup-btn {
      margin-top: 40px;
      padding: 12px 22px;
      background: #00ff88;
      border: none;
      border-radius: 6px;
      color: #000;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 15px #00ff88;
      transition: 0.2s;
      display: inline-block;
    }

    .signup-btn:hover {
      background: #00ffaa;
      box-shadow: 0 0 25px #00ffaa;
      transform: scale(1.03);
    }

    .back-btn {
      margin-top: 30px;
      display: block;
      text-align: center;
      color: #00ff88;
      text-decoration: none;
      font-size: 15px;
      text-shadow: 0 0 6px #00ff88;
      transition: 0.2s;
    }

    .back-btn:hover {
      color: #00ffaa;
      text-shadow: 0 0 10px #00ffaa;
      transform: translateY(-2px);
    }

    #status {
      margin-top: 20px;
      font-size: 14px;
      text-shadow: 0 0 8px #00ff88;
    }
  </style>
</head>

<body>

  <div class="typing">ACCESSING PUBLIC CASE DATABASE...</div>

  <div id="status">Loading cases...</div>

  <div id="caseList"></div>

  <button class="signup-btn" onclick="window.location.href='/community-signup.html'">
    SIGN UP TO BECOME A COMMUNITY USER
  </button>

  <a href="/index.html" class="back-btn">← BACK TO HOME</a>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCXijSyw_EqvRSKwJH0M-xPs5piNfiCiYI",
      authDomain: "mrhansenfirm-b57c1.firebaseapp.com",
      projectId: "mrhansenfirm-b57c1",
      storageBucket: "mrhansenfirm-b57c1.appspot.com",
      messagingSenderId: "1007101301706",
      appId: "1:1007101301706:web:bbbac146ca9411e41af533"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const caseList = document.getElementById("caseList");
    const statusEl = document.getElementById("status");

    async function loadCases() {
      try {
        const snap = await db.collection("cases")
          .where("status", "==", "approved")
          .orderBy("createdAt", "desc")
          .get();

        if (snap.empty) {
          statusEl.textContent = "No approved cases available.";
          return;
        }

        statusEl.style.display = "none";

        snap.forEach(doc => {
          const data = doc.data();

          const div = document.createElement("div");
          div.className = "case-card";
          div.onclick = () => window.location.href = `/case.html?id=${doc.id}`;

          div.innerHTML = `
            <div class="case-title">${data.title || "Untitled Case"}</div>
            <div class="case-summary">${data.summary || "No summary provided."}</div>
            <div class="case-meta">
              Category: ${data.category || "N/A"}<br>
              Assigned: ${data.associateName || "Unassigned"}
            </div>
          `;

          caseList.appendChild(div);
        });

      } catch (err) {
        console.error(err);
        statusEl.textContent = "Error loading cases.";
      }
    }

    loadCases();
  </script>

</body>
</html>
